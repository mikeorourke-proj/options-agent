          info="The strike with the highest put open interest — acts as a support level. Dealers who sold these puts must buy shares as price approaches, creating a floor. Confidence = what % of total near-term put OI sits at this strike. Above 15% = strong wall, below 8% = diffuse, less reliable."
          snapshot={`Highest put OI strike: ${fmtP(d.putWall)} · ${((d.spot - d.putWall) / d.spot * 100).toFixed(1)}% below spot · ${(d.putWallOI||0).toLocaleString()} contracts (${(d.putWallConf||0).toFixed(1)}% of near-term put OI) · Confidence: ${d.putWallConf > 15 ? "HIGH — concentrated, strong support" : d.putWallConf > 8 ? "MODERATE — visible but not dominant" : "LOW — diffuse OI, wall may not hold"}`}
          onChart={() => setTsChart({ metric: "putWall", label: "Put Wall", unit: "" })} />
        <Metric label="Max pain" value={fmtP(d.maxPain)} sub={`${((d.maxPain-d.spot)/d.spot*100).toFixed(1)}% from spot`}
          info="The strike price where total option holder losses are maximized — price tends to gravitate here into expiration as dealers hedge and time decay accelerates."
          snapshot={`Pin target: ${fmtP(d.maxPain)} · Spot ${d.maxPain > d.spot ? "below" : "above"} by ${Math.abs((d.maxPain-d.spot)/d.spot*100).toFixed(1)}% · Magnetic pull ${d.maxPain > d.spot ? "upward" : "downward"} · Effect strengthens ${nextOpex().days <= 3 ? "NOW — OPEX imminent" : `into OPEX (${nextOpex().days}d away)`}`}
          onChart={() => setTsChart({ metric: "maxPain", label: "Max Pain", unit: "" })} />
        <Metric label="Skew z" value={d.skewZ.toFixed(2)} accent={Math.abs(d.skewZ)>2?"#E24B4A":undefined}
          info="25-delta risk reversal z-score — measures how expensive puts are vs calls relative to recent history. High positive = unusual put demand (fear). High negative = unusual call demand (greed)."
          snapshot={`25Δ skew: ${d.skewZ.toFixed(2)}σ vs 30/60/90d rolling · ${Math.abs(d.skewZ) > 2 ? "OUTLIER — " : ""}${d.skewZ > 0 ? "Put protection bid elevated, downside hedging heavy" : d.skewZ < -1 ? "Call demand elevated, upside positioning aggressive" : "Balanced put/call pricing"}`}
          onChart={() => setTsChart({ metric: "skewZ", label: "Skew Z-Score", unit: "σ" })} />
        <Metric label="25Δ Risk Rev" value={d.rr25d !== 0 ? `${d.rr25d > 0 ? "+" : ""}${d.rr25d.toFixed(1)}` : "—"} accent={d.rr25d < -8 ? "#0F6E56" : d.rr25d > -1 ? "#A32D2D" : undefined}
          sub={d.rr25d !== 0 ? `${d.rr25dCallIV.toFixed(0)}c / ${d.rr25dPutIV.toFixed(0)}p` : "no data"}
          info="25-delta risk reversal: IV(25Δ call) minus IV(25Δ put). Measures relative demand for downside vs upside protection. Normally negative for equities (puts are richer). Extremes are contrarian: deeply negative readings (-8 or beyond) often mark near-term bottoms as hedging demand peaks. Less negative or positive readings often mark near-term tops. Based on Borochin & Zhao (2022): positive risk-neutral skewness predicts next-month price rebounds."
          snapshot={`25Δ call IV: ${d.rr25dCallIV.toFixed(1)}% · 25Δ put IV: ${d.rr25dPutIV.toFixed(1)}% · Risk reversal: ${d.rr25d > 0 ? "+" : ""}${d.rr25d.toFixed(1)}pts · ${d.rr25d < -8 ? "EXTREME put skew — contrarian bullish signal, hedging demand at peak" : d.rr25d < -4 ? "Elevated put demand — downside protection being bid" : d.rr25d > -1 ? "Call skew elevated — upside speculation heavy, contrarian bearish" : "Normal put skew — structural hedging, no signal"}`}
          onChart={() => setTsChart({ metric: "rr25d", label: "25Δ Risk Reversal", unit: "pts" })} />
        <Metric label="Term structure" value={d.termSlope.toFixed(2)} sub={d.termSlope<0.85?"backwardation":d.termSlope>1.15?"steep contango":"normal"}
          info="Ratio of front-month to back-month implied volatility. Below 0.85 (backwardation) signals near-term fear or an event. Above 1.15 (steep contango) signals calm now but uncertainty ahead."
          snapshot={`Front IV / back IV: ${d.termSlope.toFixed(2)} · ${d.termSlope < 0.85 ? "Backwardation — near-term IV spiking, traders pricing imminent risk" : d.termSlope > 1.15 ? "Steep contango — near-term calm, back months pricing future risk" : "Normal contango — no unusual term structure signal"}`}
          onChart={() => setTsChart({ metric: "termSlope", label: "Term Structure", unit: "" })} />
        <Metric label="VRP" value={`${d.vrp.toFixed(1)}pts`} sub={`IV ${d.iv.toFixed(0)} / RV ${d.rv.toFixed(0)}`} accent={d.vrp>10?"#1D9E75":d.vrp<-5?"#E24B4A":undefined}
          info="Volatility Risk Premium — implied vol minus realized vol. When positive, options are expensive vs actual movement (sellers favored). When negative, options are cheap (buyers favored, vol expansion likely)."
          snapshot={`IV: ${d.iv.toFixed(1)}% · Realized vol: ${d.rv.toFixed(1)}% · Premium: ${d.vrp > 0 ? "+" : ""}${d.vrp.toFixed(1)}pts · ${d.vrp > 10 ? "Options overpriced — vol sellers have edge, crush likely" : d.vrp < -5 ? "Options underpriced — vol expansion risk, buyers have edge" : "Fair value — no clear edge either side"}`}
          onChart={() => setTsChart({ metric: "vrp", label: "Volatility Risk Premium", unit: "pts" })} />
        <Metric label="P/C momentum" value={<EqBadge shares={d.pcr} size="sm"/>} sub="daily shift"
          info="Daily rate of change in the delta-weighted put/call ratio — shows whether bearish or bullish conviction is accelerating. Expressed as the equity equivalent of that shift."
          snapshot={`Today's Δ-wtd P/C: ${d.dpc.toFixed(2)} · Daily change: ${fmtEq(d.pcr).label} · ${d.pcp}th percentile · ${Math.abs(d.pcr) > 100000 ? "Significant momentum shift — " : ""}${d.pcr < 0 ? "Bearish conviction accelerating" : d.pcr > 0 ? "Bullish conviction building" : "Flat"}`}
          onChart={() => setTsChart({ metric: "pcr", label: "P/C Momentum", unit: "" })} />
      </div>
      <div style={{ padding: "0 20px 6px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.5, letterSpacing: "0.4px", marginBottom: "6px" }}>Options flow breakdown — Total · 0DTE (expired) · Open (carries forward)</div>
      </div>
      <div style={{ padding: "0 20px 14px", display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "6px" }}>
        <Metric label="Total Δ P/C" value={d.dpc.toFixed(2)} sub={<EqBadge shares={d.nds||0} size="sm"/>}
          info="Delta-weighted put/call ratio across ALL contracts traded today. Below 0.7 = call-dominated (bullish flow). Above 1.3 = put-dominated (bearish flow). Net Δ shows the equity equivalent of the imbalance."
          snapshot={`Call Δ flow: ${fmtEq(d.cdf||0).label} · Put Δ flow: ${fmtEq(d.pdf||0).label} · Ratio: ${d.dpc.toFixed(2)} · Net: ${fmtEq(d.nds||0).label}`}
          onChart={() => setTsChart({ metric: "dpc", label: "Total Δ P/C", unit: "" })} />
        <Metric label="0DTE Δ P/C" value={(d.zdteDpc||0).toFixed(2)} sub={<><span style={{fontSize:"10px",opacity:0.5}}>{(d.zdtePct||0).toFixed(0)}% of volume · </span><EqBadge shares={d.zdteNetDelta||0} size="sm"/></>} accent={(d.zdtePct||0) > 50 ? "#A32D2D" : undefined}
          info="Delta-weighted put/call ratio for 0DTE contracts only — these expired at today's close and no longer exist. Shows the intraday gamma story. High 0DTE % means the tape was driven by expiring options, not structural positioning."
          snapshot={`0DTE call Δ: ${fmtEq(d.zdteCallFlow||0).label} · 0DTE put Δ: ${fmtEq(d.zdtePutFlow||0).label} · Ratio: ${(d.zdteDpc||0).toFixed(2)} · Net: ${fmtEq(d.zdteNetDelta||0).label} · 0DTE was ${(d.zdtePct||0).toFixed(0)}% of total volume`}
          onChart={() => setTsChart({ metric: "zdteDpc", label: "0DTE Δ P/C", unit: "" })} />
        <Metric label="Open Δ P/C" value={(d.openDpc||0).toFixed(2)} sub={<EqBadge shares={d.openNetDelta||0} size="sm"/>} accent={(d.openDpc||0) > 1.3 ? "#A32D2D" : (d.openDpc||0) < 0.7 ? "#0F6E56" : undefined}
          info="Delta-weighted put/call ratio for non-0DTE contracts — this is the structural positioning that carries forward beyond today's session. This is the most important flow metric for next-session outlook. Below 0.7 = bullish structural positioning. Above 1.3 = bearish structural positioning."
          snapshot={`Open call Δ: ${fmtEq(d.openCallFlow||0).label} · Open put Δ: ${fmtEq(d.openPutFlow||0).label} · Ratio: ${(d.openDpc||0).toFixed(2)} · Net: ${fmtEq(d.openNetDelta||0).label} · This positioning carries forward`}
          onChart={() => setTsChart({ metric: "openDpc", label: "Open Δ P/C", unit: "" })} />
      </div>
      <div style={{ padding: "0 20px 14px", display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "6px" }}>
        <Metric label="Options % of ADV" value={`${(d.optVolPctADV||0).toFixed(1)}%`} sub={`${fmtEq(d.optVolShares||0).label} delta-equiv`} accent={(d.optVolPctADV||0) > 20 ? "#A32D2D" : (d.optVolPctADV||0) > 10 ? "#BA7517" : "#0F6E56"}
          info="Percentage of average daily equity volume attributable to options dealer hedging. Above 20% = options dominant on the tape. 10-20% = significant. Below 10% = equity-driven."
          snapshot={`Delta-equiv shares: ${fmtEq(d.optVolShares||0).label} · ADV: ${d.equityVolume > 0 ? (d.equityVolume/1e6).toFixed(1)+"M shares (actual)" : (ADV[d.ticker]||10)+"M shares (est)"} · Ratio: ${(d.optVolPctADV||0).toFixed(1)}% · ${(d.optVolPctADV||0) > 20 ? "OPTIONS DOMINANT" : (d.optVolPctADV||0) > 10 ? "Significant influence" : "Equity-driven"}`}
          onChart={() => setTsChart({ metric: "optVolPctADV", label: "Options % of ADV", unit: "%" })} />
        <Metric label="0DTE % of volume" value={`${(d.zdtePct||0).toFixed(0)}%`} sub={`${(d.zdteVol||0).toLocaleString()} contracts`}
          info="What percentage of today's total options activity was 0DTE. Above 50% means the tape was dominated by intraday gamma — that flow is now gone. Below 20% means positioning was structural and carries forward."
          snapshot={`0DTE contracts: ${(d.zdteVol||0).toLocaleString()} · Total contracts: ${(d.optVolRaw||0).toLocaleString()} · Ratio: ${(d.zdtePct||0).toFixed(1)}%`}
          onChart={() => setTsChart({ metric: "zdtePct", label: "0DTE % of Volume", unit: "%" })} />
        <Metric label="Dealer hedge est." value={<EqBadge shares={(d.regime==="positive" ? d.dspct : -d.dspct)||0} size="sm"/>} sub="per 1% move"
          info="Estimated shares dealers must trade to rehedge per 1% move in the underlying. In positive gamma they trade against the move (stabilizing). In negative gamma they trade with the move (destabilizing)."
          snapshot={`Regime: ${d.regime} · Per 1% move: ${fmtEq(d.regime==="positive" ? d.dspct : -d.dspct).label} · ${d.regime==="positive" ? "Counter-trend — dealers sell rallies, buy dips" : "Pro-trend — dealers chase moves, amplifying direction"}`}
          onChart={() => setTsChart({ metric: "dspct", label: "Dealer Hedge Est.", unit: " shs" })} />
      </div>
      <div style={{ padding: "0 20px 14px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, letterSpacing: "0.4px", marginBottom: "8px" }}>Signal breakdown — how options influence {d.ticker} shares</div>
        {v.factors.map((f,i) => (
          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "10px", padding: "7px 10px", marginBottom: "3px", borderRadius: "6px", background: ib[f.imp]||"rgba(128,128,128,0.03)" }}>
            <span style={{ width: "6px", height: "6px", borderRadius: "50%", marginTop: "6px", flexShrink: 0, background: dc[f.dir]||"#888" }} />
            <div><span style={{ fontSize: "12px", fontWeight: 500 }}>{f.sig}</span><span style={{ fontSize: "12px", opacity: 0.75, marginLeft: "6px" }}>{f.det}</span></div>
          </div>
        ))}
      </div>
      {d.trades.length > 0 && <div style={{ padding: "0 20px 16px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.828, letterSpacing: "0.3px", marginBottom: "6px" }}>High-delta sweeps today</div>
        <div style={{ border: "1px solid rgba(74,144,217,0.1)", borderRadius: "8px", overflow: "hidden" }}>
          {d.trades.sort((a,b)=>Math.abs(b.eqShares)-Math.abs(a.eqShares)).map((tr,i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "6px 12px", fontSize: "13px", borderBottom: i<d.trades.length-1?"1px solid rgba(128,128,128,0.05)":"none" }}>
              <span style={{ opacity: 0.85, fontSize: "11px", minWidth: "36px" }}>{tr.time}</span>
              <span style={{ fontFamily: "monospace", fontSize: "12px", minWidth: "18px" }}>{tr.type}</span>
              <span style={{ minWidth: "56px" }}>{fmtP(tr.strike)}</span>
              <span style={{ opacity: 0.828, fontSize: "12px", minWidth: "38px" }}>Δ{Math.abs(tr.delta).toFixed(2)}</span>
              <span style={{ minWidth: "46px" }}>×{tr.contracts.toLocaleString()}</span>
              <span style={{ fontSize: "11px", opacity: 0.828, minWidth: "34px" }}>{tr.side}</span>
              <span style={{ marginLeft: "auto" }}><EqBadge shares={tr.side==="bought"?Math.abs(tr.eqShares):-Math.abs(tr.eqShares)} size="sm"/></span>
            </div>
          ))}
        </div>
      </div>}
    </div>
    {tsChart && <TimeSeriesModal ticker={d.ticker} metric={tsChart.metric} label={tsChart.label} unit={tsChart.unit} onClose={() => setTsChart(null)} />}
  </>);
}

function OptionsVolume({ data, onSelect }) {
  const sorted = useMemo(() => [...data].filter(d => d.optVolRaw > 0 || d.optVolPctADV > 0).sort((a,b) => {
    // Sort by ADV% if available, otherwise by raw contract volume
    if (a.optVolPctADV > 0 && b.optVolPctADV > 0) return b.optVolPctADV - a.optVolPctADV;
    if (a.optVolPctADV > 0) return -1;
    if (b.optVolPctADV > 0) return 1;
    return (b.optVolRaw||0) - (a.optVolRaw||0);
  }).slice(0, 30), [data]);

  return <div style={{ border: "1px solid rgba(74,144,217,0.15)", borderRadius: "10px", overflow: "hidden" }}>
    {/* Header row */}
    <div style={{ display: "grid", gridTemplateColumns: "54px 58px 56px 56px 56px 80px 56px 56px 80px 64px", padding: "6px 10px", fontSize: "9px", textTransform: "uppercase", letterSpacing: "0.2px", opacity: 0.6, fontWeight: 500, background: "rgba(74,144,217,0.04)", borderBottom: "1px solid rgba(74,144,217,0.12)" }}>
      <span>Ticker</span>
      <span style={{textAlign:"right"}}>Opts %<br/>ADV</span>
      <span style={{textAlign:"right"}}>Total<br/>Δ P/C</span>
      <span style={{textAlign:"right"}}>Total<br/>Net Δ</span>
      <span style={{textAlign:"right"}}>0DTE<br/>%</span>
      <span style={{textAlign:"right"}}>0DTE<br/>Δ P/C · Net Δ</span>
      <span style={{textAlign:"right"}}>Open<br/>Δ P/C</span>
      <span style={{textAlign:"right"}}>Open<br/>Net Δ</span>
      <span style={{textAlign:"right"}}>Regime</span>
      <span style={{textAlign:"right"}}>Contracts</span>
    </div>
    {sorted.map((d, i) => {
      const advColor = d.optVolPctADV > 20 ? "#A32D2D" : d.optVolPctADV > 10 ? "#BA7517" : "#0F6E56";
      const zdteColor = d.zdtePct > 50 ? "#A32D2D" : d.zdtePct > 30 ? "#BA7517" : "inherit";
      return <div key={d.ticker} onClick={() => onSelect(d.ticker)} style={{
        display: "grid", gridTemplateColumns: "54px 58px 56px 56px 56px 80px 56px 56px 80px 64px",
        padding: "6px 10px", alignItems: "center", fontSize: "12px", cursor: "pointer",
        borderBottom: i < sorted.length - 1 ? "1px solid rgba(74,144,217,0.07)" : "none"
      }} onMouseEnter={e=>e.currentTarget.style.background="rgba(74,144,217,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{ fontWeight: 500 }}>{d.ticker}</span>
        <span style={{ textAlign: "right", fontWeight: 500, color: advColor }}>{d.optVolPctADV.toFixed(1)}%</span>
        <span style={{ textAlign: "right", fontFamily: "monospace", fontSize: "11px" }}>{d.dpc.toFixed(2)}</span>
        <span style={{ textAlign: "right" }}><EqBadge shares={d.nds||0} size="sm"/></span>
        <span style={{ textAlign: "right", fontFamily: "monospace", fontSize: "11px", color: zdteColor }}>{d.zdtePct.toFixed(0)}%</span>
        <span style={{ textAlign: "right", fontSize: "11px" }}>
          <span style={{ fontFamily: "monospace" }}>{d.zdteDpc.toFixed(2)}</span>
          {" "}<EqBadge shares={d.zdteNetDelta||0} size="sm"/>
        </span>
        <span style={{ textAlign: "right", fontFamily: "monospace", fontSize: "11px" }}>{d.openDpc.toFixed(2)}</span>
        <span style={{ textAlign: "right" }}><EqBadge shares={d.openNetDelta||0} size="sm"/></span>
        <span style={{ textAlign: "right" }}><Regime r={d.regime}/></span>
        <span style={{ textAlign: "right", fontSize: "11px", opacity: 0.6 }}>{(d.optVolRaw||0).toLocaleString()}</span>
      </div>;
    })}
  </div>;
}

function Sweeps({ data, onSelect }) {
  const all = useMemo(()=>{const t=[];data.forEach(d=>d.trades.forEach(tr=>t.push({...tr,ticker:d.ticker})));return t.sort((a,b)=>Math.abs(b.eqShares)-Math.abs(a.eqShares)).slice(0,20);},[data]);
  if(!all.length) return <div style={{padding:"20px",opacity:0.4,textAlign:"center"}}>No high-delta sweeps detected</div>;
  return <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",overflow:"hidden"}}>
    <div style={{display:"grid",gridTemplateColumns:"56px 32px 66px 50px 66px 42px 100px",padding:"8px 12px",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.3px",opacity:0.45,fontWeight:500,background:"rgba(128,128,128,0.04)",borderBottom:"1px solid rgba(128,128,128,0.1)"}}><span>Ticker</span><span>T</span><span>Strike</span><span>Δ</span><span>Qty</span><span>Side</span><span style={{textAlign:"right"}}>Eq equiv</span></div>
    {all.map((tr,i)=><div key={i} onClick={()=>onSelect(tr.ticker)} style={{display:"grid",gridTemplateColumns:"56px 32px 66px 50px 66px 42px 100px",padding:"7px 12px",alignItems:"center",fontSize:"13px",borderBottom:i<all.length-1?"1px solid rgba(128,128,128,0.07)":"none",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(128,128,128,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <span style={{fontWeight:500}}>{tr.ticker}</span><span style={{fontFamily:"monospace",fontSize:"12px"}}>{tr.type}</span><span>{fmtP(tr.strike)}</span><span style={{fontFamily:"monospace",fontSize:"12px"}}>{Math.abs(tr.delta).toFixed(2)}</span><span>{tr.contracts.toLocaleString()}</span><span style={{fontSize:"11px",opacity:0.6}}>{tr.side}</span><span style={{textAlign:"right"}}><EqBadge shares={tr.side==="bought"?Math.abs(tr.eqShares):-Math.abs(tr.eqShares)} size="sm"/></span>
    </div>)}
  </div>;
}

function Divergence({ data }) {
  const idx=data.filter(d=>["SPY","QQQ","IWM","SMH","DIA","XLF","XLK","XLE","RSP"].includes(d.ticker));
  const stk=data.filter(d=>d.at==="Stock");
  const nN=stk.filter(d=>d.regime==="negative").length,nP=stk.filter(d=>d.regime==="positive").length;
  const iR=idx.length>0&&idx.filter(d=>d.regime==="positive").length>idx.length/2?"positive":"negative";
  const div=(iR==="positive"&&nN>nP)||(iR==="negative"&&nN<nP);
  const negPctStk = stk.length > 0 ? Math.round(nN / stk.length * 100) : 0;
  const negIdx = idx.filter(d=>d.regime==="negative");
  const posIdx = idx.filter(d=>d.regime==="positive");

  // Top squeeze names
  const topSqueeze = [...stk].sort((a,b) => b.sq - a.sq).slice(0, 5);
  // Most bearish P/C
  const topBearish = [...stk].filter(d => d.dpc > 0.8).sort((a,b) => b.dpc - a.dpc).slice(0, 5);
  // Most bullish P/C
  const topBullish = [...stk].filter(d => d.dpc < 0.5 && d.dpc > 0).sort((a,b) => a.dpc - b.dpc).slice(0, 5);

  return <div>
    <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",padding:"16px",marginBottom:"12px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}><span style={{fontSize:"13px",fontWeight:500}}>Index vs component gamma regime</span><span style={{fontSize:"11px",padding:"2px 10px",borderRadius:"999px",fontWeight:500,background:div?"rgba(226,75,74,0.12)":"rgba(29,158,117,0.12)",color:div?"#A32D2D":"#0F6E56"}}>{div?"diverging":"aligned"}</span></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
        <div style={{background:"rgba(128,128,128,0.05)",borderRadius:"8px",padding:"10px"}}>
          <div style={{fontSize:"10px",opacity:0.45,textTransform:"uppercase",marginBottom:"6px"}}>ETFs / Indices</div>
          {idx.map(d => <div key={d.ticker} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"12px",padding:"2px 0"}}>
            <span style={{fontWeight:500}}>{d.ticker}</span>
            <Regime r={d.regime}/>
          </div>)}
        </div>
        <div style={{background:"rgba(128,128,128,0.05)",borderRadius:"8px",padding:"10px"}}>
          <div style={{fontSize:"10px",opacity:0.45,textTransform:"uppercase",marginBottom:"6px"}}>Single stocks</div>
          <div style={{fontSize:"20px",fontWeight:500,marginBottom:"4px"}}><span style={{color:"#3B6D11"}}>{nP}</span> <span style={{fontSize:"12px",opacity:0.5}}>pos</span> / <span style={{color:"#A32D2D"}}>{nN}</span> <span style={{fontSize:"12px",opacity:0.5}}>neg</span></div>
          <div style={{fontSize:"11px",opacity:0.5}}>{negPctStk}% in negative gamma</div>
        </div>
      </div>
      {div&&<div style={{fontSize:"12px",opacity:0.7,lineHeight:1.5,padding:"8px 10px",background:"rgba(226,75,74,0.04)",borderRadius:"6px",marginTop:"10px"}}>Divergence: ETFs in {iR} gamma while {iR==="positive"?nN:nP}/{stk.length} components are in {iR==="positive"?"negative":"positive"} — structural tension that tends to resolve with sharp moves toward the component signal.</div>}
      {!div&&<div style={{fontSize:"12px",opacity:0.5,lineHeight:1.5,padding:"8px 10px",marginTop:"10px"}}>ETFs and single-stock gamma regimes are aligned — no structural tension detected.</div>}
    </div>

    {topSqueeze.length > 0 && <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",padding:"16px",marginBottom:"12px"}}>
      <div style={{fontSize:"13px",fontWeight:500,marginBottom:"10px"}}>Highest squeeze scores</div>
      {topSqueeze.map(d => <div key={d.ticker} style={{display:"flex",alignItems:"center",gap:"8px",fontSize:"12px",padding:"3px 0"}}>
        <span style={{fontWeight:500,width:"48px"}}>{d.ticker}</span>
        <div style={{flex:1}}><Squeeze score={d.sq}/></div>
        <Regime r={d.regime}/>
      </div>)}
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
      {topBullish.length > 0 && <div style={{border:"1px solid rgba(29,158,117,0.2)",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"11px",opacity:0.5,textTransform:"uppercase",marginBottom:"8px"}}>Most bullish Δ P/C</div>
        {topBullish.map(d => <div key={d.ticker} style={{display:"flex",justifyContent:"space-between",fontSize:"12px",padding:"2px 0"}}>
          <span style={{fontWeight:500}}>{d.ticker}</span>
          <span style={{color:"#0F6E56",fontFamily:"monospace"}}>{d.dpc.toFixed(2)}</span>
        </div>)}
      </div>}
      {topBearish.length > 0 && <div style={{border:"1px solid rgba(226,75,74,0.2)",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"11px",opacity:0.5,textTransform:"uppercase",marginBottom:"8px"}}>Most bearish Δ P/C</div>
        {topBearish.map(d => <div key={d.ticker} style={{display:"flex",justifyContent:"space-between",fontSize:"12px",padding:"2px 0"}}>
          <span style={{fontWeight:500}}>{d.ticker}</span>
          <span style={{color:"#A32D2D",fontFamily:"monospace"}}>{d.dpc.toFixed(2)}</span>
        </div>)}
      </div>}
    </div>
  </div>;
}

// ─── WALL PROXIMITY SCREEN ───────────────────────────────────────
function WallProximity({ data, onSelect, loading }) {
  const PINNED = ["SPY", "QQQ"];

  const { putHits, callHits, putPinned, callPinned } = useMemo(() => {
    const putHits = [], callHits = [], putPinned = [], callPinned = [];
    const pinnedTickers = {};
    data.forEach(d => {
      if (!d.spot || d.spot <= 0) return;
      const isPinned = PINNED.includes(d.ticker);
      if (isPinned) pinnedTickers[d.ticker] = d;

      // Put wall — noData only if wall is 0 AND no OI data
      const hasPut = d.putWall > 0 && (d.putWallOI > 0 || d.putWallConf > 0);
      if (hasPut || isPinned) {
        const wall = d.putWall || 0;
        const dist = wall > 0 ? ((d.spot - wall) / d.spot) * 100 : 999;
        const row = {
          ticker: d.ticker, spot: d.spot, wall,
          conf: d.putWallConf || 0, oi: d.putWallOI || 0, dist,
          regime: d.regime, at: d.at, noData: !hasPut,
          status: !hasPut ? "—" : dist < -0.25 ? "broken" : dist < 0.5 ? "testing" : "approaching",
        };
        if (isPinned) putPinned.push(row);
        else if (hasPut && d.putWallConf >= 20 && Math.abs(dist) <= 2.5) putHits.push(row);
      }

      // Call wall — noData only if wall is 0 AND no OI data
      const hasCall = d.callWall > 0 && (d.callWallOI > 0 || d.callWallConf > 0);
      if (hasCall || isPinned) {
        const wall = d.callWall || 0;
        const dist = wall > 0 ? ((wall - d.spot) / d.spot) * 100 : 999;
        const row = {
          ticker: d.ticker, spot: d.spot, wall,
          conf: d.callWallConf || 0, oi: d.callWallOI || 0, dist,
          regime: d.regime, at: d.at, noData: !hasCall,
          status: !hasCall ? "—" : dist < -0.25 ? "broken" : dist < 0.5 ? "testing" : "approaching",
        };
        if (isPinned) callPinned.push(row);
        else if (hasCall && d.callWallConf >= 20 && Math.abs(dist) <= 2.5) callHits.push(row);
      }
    });
    // Ensure both pinned tickers are present even if not in data
    PINNED.forEach(t => {
      if (!pinnedTickers[t]) {
        const stub = { ticker: t, spot: 0, wall: 0, conf: 0, oi: 0, dist: 999, regime: "positive", at: "ETF", noData: true, status: "—" };
        putPinned.push(stub);
        callPinned.push(stub);
      }
    });
    putPinned.sort((a, b) => PINNED.indexOf(a.ticker) - PINNED.indexOf(b.ticker));
    callPinned.sort((a, b) => PINNED.indexOf(a.ticker) - PINNED.indexOf(b.ticker));
    putHits.sort((a, b) => Math.abs(a.dist) - Math.abs(b.dist));
    callHits.sort((a, b) => Math.abs(a.dist) - Math.abs(b.dist));
    return { putHits, callHits, putPinned, callPinned };
  }, [data]);

  const total = putHits.length + callHits.length;

  const statusBadge = (s) => {
    const colors = { testing: { bg: "rgba(226,75,74,0.12)", color: "#A32D2D" }, approaching: { bg: "rgba(186,117,23,0.1)", color: "#BA7517" }, broken: { bg: "rgba(128,128,128,0.1)", color: "#666" } };
    const c = colors[s] || colors.approaching;
    return <span style={{ fontSize: "9px", padding: "1px 6px", borderRadius: "3px", background: c.bg, color: c.color, fontWeight: 500, textTransform: "uppercase" }}>{s}</span>;
  };

  const WallRow = ({ h, accent, borderAccent, bgAccent, onSelect, isLast }) => (
    <div onClick={() => onSelect(h.ticker)} style={{
      padding: "8px 12px", cursor: "pointer",
      borderBottom: isLast ? "none" : `1px solid ${borderAccent}`,
    }} onMouseEnter={e => e.currentTarget.style.background = bgAccent} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "4px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <span style={{ fontWeight: 600, fontSize: "13px" }}>{h.ticker}</span>
          <Regime r={h.regime}/>
          {!h.noData && h.conf >= 20 && Math.abs(h.dist) <= 2.5 && statusBadge(h.status)}
        </div>
        <span style={{ fontSize: "12px", fontWeight: 500, fontFamily: "monospace" }}>{h.spot > 0 ? `$${h.spot.toFixed(2)}` : "—"}</span>
      </div>
      {h.noData ? (
        <div style={{ fontSize: "11px", opacity: 0.4 }}>{loading ? "Fetching live chain data..." : "Wall data unavailable — look up ticker for live calc"}</div>
      ) : (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: "11px" }}>
          <div>
            <span style={{ opacity: 0.5 }}>Wall </span>
            <span style={{ fontWeight: 500, color: accent }}>${h.wall.toFixed(2)}</span>
            <span style={{ opacity: 0.5 }}> · {h.conf.toFixed(0)}% of OI</span>
            <span style={{ opacity: 0.4 }}> · {h.oi.toLocaleString()} cts</span>
          </div>
          <span style={{ fontWeight: 500, fontFamily: "monospace", color: Math.abs(h.dist) < 0.5 ? accent : "inherit" }}>
            {h.dist > 0 ? "+" : ""}{h.dist.toFixed(1)}%
          </span>
        </div>
      )}
    </div>
  );

  const WallColumn = ({ pinned, hits, type, onSelect }) => {
    const isCall = type === "call";
    const accent = isCall ? "#A32D2D" : "#0F6E56";
    const bgAccent = isCall ? "rgba(226,75,74,0.03)" : "rgba(29,158,117,0.03)";
    const borderAccent = isCall ? "rgba(226,75,74,0.2)" : "rgba(29,158,117,0.2)";
    const pinnedBg = isCall ? "rgba(226,75,74,0.06)" : "rgba(29,158,117,0.06)";
    return <div style={{ border: `1px solid ${borderAccent}`, borderRadius: "10px", overflow: "hidden" }}>
      <div style={{ padding: "10px 12px", background: bgAccent, borderBottom: `1px solid ${borderAccent}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: "12px", fontWeight: 600, color: accent }}>{isCall ? "Call Wall" : "Put Wall"} · {isCall ? "Resistance" : "Support"}</div>
          <div style={{ fontSize: "10px", opacity: 0.5, marginTop: "1px" }}>{hits.length} alert{hits.length !== 1 ? "s" : ""} within 2.5%</div>
        </div>
      </div>
      {/* Pinned SPY/QQQ — always shown */}
      {pinned.map((h, i) => (
        <div key={h.ticker} style={{ background: pinnedBg, borderBottom: `1px solid ${borderAccent}` }}>
          <WallRow h={h} accent={accent} borderAccent={borderAccent} bgAccent={pinnedBg} onSelect={onSelect} isLast={false}/>
        </div>
      ))}
      {/* Proximity alerts */}
      {hits.length === 0 && <div style={{ padding: "16px", textAlign: "center", fontSize: "11px", opacity: 0.4 }}>No other tickers within 2.5%</div>}
      {hits.map((h, i) => (
        <WallRow key={h.ticker} h={h} accent={accent} borderAccent={borderAccent} bgAccent={bgAccent} onSelect={onSelect} isLast={i === hits.length - 1}/>
      ))}
    </div>;
  };

  return <div>
    <div style={{ fontSize: "12px", opacity: 0.6, lineHeight: 1.5, padding: "8px 12px", background: "rgba(74,144,217,0.04)", borderRadius: "8px", marginBottom: "12px" }}>
      SPY/QQQ walls always shown. {total > 0 ? `${total} other ticker${total !== 1 ? "s" : ""} within 2.5% of a concentrated wall (≥20% OI).` : "No other tickers currently within 2.5% of a concentrated wall."} Breaches can trigger accelerated moves as dealer hedges unwind.
      {loading && <span style={{ marginLeft: "6px", color: "#4A90D9", fontWeight: 500 }}>⏳ Fetching live SPY/QQQ walls...</span>}
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
      <WallColumn pinned={putPinned} hits={putHits} type="put" onSelect={onSelect}/>
      <WallColumn pinned={callPinned} hits={callHits} type="call" onSelect={onSelect}/>
    </div>
  </div>;
}

// ─── VOL DIVERGENCE PANEL ──────────────────────────────────────────
function VolDivergence({ divergences, onSelect }) {
  if (!divergences.length) return (
    <div style={{ border: "1px solid rgba(74,144,217,0.15)", borderRadius: "10px", padding: "30px 20px", textAlign: "center" }}>
      <div style={{ fontSize: "24px", opacity: 0.85, marginBottom: "8px" }}>⊘</div>
      <div style={{ fontSize: "14px", opacity: 0.82, marginBottom: "6px" }}>No vol divergences detected</div>
      <div style={{ fontSize: "12px", opacity: 0.85, lineHeight: 1.5, maxWidth: "440px", margin: "0 auto", fontFamily: "-apple-system,sans-serif" }}>
        This scanner flags three rare signals: <strong>OTM puts bid into strength</strong> (informed downside), <strong>OTM calls bid into weakness</strong> (informed upside), and <strong>spot-up / vol-up</strong> — when implied vol rises alongside price instead of falling, signaling speculative call chasing and FOMO. The Bloomberg "spot-up/vol-up" correlation historically marks euphoric tops. When any of these fire, pay attention.
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ fontSize: "12px", opacity: 0.828, marginBottom: "12px", lineHeight: 1.5, fontFamily: "-apple-system,sans-serif" }}>
        {divergences.length} divergence{divergences.length > 1 ? "s" : ""} detected — option pricing contradicts normal spot-vol relationship, suggesting informed positioning or speculative excess.
      </div>
      {divergences.map((dv, idx) => {
        const isSpotUpVolUp = dv.divType === "spotUpVolUp";
        const isSpotDownVolDown = dv.divType === "spotDownVolDown";
        const isCorrelation = isSpotUpVolUp || isSpotDownVolDown;
        const isPut = dv.isPutDiv;

        // Color coding: spot-up/vol-up = amber/warning (speculative excess), classic div = red/green
        const accentColor = isSpotUpVolUp ? "#BA7517" : isSpotDownVolDown ? "#6B5B95" : isPut ? "#A32D2D" : "#0F6E56";
        const accentBg = isSpotUpVolUp ? "rgba(186,117,23,0.06)" : isSpotDownVolDown ? "rgba(107,91,149,0.06)" : isPut ? "rgba(226,75,74,0.06)" : "rgba(29,158,117,0.06)";
        const badgeBg = isSpotUpVolUp ? "rgba(186,117,23,0.12)" : isSpotDownVolDown ? "rgba(107,91,149,0.12)" : isPut ? "rgba(226,75,74,0.12)" : "rgba(29,158,117,0.12)";
        const sevColor = dv.severity > 70 ? "#A32D2D" : dv.severity > 40 ? "#BA7517" : "#888780";

        // Build description based on divergence type
        let description = "";
        let whyItMatters = "";
        let metricsStrip = [];

        if (isSpotUpVolUp) {
          description = `${dv.ticker} shares up ${Math.abs(dv.shareChg).toFixed(1)}% but 25Δ call IV at ${dv.callIV.toFixed(0)}%${dv.callIVRicher ? ` — richer than put IV (${dv.putIV.toFixed(0)}%)` : ""}. Call volume ${dv.callDominance}% of total near-term flow. IV should fall as spot rises — instead, call demand is bidding vol higher.`;
          whyItMatters = `The normal relationship between spot and vol is negative: when stocks go up, uncertainty drops and IV falls. When both rise together, it means traders are chasing upside through long calls so aggressively that they're bidding up premiums despite the move already happening. This "spot-up/vol-up" correlation — tracked by Bloomberg as a key regime indicator — historically marks speculative excess and precedes sharp reversals. The 2024 AI melt-up and the Kospi's 7% reversal from 8,000 are recent examples.`;
          metricsStrip = [
            { l: "25Δ Call IV", v: `${dv.callIV.toFixed(0)}%`, s: dv.callIVRicher ? "richer than puts" : "elevated" },
            { l: "Put IV", v: `${dv.putIV.toFixed(0)}%` },
            { l: "Risk reversal", v: dv.riskRevSpread ? `${dv.riskRevSpread > 0 ? "+" : ""}${dv.riskRevSpread.toFixed(1)}pts` : "—", s: dv.callIVRicher ? "calls over puts" : "" },
            { l: "Call dominance", v: `${dv.callDominance}%`, s: `${(dv.callVol||0).toLocaleString()} calls` },
            { l: "Spot change", v: <span style={{ color: "#0F6E56", fontWeight: 500 }}>+{Math.abs(dv.shareChg).toFixed(1)}%</span> },
            { l: "Severity", v: <span style={{ color: sevColor, fontWeight: 500 }}>{dv.severity}/100</span> },
          ];
        } else if (isSpotDownVolDown) {
          description = `${dv.ticker} shares down ${Math.abs(dv.shareChg).toFixed(1)}% but put IV only ${dv.putIV.toFixed(0)}% — IV should spike into a selloff but isn't. Either the market is complacent about downside risk, or informed participants see this as a buying opportunity.`;
          whyItMatters = `When stocks sell off, put IV normally spikes as traders scramble for protection. When it stays flat or falls, it means either the market doesn't believe the selloff will extend (informed bottom) or nobody is hedging (dangerous complacency). This "spot-down/vol-down" divergence is the inverse of the FOMO signal — it marks situations where the options market is not confirming the equity weakness.`;
          metricsStrip = [
            { l: "Put IV", v: `${dv.putIV.toFixed(0)}%`, s: "not spiking" },
            { l: "Call IV", v: `${dv.callIV.toFixed(0)}%` },
            { l: "Call dominance", v: `${dv.callDominance}%` },
            { l: "Near-term vol", v: (dv.totalVol||0).toLocaleString(), s: "contracts" },
            { l: "Spot change", v: <span style={{ color: "#A32D2D", fontWeight: 500 }}>{dv.shareChg.toFixed(1)}%</span> },
            { l: "Severity", v: <span style={{ color: sevColor, fontWeight: 500 }}>{dv.severity}/100</span> },
          ];
        } else {
          // Classic OTM divergence
          description = isPut
            ? `${dv.ticker} shares are up ${Math.abs(dv.shareChg).toFixed(1)}% but ${dv.dte}DTE ${fmtP(dv.strike)} puts (${dv.otmPct.toFixed(0)}% OTM) show ${dv.ivJump.toFixed(0)}% IV. Volume is ${dv.volume.toLocaleString()} vs ${dv.avgOI.toLocaleString()} avg OI (${dv.volOIRatio.toFixed(1)}x). ${dv.chainStrikesElevated}/${dv.chainTotalStrikes} strikes show elevated IV — chain-wide, not a single print.`
            : `${dv.ticker} shares are down ${Math.abs(dv.shareChg).toFixed(1)}% but ${dv.dte}DTE ${fmtP(dv.strike)} calls (${dv.otmPct.toFixed(0)}% OTM) show ${dv.ivJump.toFixed(0)}% IV. Volume is ${dv.volume.toLocaleString()} vs ${dv.avgOI.toLocaleString()} avg OI (${dv.volOIRatio.toFixed(1)}x). ${dv.chainStrikesElevated}/${dv.chainTotalStrikes} strikes show elevated IV — chain-wide, not a single print.`;
          whyItMatters = isPut
            ? `Someone with size is buying OTM puts into a rising stock — paying elevated premiums to position for downside. This pattern precedes earnings misses, guidance cuts, fraud disclosures, and regulatory actions. The chain-wide IV expansion (${dv.chainStrikesElevated} strikes) confirms this isn't a one-off hedge — it's systematic positioning.`
            : `Someone with size is buying OTM calls into a falling stock — paying elevated premiums to position for upside. This pattern precedes M&A announcements, activist involvement, FDA approvals, and earnings surprises. The chain-wide IV expansion (${dv.chainStrikesElevated} strikes) confirms this isn't a stray print — it's deliberate accumulation.`;
          metricsStrip = [
            { l: "IV level", v: `${dv.ivJump.toFixed(0)}%`, s: `${(dv.priorIV||0).toFixed(0)}→${(dv.currentIV||0).toFixed(0)}` },
            { l: "Option Δ", v: `+${(dv.optPriceChg||0).toFixed(0)}%` },
            { l: "Vol / OI", v: `${(dv.volOIRatio||0).toFixed(1)}x`, s: `${(dv.volume||0).toLocaleString()} vol` },
            { l: "Chain spread", v: `${dv.chainStrikesElevated}/${dv.chainTotalStrikes}`, s: "strikes elevated" },
            { l: "Eq equiv", v: <EqBadge shares={isPut ? -(dv.eqShares||0) : (dv.eqShares||0)} size="sm" /> },
            { l: "Severity", v: <span style={{ color: sevColor, fontWeight: 500 }}>{dv.severity}/100</span> },
          ];
        }

        return (
          <div key={dv.ticker + idx} onClick={() => onSelect(dv.ticker)}
            style={{ border: "1px solid rgba(74,144,217,0.15)", borderRadius: "10px", overflow: "hidden", marginBottom: "12px", cursor: "pointer" }}>
            {/* Header */}
            <div style={{ padding: "14px 16px", background: accentBg, borderBottom: "1px solid rgba(74,144,217,0.1)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "6px", flexWrap: "wrap" }}>
                <span style={{ fontSize: "22px", fontWeight: 500, fontFamily: "'SF Mono',monospace" }}>{dv.ticker}</span>
                <span style={{ fontSize: "15px", opacity: 0.825 }}>{fmtP(dv.spot)}</span>
                <span style={{ fontSize: "12px", fontWeight: 500, color: dv.shareChg > 0 ? "#0F6E56" : "#A32D2D" }}>
                  {dv.shareChg > 0 ? "▲" : "▼"} {Math.abs(dv.shareChg).toFixed(1)}%
                </span>
                <span style={{ fontSize: "10px", padding: "2px 8px", borderRadius: "4px", background: "rgba(74,144,217,0.08)" }}>{dv.at}</span>
                <span style={{ marginLeft: "auto", fontSize: "11px", padding: "2px 10px", borderRadius: "999px", fontWeight: 500, background: badgeBg, color: accentColor }}>
                  {dv.type}
                </span>
              </div>
              <div style={{ fontSize: "14px", fontWeight: 500, color: accentColor, marginBottom: "6px" }}>
                {dv.signal}
              </div>
              <div style={{ fontSize: "13px", lineHeight: 1.65, opacity: 0.82, fontFamily: "-apple-system,sans-serif" }}>
                {description}
              </div>
            </div>

            {/* Metrics strip */}
            <div style={{ display: "grid", gridTemplateColumns: `repeat(${metricsStrip.length}, 1fr)`, gap: "1px", background: "rgba(74,144,217,0.06)" }}>
              {metricsStrip.map((m, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.7)", padding: "8px 10px" }}>
                  <div style={{ fontSize: "9px", textTransform: "uppercase", opacity: 0.82, letterSpacing: "0.3px", marginBottom: "2px" }}>{m.l}</div>
                  <div style={{ fontSize: "13px", fontWeight: 500 }}>{m.v}</div>
                  {m.s && <div style={{ fontSize: "10px", opacity: 0.82555 }}>{m.s}</div>}
                </div>
              ))}
            </div>

            {/* What it means */}
            <div style={{ padding: "10px 16px", fontSize: "12px", lineHeight: 1.55, fontFamily: "-apple-system,sans-serif" }}>
              <div style={{ opacity: 0.828, fontSize: "9px", textTransform: "uppercase", letterSpacing: "0.4px", marginBottom: "4px" }}>Why this matters</div>
              <div style={{ opacity: 0.825 }}>{whyItMatters}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Scanner({ data, onSelect }) {
  const sorted = useMemo(()=>[...data].sort((a,b)=>b.sq-a.sq),[data]);
  return <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",overflow:"hidden"}}>
    <div style={{display:"grid",gridTemplateColumns:"56px 62px 64px 68px minmax(56px,1fr) 64px 52px 58px",padding:"8px 10px",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.3px",opacity:0.45,fontWeight:500,background:"rgba(128,128,128,0.04)",borderBottom:"1px solid rgba(128,128,128,0.1)"}}><span>Ticker</span><span>Regime</span><span>Flip</span><span>Squeeze</span><span style={{textAlign:"right"}}>Dealer/1%</span><span style={{textAlign:"right"}}>Δ P/C</span><span style={{textAlign:"right"}}>Skew</span><span style={{textAlign:"right"}}>Level</span></div>
    {sorted.map((d,i)=><div key={d.ticker} onClick={()=>onSelect(d.ticker)} style={{display:"grid",gridTemplateColumns:"56px 62px 64px 68px minmax(56px,1fr) 64px 52px 58px",padding:"7px 10px",alignItems:"center",cursor:"pointer",fontSize:"13px",borderBottom:i<sorted.length-1?"1px solid rgba(128,128,128,0.07)":"none"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(128,128,128,0.04)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <span style={{fontWeight:500}}>{d.ticker}</span><Regime r={d.regime}/><span style={{fontFamily:"monospace",fontSize:"12px",color:Math.abs(d.flipDist)<1?"#E24B4A":Math.abs(d.flipDist)<2?"#BA7517":"inherit"}}>{fmtPct(d.flipDist)}</span><Squeeze score={d.sq}/><span style={{textAlign:"right"}}><EqBadge shares={d.regime==="positive"?d.dspct:-d.dspct} size="sm"/></span><span style={{textAlign:"right",fontFamily:"monospace",fontSize:"12px",color:d.dpc>1.5?"#E24B4A":d.dpc<0.7?"#1D9E75":"inherit"}}>{d.dpc.toFixed(2)}</span><span style={{textAlign:"right",fontFamily:"monospace",fontSize:"12px",color:Math.abs(d.skewZ)>2?"#E24B4A":Math.abs(d.skewZ)>1.5?"#BA7517":"inherit"}}>{d.skewZ.toFixed(1)}σ</span><span style={{textAlign:"right",fontSize:"10px",padding:"1px 6px",borderRadius:"4px",background:"rgba(128,128,128,0.08)"}}>{d.at}</span>
    </div>)}
  </div>;
}

function App() {
  const [tab, setTab] = useState("lookup");
  const [data, setData] = useState([]);
  const [lookupD, setLookupD] = useState(null);
  const [recent, setRecent] = useState([]);
  const [lastRef, setLastRef] = useState(null);
  const [snapDate, setSnapDate] = useState(null);
  const [volDiv, setVolDiv] = useState([]);
  const [volDivLoading, setVolDivLoading] = useState(false);
  const [volDivScanned, setVolDivScanned] = useState(false);
  const [marketState, setMarketState] = useState(() => getMarketState());
  const [nextRefresh, setNextRefresh] = useState(null);
  const [wallsLoading, setWallsLoading] = useState(false);
  const pollRef = useRef(null);
  const countdownRef = useRef(null);

  // Core data refresh — fetches snapshot then optionally refreshes SPY/QQQ walls live
  const refresh = useCallback(async (opts = {}) => {
    const { silent = false, refreshWalls = false } = opts;
    if (!silent) setLastRef(new Date());
    const ms = getMarketState();
    setMarketState(ms);

    try {
      const r = await fetch("/.netlify/functions/snapshot");
      if (!r.ok) throw new Error("No snapshot available");
      const snapshot = await r.json();
      if (snapshot && snapshot.tickers && snapshot.tickers.length > 0) {
        const snapDateStr = snapshot.date || "";
        const todayStr = new Date().toISOString().slice(0, 10);
        if (snapDateStr === todayStr) {
          setSnapDate(snapshot.capturedAt ? new Date(snapshot.capturedAt).toLocaleString() : snapshot.date);
        } else {
          setSnapDate(snapshot.capturedAt ? `${snapshot.date} (prior session)` : `${snapshot.date} (prior session)`);
        }
        const mapped = snapshot.tickers.map((t, i) => {
          const base = emptyTicker(t.ticker);
          return { ...base, ...t, at: assetType(t.ticker), trades: t.sweeps || [], _live: t._live };
        });
        setData(mapped);
        if (snapshot.volDivergences && snapshot.volDivergences.length > 0) {
          setVolDiv(snapshot.volDivergences);
        } else {
          setVolDiv([]);
        }
      }
    } catch(e) {
      console.warn("Snapshot load failed, trying live:", e);
      try {
        const liveResults = await Promise.all(
          DEFAULT_WATCHLIST.map((t, i) => fetchTickerLive(t, i))
        );
        setData(liveResults);
        setSnapDate("live");
      } catch(e2) { console.warn("Live fallback failed:", e2); }
    }

    // During market hours, always refresh SPY/QQQ walls live after loading snapshot
    if (refreshWalls || ms.shouldPoll) {
      refreshPinnedWalls();
    }
  }, []);

  // Refresh SPY/QQQ walls live — no one-time gate, runs on every poll cycle
  const refreshPinnedWalls = useCallback(async () => {
    setWallsLoading(true);
    const pinned = ["SPY", "QQQ"];
    try {
      const liveResults = await Promise.all(pinned.map((t, i) => fetchTickerLive(t, i)));
      setData(prev => {
        const updated = [...prev];
        liveResults.forEach(live => {
          if (!live || !live.spot) return;
          const idx = updated.findIndex(d => d.ticker === live.ticker);
          if (idx >= 0) updated[idx] = { ...updated[idx], ...live };
          else updated.push(live);
        });
        return updated;
      });
    } catch(e) {
      console.warn("Failed to fetch pinned walls:", e);
    }
    setWallsLoading(false);
  }, []);

  // Initial load
  useEffect(() => { refresh({ refreshWalls: true }); }, [refresh]);

  // Auto-polling: every 15 min during market hours, stop after close
  useEffect(() => {
    // Clear any existing interval
    if (pollRef.current) clearInterval(pollRef.current);
    if (countdownRef.current) clearInterval(countdownRef.current);

    const ms = getMarketState();
    if (!ms.shouldPoll) {
      // Not market hours — check every 60s if market has opened
      pollRef.current = setInterval(() => {
        const current = getMarketState();
        setMarketState(current);
        if (current.shouldPoll) {
          // Market just opened — trigger refresh and restart the effect
          refresh({ silent: true, refreshWalls: true });
          setNextRefresh(new Date(Date.now() + POLL_INTERVAL_MS));
        }
      }, 60000);
      return () => {
        clearInterval(pollRef.current);
        clearInterval(countdownRef.current);
      };
    }

    // Market is open — set up polling
    setNextRefresh(new Date(Date.now() + POLL_INTERVAL_MS));

    pollRef.current = setInterval(() => {
      const current = getMarketState();
      setMarketState(current);
      if (current.shouldPoll) {
        refresh({ silent: true, refreshWalls: true });
        setNextRefresh(new Date(Date.now() + POLL_INTERVAL_MS));
      } else {
        // Market closed — stop polling, do one final refresh to lock in EOD
        refresh({ silent: true });
        clearInterval(pollRef.current);
        setNextRefresh(null);
      }
    }, POLL_INTERVAL_MS);

    // Countdown timer updates every 30s
    countdownRef.current = setInterval(() => {
      setMarketState(getMarketState());
    }, 30000);

    return () => {
      clearInterval(pollRef.current);
      clearInterval(countdownRef.current);
    };
  }, [refresh]);

  const lookup = useCallback(async (ticker) => {
    setTab("lookup");
    setRecent(p=>[ticker,...p.filter(t=>t!==ticker)].slice(0,8));
    const live = await fetchTickerLive(ticker, 999);
    setLookupD(live);
  },[]);
  const opex = nextOpex();
  const narrative = useMemo(()=>{if(!data.length)return"";const spy=data.find(d=>d.ticker==="SPY");if(!spy)return"";const eq=fmtEq(spy.regime==="positive"?spy.dspct:-spy.dspct);const neg=data.filter(d=>d.regime==="negative").length;let n=`SPY ${spy.regime} gamma — ${eq.label} ${spy.regime==="positive"?"counter":"pro"}-trend per 1%. Flip ${fmtP(spy.gammaFlip)}, ${Math.abs(spy.flipDist).toFixed(1)}% ${spy.flipDist>0?"above":"below"}.`;const tS=[...data].sort((a,b)=>b.sq-a.sq)[0];if(tS.sq>50)n+=` ${tS.ticker} squeeze ${Math.round(tS.sq)}.`;n+=` ${neg}/${data.length} negative gamma.`;if(opex.isNear)n+=` OPEX ${opex.days}d — amplifying.`;return n;},[data,opex]);
  const alerts = useMemo(()=>data.filter(d=>d.sq>50||Math.abs(d.skewZ)>2||d.pcp>90||d.pcp<10).sort((a,b)=>b.sq-a.sq).slice(0,4).map(d=>{const r=[];if(d.sq>50)r.push(`sq${Math.round(d.sq)}`);if(Math.abs(d.skewZ)>2)r.push(`${d.skewZ.toFixed(1)}σ`);if(d.pcp>90||d.pcp<10)r.push(`P/C ${d.pcp}th`);return{...d,reasons:r};}),[data]);
  const scanVolDiv = useCallback(async () => {
    if (volDivLoading) return;
    setVolDivLoading(true);
    try {
      const tickers = data.length > 0 ? data.map(d => d.ticker) : DEFAULT_WATCHLIST;
      const results = await fetchVolDivergencesLive(tickers);
      setVolDiv(results);
      setVolDivScanned(true);
    } catch(e) { console.warn("Vol div scan failed:", e); }
    setVolDivLoading(false);
  }, [data, volDivLoading]);

  const handleTab = useCallback((id) => {
    setTab(id);
    if (id === "voldiv" && !volDivScanned && volDiv.length === 0) scanVolDiv();
    if (id === "walls") refreshPinnedWalls();
  }, [volDivScanned, volDiv, scanVolDiv, refreshPinnedWalls]);
  const wallProxCount = useMemo(() => {
    return data.filter(d => {
      if (!d.spot || d.spot <= 0) return false;
      const callClose = d.callWall > 0 && d.callWallConf >= 20 && Math.abs((d.callWall - d.spot) / d.spot * 100) <= 2.5;
      const putClose = d.putWall > 0 && d.putWallConf >= 20 && Math.abs((d.spot - d.putWall) / d.spot * 100) <= 2.5;
      return callClose || putClose;
    }).length;
  }, [data]);
  const tabs=[{id:"lookup",label:"⌕ Ticker lookup"},{id:"scanner",label:"Scanner"},{id:"walls",label:wallProxCount > 0 ? `Walls (${wallProxCount})` : "Walls"},{id:"voldiv",label:volDivLoading ? "⏳ Scanning..." : volDiv.length ? `⚡ Vol div (${volDiv.length})` : "Vol div"},{id:"optvol",label:"Options volume"},{id:"divergence",label:"Cross-asset"}];

  const isLive = data.some(d=>d._live);

  // Countdown to next refresh
  const countdownText = useMemo(() => {
    if (!nextRefresh || !marketState.shouldPoll) return marketState.nextPollLabel || "";
    const diff = nextRefresh - Date.now();
    if (diff <= 0) return "Refreshing...";
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return `Next refresh ${m}m ${s < 10 ? "0" : ""}${s}s`;
  }, [nextRefresh, marketState]);

  // Market status badge color and label
  const statusColor = marketState.isMarketOpen
    ? (isLive ? "#0F6E56" : "#BA7517")
    : (marketState.isPreMarket ? "#BA7517" : "#888780");
  const statusBg = marketState.isMarketOpen
    ? (isLive ? "rgba(29,158,117,0.12)" : "rgba(186,117,23,0.1)")
    : (marketState.isPreMarket ? "rgba(186,117,23,0.1)" : "rgba(128,128,128,0.08)");
  const statusLabel = marketState.isMarketOpen
    ? (isLive ? "● LIVE" : "● UPDATING")
    : (marketState.isPreMarket ? "◐ PRE-MKT" : marketState.isPostMarket ? "◑ EOD HOLD" : "◌ CLOSED");

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
      <div><div style={{fontSize:"10px",textTransform:"uppercase",letterSpacing:"1px",opacity:0.35,marginBottom:"2px",color:"#4A90D9"}}>JonesTrading · End-of-day options positioning</div><div style={{fontSize:"20px",fontWeight:500,fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif",color:"#1a2a3a"}}>Agent v1</div></div>
      <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"4px",background:statusBg,color:statusColor,whiteSpace:"nowrap",fontWeight:500}}>{statusLabel}</span>
        <button onClick={() => refresh({ refreshWalls: true })} style={{background:"none",border:"1px solid rgba(74,144,217,0.25)",borderRadius:"6px",padding:"4px 12px",fontSize:"12px",cursor:"pointer",color:"#2B6CB0"}}>Refresh</button>
        <div style={{fontSize:"10px",opacity:0.3,whiteSpace:"nowrap"}}>{lastRef ? lastRef.toLocaleTimeString() : ""}</div>
      </div>
    </div>
    <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
      <div style={{padding:"6px 12px",borderRadius:"6px",fontSize:"12px",background:opex.isNear?"rgba(226,75,74,0.1)":"rgba(128,128,128,0.06)",color:opex.isNear?"#A32D2D":"inherit",display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap"}}><span style={{fontWeight:500}}>OPEX</span>{opex.date} · <span style={{fontWeight:500}}>{opex.days}d {opex.hours}h</span>{opex.isNear&&<span style={{fontWeight:500}}>⚠</span>}</div>
      {snapDate && <div style={{padding:"6px 12px",borderRadius:"6px",fontSize:"12px",background:"rgba(74,144,217,0.08)",color:"#2B6CB0",whiteSpace:"nowrap"}}><span style={{fontWeight:500}}>{snapDate === "live" ? "Live" : "Snapshot"}</span> {snapDate === "live" ? new Date().toLocaleString() : snapDate}</div>}
      {countdownText && <div style={{padding:"6px 12px",borderRadius:"6px",fontSize:"11px",background:marketState.shouldPoll?"rgba(29,158,117,0.06)":"rgba(128,128,128,0.05)",color:marketState.shouldPoll?"#0F6E56":"#888780",whiteSpace:"nowrap",fontFamily:"monospace"}}>{countdownText}</div>}
      {alerts.map(a=><span key={a.ticker} onClick={()=>lookup(a.ticker)} style={{padding:"4px 10px",borderRadius:"4px",cursor:"pointer",background:"rgba(226,75,74,0.08)",color:"#A32D2D",fontSize:"11px",whiteSpace:"nowrap"}}>{a.ticker} {a.reasons.join(" ")}</span>)}
    </div>
    <div style={{padding:"10px 14px",borderRadius:"8px",fontSize:"12px",lineHeight:1.5,border:"1px solid rgba(128,128,128,0.08)",background:"rgba(128,128,128,0.02)",fontFamily:"-apple-system,sans-serif",marginBottom:"14px"}}><span style={{fontSize:"9px",textTransform:"uppercase",opacity:0.3,letterSpacing:"0.5px"}}>Closing brief · </span>{narrative}</div>
    <div style={{display:"flex",gap:"2px",marginBottom:"14px",borderBottom:"1px solid rgba(128,128,128,0.1)"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>handleTab(t.id)} style={{background:"none",border:"none",borderBottom:tab===t.id?"2px solid #4A90D9":"2px solid transparent",padding:"7px 14px",fontSize:"13px",cursor:"pointer",opacity:tab===t.id?1:0.4,fontWeight:tab===t.id?500:400}}>{t.label}</button>)}
    </div>
    {tab==="lookup"&&<><TickerSearch onLookup={lookup} recentLookups={recent}/>{lookupD?<VerdictCard d={lookupD} onClose={()=>setLookupD(null)}/>:<div style={{padding:"40px 20px",textAlign:"center",opacity:0.3,fontSize:"14px",lineHeight:1.6}}>Type any stock, ETF, or index ticker above to see<br/>how options positioned around today\'s close</div>}</>}
    {tab==="scanner"&&<Scanner data={data} onSelect={lookup}/>}
    {tab==="walls"&&<WallProximity data={data} onSelect={lookup} loading={wallsLoading}/>}
    {tab==="voldiv"&&<VolDivergence divergences={volDiv} onSelect={lookup}/>}
    {tab==="optvol"&&<OptionsVolume data={data} onSelect={lookup}/>}
    {tab==="divergence"&&<Divergence data={data}/>}
    <div style={{marginTop:"14px",fontSize:"10px",opacity:0.45,lineHeight:1.5}}>v1 · {marketState.shouldPoll ? "Auto-refreshing every 15 min" : marketState.isPostMarket ? "Holding end-of-day readings" : "Updates resume next trading session"} · {data.length} watchlist · {data.filter(d=>d._live).length} live · Polygon Options Starter</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
