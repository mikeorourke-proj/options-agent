<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

let USE_LIVE = true;
const POLL_INTERVAL_MS = 15 * 60 * 1000;

function getMarketState() {
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const day = et.getDay(), mins = et.getHours() * 60 + et.getMinutes();
  const isWeekday = day >= 1 && day <= 5;
  const preMarket = isWeekday && mins >= 540 && mins < 570;
  const marketOpen = isWeekday && mins >= 570 && mins < 960;
  const postMarket = isWeekday && mins >= 960 && mins < 1080;
  return { isMarketOpen: marketOpen, isPreMarket: preMarket, isPostMarket: postMarket, isWeekend: !isWeekday, shouldPoll: marketOpen, label: marketOpen ? "LIVE" : preMarket ? "PRE-MKT" : postMarket ? "POST-MKT" : "CLOSED", nextPollLabel: marketOpen ? "" : preMarket ? "Updates at 9:30 AM ET" : "Holding EOD readings" };
}

async function fetchPoly(endpoint, ticker) {
  try {
    const r = await fetch('/.netlify/functions/polygon?endpoint=' + endpoint + '&ticker=' + ticker);
    if (!r.ok) throw new Error('Poly ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch (e) { console.warn("Polygon:", e.message); return null; }
}

// Normal CDF approximation
function normalCDF(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d1 = 0.3989422802 * Math.exp(-z * z / 2);
  const p = 1 - d1 * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  return z >= 0 ? p : 1 - p;
}

function histPercentile(currentVal, historyValues) {
  if (!historyValues || historyValues.length < 3) return null;
  const valid = historyValues.filter(v => v !== null && v !== undefined && !isNaN(v));
  if (valid.length < 3) return null;
  return Math.round((valid.filter(v => v < currentVal).length / valid.length) * 100);
}

function findSimilarReadings(currentVal, historyPoints, metric, tolerance) {
  if (!historyPoints || historyPoints.length < 5) return [];
  const tol = tolerance || Math.abs(currentVal * 0.15) || 0.5;
  return historyPoints.filter(p => p[metric] !== undefined && p[metric] !== null && Math.abs(p[metric] - currentVal) <= tol)
    .sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5)
    .map(p => ({ date: p.date, value: p[metric], spot: p.spot }));
}

// ─── SELF-COMPUTED GEX ENGINE ──────────────────────────────────────
function computeFromChain(d, chainData) {
  if (!chainData || !chainData.results || !chainData.results.length) return d;
  if (!d._live) return d;
  const contracts = chainData.results;
  const now = new Date();
  const spot = d.spot;
  const valid = contracts.filter(c => c.details && c.greeks && c.details.expiration_date && c.details.strike_price);
  if (valid.length === 0) return d;
  const todayETDate = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const todayMidnight = new Date(todayETDate.getFullYear(), todayETDate.getMonth(), todayETDate.getDate());

  const nearTerm = valid.filter(c => {
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const dte = Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5);
    return dte >= 1 && dte <= 60;
  });

  let netGex = 0;
  const strikeGex = {}, strikeCallOI = {}, strikePutOI = {};
  nearTerm.forEach(c => {
    const isCall = c.details.contract_type === "call";
    const gamma = Math.abs(c.greeks.gamma || 0);
    const oi = c.open_interest || 0;
    const strike = c.details.strike_price;
    if (oi < 10) return;
    const contractGex = gamma * oi * 100 * d.spot * d.spot * 0.01;
    const signedGex = isCall ? contractGex : -contractGex;
    netGex += signedGex;
    if (!strikeGex[strike]) strikeGex[strike] = 0;
    strikeGex[strike] += signedGex;
    if (!strikeCallOI[strike]) strikeCallOI[strike] = 0;
    if (!strikePutOI[strike]) strikePutOI[strike] = 0;
    if (isCall) strikeCallOI[strike] += oi; else strikePutOI[strike] += oi;
  });

  const strikes = Object.keys(strikeGex).map(Number).sort((a, b) => a - b);
  if (strikes.length > 0) {
    d.netGex = netGex;
    d.regime = netGex > 0 ? "positive" : "negative";
    d.dspct = Math.abs(netGex) / Math.max(d.spot, 1);

    // Gamma Flip / HVL
    let cumGex = 0, flipStrike = d.spot, foundFlip = false;
    for (let i = 0; i < strikes.length; i++) {
      const prevCum = cumGex;
      cumGex += strikeGex[strikes[i]];
      if ((prevCum <= 0 && cumGex > 0) || (prevCum >= 0 && cumGex < 0)) {
        flipStrike = i > 0 ? strikes[i-1] + (strikes[i] - strikes[i-1]) * (Math.abs(prevCum) / (Math.abs(prevCum) + Math.abs(cumGex))) : strikes[i];
        foundFlip = true; break;
      }
    }
    if (!foundFlip || Math.abs(flipStrike - d.spot) / d.spot > 0.20) flipStrike = d.spot;
    d.gammaFlip = flipStrike;
    d.flipDist = ((d.spot - d.gammaFlip) / d.spot) * 100;
    d.hvl = flipStrike;

    // Call wall
    let maxCallOI = 0, callWallStrike = d.spot * 1.02;
    const callOIAboveSpot = {};
    Object.entries(strikeCallOI).forEach(([s, oi]) => {
      const sn = Number(s);
      if (sn >= d.spot * 0.98) { callOIAboveSpot[sn] = oi; if (oi > maxCallOI) { maxCallOI = oi; callWallStrike = sn; } }
    });
    d.callWall = callWallStrike;
    const totalCallOIAbove = Object.values(callOIAboveSpot).reduce((s, v) => s + v, 0);
    d.callWallConf = totalCallOIAbove > 0 ? (maxCallOI / totalCallOIAbove * 100) : 0;
    d.callWallOI = maxCallOI;

    // Put wall
    let maxPutOI = 0, putWallStrike = d.spot * 0.98;
    const putOIBelowSpot = {};
    Object.entries(strikePutOI).forEach(([s, oi]) => {
      const sn = Number(s);
      if (sn <= d.spot * 1.02) { putOIBelowSpot[sn] = oi; if (oi > maxPutOI) { maxPutOI = oi; putWallStrike = sn; } }
    });
    d.putWall = putWallStrike;
    const totalPutOIBelow = Object.values(putOIBelowSpot).reduce((s, v) => s + v, 0);
    d.putWallConf = totalPutOIBelow > 0 ? (maxPutOI / totalPutOIBelow * 100) : 0;
    d.putWallOI = maxPutOI;

    // Max pain
    const nearStrikes = strikes.filter(s => Math.abs(s - d.spot) / d.spot < 0.10);
    if (nearStrikes.length === 0) nearStrikes.push(...strikes.filter(s => Math.abs(s - d.spot) / d.spot < 0.20));
    let minPayout = Infinity, maxPainStrike = d.spot;
    nearStrikes.forEach(pinPrice => {
      let totalPayout = 0;
      Object.entries(strikeCallOI).forEach(([s, oi]) => { if (pinPrice > Number(s)) totalPayout += (pinPrice - Number(s)) * oi * 100; });
      Object.entries(strikePutOI).forEach(([s, oi]) => { if (Number(s) > pinPrice) totalPayout += (Number(s) - pinPrice) * oi * 100; });
      if (totalPayout < minPayout) { minPayout = totalPayout; maxPainStrike = pinPrice; }
    });
    d.maxPain = maxPainStrike;
  }

  // Delta-weighted flow
  let callDeltaFlow = 0, putDeltaFlow = 0, zdteCallFlow = 0, zdtePutFlow = 0, openCallFlow = 0, openPutFlow = 0;
  let totalVol = 0, zdteVol = 0, openVol = 0;
  const sweeps = [];
  valid.forEach(c => {
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const dte = Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5);
    if (dte < 0 || dte > 90) return;
    const isCall = c.details.contract_type === "call";
    const delta = c.greeks.delta || 0;
    const vol = c.day ? (c.day.volume || 0) : 0;
    const deltaShares = Math.abs(delta) * vol * 100;
    const is0dte = dte === 0;
    totalVol += vol;
    if (isCall) callDeltaFlow += deltaShares; else putDeltaFlow += deltaShares;
    if (is0dte) { zdteVol += vol; if (isCall) zdteCallFlow += deltaShares; else zdtePutFlow += deltaShares; }
    else { openVol += vol; if (isCall) openCallFlow += deltaShares; else openPutFlow += deltaShares; }
    if (Math.abs(delta) > 0.7 && vol > 100) {
      sweeps.push({ type: isCall ? "C" : "P", strike: c.details.strike_price, delta, contracts: vol, side: "traded", eqShares: Math.abs(delta) * vol * 100 * (isCall ? 1 : -1), time: is0dte ? "0DTE" : dte + "d", oi: c.open_interest || 0, iv: c.implied_volatility || 0 });
    }
  });

  if (callDeltaFlow > 0 || putDeltaFlow > 0) {
    d.cdf = callDeltaFlow; d.pdf = putDeltaFlow;
    d.dpc = putDeltaFlow / Math.max(callDeltaFlow, 1);
    d.nds = callDeltaFlow - putDeltaFlow;
    d.ndf = callDeltaFlow - putDeltaFlow;
    const z = (d.dpc - 0.8) / 0.35;
    d.pcp = Math.max(1, Math.min(99, Math.round(normalCDF(z) * 100)));
  }

  d.zdteVol = zdteVol; d.zdtePct = totalVol > 0 ? (zdteVol / totalVol * 100) : 0;
  d.zdteCallFlow = zdteCallFlow; d.zdtePutFlow = zdtePutFlow;
  d.zdteDpc = zdtePutFlow / Math.max(zdteCallFlow, 1);
  d.zdteNetDelta = zdteCallFlow - zdtePutFlow;

  // 0DTE gamma regime
  let zdteGex = 0;
  valid.forEach(c => {
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const dte = Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5);
    if (dte !== 0) return;
    const isCall = c.details.contract_type === "call";
    const gamma = Math.abs(c.greeks.gamma || 0);
    const oi = c.open_interest || 0;
    if (oi < 10) return;
    zdteGex += (isCall ? 1 : -1) * gamma * oi * 100 * d.spot * d.spot * 0.01;
  });
  d.zdg = zdteGex; d.zdr = zdteGex >= 0 ? "positive" : "negative";
  d.zds = Math.abs(zdteGex) / Math.max(d.spot, 1);

  d.openVol = openVol; d.openCallFlow = openCallFlow; d.openPutFlow = openPutFlow;
  d.openDpc = openPutFlow / Math.max(openCallFlow, 1);
  d.openNetDelta = openCallFlow - openPutFlow;

  if (sweeps.length > 0) d.trades = sweeps.sort((a, b) => Math.abs(b.eqShares) - Math.abs(a.eqShares)).slice(0, 10);

  const totalDeltaShares = callDeltaFlow + putDeltaFlow;
  const advShares = d.equityVolume > 0 ? d.equityVolume : (ADV[d.ticker] || 10) * 1e6;
  d.optVolShares = totalDeltaShares; d.optVolPctADV = (totalDeltaShares / advShares) * 100; d.optVolRaw = totalVol;

  // ═══ SKEW ENGINE — Handbook Sections 5.2-5.6 ═══
  // 25-Delta Skew
  const puts25d = valid.filter(c => c.details.contract_type === "put" && c.greeks.delta && Math.abs(c.greeks.delta) > 0.20 && Math.abs(c.greeks.delta) < 0.30 && c.implied_volatility > 0);
  const calls25d = valid.filter(c => c.details.contract_type === "call" && c.greeks.delta && c.greeks.delta > 0.20 && c.greeks.delta < 0.30 && c.implied_volatility > 0);
  if (puts25d.length > 0 && calls25d.length > 0) {
    const putIV = puts25d.reduce((s, c) => s + c.implied_volatility, 0) / puts25d.length;
    const callIV = calls25d.reduce((s, c) => s + c.implied_volatility, 0) / calls25d.length;
    d.skew25d = (putIV - callIV) * 100;
    d.skewZ = d.skew25d / 3;
    d.skew25dPutIV = putIV * 100;
    d.skew25dCallIV = callIV * 100;
  }

  // 25-Delta Risk Reversal (14-45 DTE)
  const rr25dContracts = valid.filter(c => {
    if (!c.implied_volatility || c.implied_volatility <= 0 || !c.greeks.delta) return false;
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const dte = Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5);
    return dte >= 14 && dte <= 45;
  });
  const rr25puts = rr25dContracts.filter(c => c.details.contract_type === "put" && Math.abs(c.greeks.delta) >= 0.18 && Math.abs(c.greeks.delta) <= 0.32);
  const rr25calls = rr25dContracts.filter(c => c.details.contract_type === "call" && c.greeks.delta >= 0.18 && c.greeks.delta <= 0.32);
  if (rr25puts.length > 0 && rr25calls.length > 0) {
    const putIV = rr25puts.reduce((s, c) => s + c.implied_volatility, 0) / rr25puts.length;
    const callIV = rr25calls.reduce((s, c) => s + c.implied_volatility, 0) / rr25calls.length;
    d.rr25d = (callIV - putIV) * 100;
    d.rr25dPutIV = putIV * 100;
    d.rr25dCallIV = callIV * 100;
  }

  // Smile Ratio
  if (d.skew25dPutIV > 0 && d.skew25dCallIV > 0) {
    d.smileRatio = d.skew25dPutIV / d.skew25dCallIV;
  }

  // Skew Curve Classification (Section 5.2)
  if (d.skew25dPutIV > 0 && d.skew25dCallIV > 0) {
    const putRicher = d.skew25dPutIV > d.skew25dCallIV * 1.03;
    const callRicher = d.skew25dCallIV > d.skew25dPutIV * 1.03;
    if (callRicher) {
      d.skewCurve = "forward"; d.skewCurveLabel = "Forward Skew";
      d.skewCurveDesc = "OTM calls richer than puts — signals squeeze dynamics, supply constraints, or aggressive upside speculation.";
    } else if (!putRicher && !callRicher) {
      d.skewCurve = "smile"; d.skewCurveLabel = "Volatility Smile";
      d.skewCurveDesc = "Both tails priced equally — large moves in either direction priced similarly.";
    } else {
      d.skewCurve = "reverse"; d.skewCurveLabel = "Reverse Skew";
      d.skewCurveDesc = "Normal equity smirk — OTM puts trade richer reflecting structural demand for downside protection.";
    }
  }

  // Near-term vs Long-term Skew Term Structure (Section 5.3)
  const byExpSkew = { near: { puts: [], calls: [] }, far: { puts: [], calls: [] } };
  valid.forEach(c => {
    if (!c.implied_volatility || c.implied_volatility <= 0 || !c.greeks.delta) return;
    const absDelta = Math.abs(c.greeks.delta || 0);
    if (absDelta < 0.18 || absDelta > 0.32) return;
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const dte = Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5);
    const bucket = (dte >= 3 && dte <= 21) ? "near" : (dte > 21 && dte <= 60) ? "far" : null;
    if (!bucket) return;
    byExpSkew[bucket][c.details.contract_type === "put" ? "puts" : "calls"].push(c.implied_volatility * 100);
  });
  if (byExpSkew.near.puts.length > 0 && byExpSkew.near.calls.length > 0 && byExpSkew.far.puts.length > 0 && byExpSkew.far.calls.length > 0) {
    const nearPutIV = byExpSkew.near.puts.reduce((s,v)=>s+v,0) / byExpSkew.near.puts.length;
    const nearCallIV = byExpSkew.near.calls.reduce((s,v)=>s+v,0) / byExpSkew.near.calls.length;
    const farPutIV = byExpSkew.far.puts.reduce((s,v)=>s+v,0) / byExpSkew.far.puts.length;
    const farCallIV = byExpSkew.far.calls.reduce((s,v)=>s+v,0) / byExpSkew.far.calls.length;
    d.nearTermSkew = nearPutIV - nearCallIV;
    d.farTermSkew = farPutIV - farCallIV;
    d.skewTermSpread = d.nearTermSkew - d.farTermSkew;
  }

  // 0DTE Skew vs Longer-dated (Section 5.6)
  const zdte25puts = valid.filter(c => {
    if (c.details.contract_type !== "put" || !c.greeks.delta || !c.implied_volatility) return false;
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    return Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5) === 0 && Math.abs(c.greeks.delta) > 0.15 && Math.abs(c.greeks.delta) < 0.35;
  });
  const zdte25calls = valid.filter(c => {
    if (c.details.contract_type !== "call" || !c.greeks.delta || !c.implied_volatility) return false;
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    return Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5) === 0 && c.greeks.delta > 0.15 && c.greeks.delta < 0.35;
  });
  if (zdte25puts.length > 0 && zdte25calls.length > 0) {
    d.zdteSkew = zdte25puts.reduce((s,c)=>s+c.implied_volatility,0) / zdte25puts.length * 100 - zdte25calls.reduce((s,c)=>s+c.implied_volatility,0) / zdte25calls.length * 100;
  }

  // Term structure
  const byExp = {};
  valid.forEach(c => {
    if (!c.implied_volatility || c.implied_volatility <= 0) return;
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const dte = Math.round((new Date(ey, em - 1, ed) - todayMidnight) / 864e5);
    if (dte < 5 || dte > 90) return;
    const bucket = dte <= 30 ? "front" : "back";
    if (!byExp[bucket]) byExp[bucket] = [];
    byExp[bucket].push(c.implied_volatility);
  });
  if (byExp.front && byExp.front.length > 2 && byExp.back && byExp.back.length > 2) {
    d.termSlope = (byExp.front.reduce((s, v) => s + v, 0) / byExp.front.length) / Math.max(byExp.back.reduce((s, v) => s + v, 0) / byExp.back.length, 0.01);
  }

  // ATM IV
  const atmContracts = valid.filter(c => c.implied_volatility > 0 && c.greeks.delta && Math.abs(Math.abs(c.greeks.delta) - 0.5) < 0.15);
  if (atmContracts.length > 0) d.iv = (atmContracts.reduce((s, c) => s + c.implied_volatility, 0) / atmContracts.length) * 100;

  // Skew Signals (Table 5.4)
  d.skewSignals = [];
  if (d.skewTermSpread > 3) d.skewSignals.push({ type: "steepening", label: "Near-term skew steepening", desc: "Aggressive short-dated downside protection demand — imminent risk-off", severity: "high", color: "#A32D2D" });
  if (d.skewTermSpread < -2) d.skewSignals.push({ type: "flattening", label: "Skew flattening", desc: "Reduced put demand — complacency or improving sentiment", severity: "medium", color: "#BA7517" });
  if (d.skewCurve === "forward") d.skewSignals.push({ type: "inverted", label: "Inverted skew — calls > puts", desc: "Unusual speculative upside demand. Gamma squeeze potential.", severity: "high", color: "#E24B4A" });
  if (d.nearTermSkew > 0 && d.farTermSkew > 0 && d.nearTermSkew > d.farTermSkew * 1.5) d.skewSignals.push({ type: "nearTermSpike", label: "Near-term skew spike", desc: "Imminent event hedging — short-lived vol spike likely", severity: "medium", color: "#BA7517" });
  if (d.skew25d !== undefined && Math.abs(d.skew25d) < 1.0 && d.iv > 20) d.skewSignals.push({ type: "collapse", label: "Skew collapsed", desc: "Hedges unwound; vol compression and potential pinning", severity: "low", color: "#888780" });

  // Skew-GEX Interaction (Section 5.5)
  if (d.skewZ > 1 && d.regime === "negative") d.skewGexSignal = { type: "vulnerable", label: "Steep skew + neg gamma", desc: "Downside structurally vulnerable", color: "#A32D2D" };
  else if (d.skewZ < -0.5 && d.regime === "positive") d.skewGexSignal = { type: "capped", label: "Flat skew + pos gamma", desc: "Upside supported but may cap rallies", color: "#1D9E75" };
  else if (d.skewCurve === "forward" && d.regime === "negative") d.skewGexSignal = { type: "squeeze", label: "Forward skew + neg gamma", desc: "Gamma squeeze setup — explosive upside", color: "#E24B4A" };

  // Squeeze score (enhanced)
  const flipProx = Math.abs(d.flipDist);
  const putWallDist = d.spot > 0 ? (d.spot - d.putWall) / d.spot * 100 : 10;
  d.sq = Math.min(100, Math.max(0,
    (d.regime === "negative" ? 30 : 0) + (flipProx < 1 ? 25 : flipProx < 2 ? 15 : flipProx < 5 ? 5 : 0) +
    (putWallDist < 2 ? 20 : putWallDist < 5 ? 10 : 0) + (d.skewZ > 1.5 ? 15 : d.skewZ > 1 ? 8 : 0) +
    (d.dpc > 1.3 ? 10 : 0) + (d.skewCurve === "forward" ? 10 : 0)
  ));

  if (totalVol === 0) d._afterHours = true;
  d._polyChain = true; d._live = true;
  return d;
}

// Vol divergence scanner (kept compact — same logic as before)
async function fetchVolDivergencesLive(watchlist) {
  const results = [];
  for (let i = 0; i < watchlist.length; i++) {
    const ticker = watchlist[i];
    const polyQuote = await fetchPoly("quote", ticker);
    let spot = 0, changePct = 0;
    if (polyQuote && polyQuote.results && polyQuote.results.length > 0) {
      const q = polyQuote.results[0]; spot = q.c || q.vw || 0; changePct = q.changePerc || 0;
      if (!changePct && q.prevClose > 0) changePct = ((spot - q.prevClose) / q.prevClose) * 100;
    }
    if (spot <= 0) continue;
    const chain = await fetchPoly("chain", ticker);
    if (!chain || !chain.results || chain.results.length < 5) continue;

      if (otm.length>=2) {
        const tType = changePct > 0.15 ? "put" : "call";

        if (tContracts.length >= 1) {

          if (ivs.length >= 1) {
            const avgIV = ivs.reduce((s,v)=>s+v,0)/ivs.length;
            const tVol = tContracts.reduce((s,c)=>s+((c.day&&c.day.volume)||0),0);
            const tOI = tContracts.reduce((s,c)=>s+(c.open_interest||0),0);
            const voiR = tOI > 0 ? tVol/tOI : 0;
            if ((tVol >= 50 || voiR >= 0.3) && avgIV >= 0.10) {
              const isPut = tType === "put";
              const sev = Math.min(100, Math.round((avgIV*100 > 50 ? 25 : 15) + (voiR > 3 ? 25 : 5) + (tVol > 2000 ? 20 : 5) + 10));
              results.push({ ticker, spot, shareChg: changePct, isPutDiv: isPut, divType: "otm", type: isPut ? "Puts up / shares up" : "Calls up / shares down", signal: isPut ? "Informed downside into strength" : "Informed upside into weakness", severity: sev, ivJump: avgIV*100, currentIV: avgIV*100, priorIV: avgIV*75, volume: tVol, avgOI: tOI, volOIRatio: voiR, chainStrikesElevated: ivs.length, chainTotalStrikes: tContracts.length, at: assetType(ticker), _live: true });
            }
          }
        }
      }
    }
    if (Math.abs(changePct) >= 0.3) {
      const nearATM = contracts.filter(c => { if (!c.implied_volatility || c.implied_volatility <= 0) return false; const [ey,em,ed]=c.details.expiration_date.split("-").map(Number); const dte=Math.round((new Date(ey,em-1,ed)-todayDate)/864e5); return dte>=7&&dte<=60&&Math.abs(c.greeks.delta||0)>=0.15&&Math.abs(c.greeks.delta||0)<=0.85; });
      if (nearATM.length >= 4) {
        const nC = nearATM.filter(c => c.details.contract_type === "call");
        const nP = nearATM.filter(c => c.details.contract_type === "put");
        const aCIV = nC.length>0 ? nC.reduce((s,c)=>s+c.implied_volatility,0)/nC.length*100 : 0;
        const aPIV = nP.length>0 ? nP.reduce((s,c)=>s+c.implied_volatility,0)/nP.length*100 : 0;
        const cVol = nC.reduce((s,c)=>s+((c.day&&c.day.volume)||0),0);
        const pVol = nP.reduce((s,c)=>s+((c.day&&c.day.volume)||0),0);
        const tNV = cVol+pVol; const cDom = tNV>0?cVol/tNV:0.5;
        const cIVR = aCIV > aPIV && aPIV > 0;
        if (changePct>0.3 && (cIVR || (aCIV>25 && cDom>0.60))) {
          const sev = Math.min(100, Math.round((cIVR?25:0)+(aCIV>50?20:aCIV>35?12:5)+(cDom>0.75?20:5)+(changePct>3?15:5)));
          if (!results.find(r=>r.ticker===ticker) && sev>=25) results.push({ ticker, spot, shareChg: changePct, isPutDiv: false, divType: "spotUpVolUp", type: "Spot up / vol up", signal: "Speculative call chasing", callIV: aCIV, putIV: aPIV, callIVRicher: cIVR, callDominance: Math.round(cDom*100), severity: sev, ivJump: aCIV, currentIV: aCIV, priorIV: aCIV*0.85, chainStrikesElevated: 0, chainTotalStrikes: nC.length, at: assetType(ticker), _live: true });
        }
        if (changePct<-0.3 && aPIV>0 && aPIV<25 && !cIVR) {
          const sev = Math.min(100, Math.round((aPIV<15?25:5)+(Math.abs(changePct)>3?20:5)+15));
          if (!results.find(r=>r.ticker===ticker) && sev>=30) results.push({ ticker, spot, shareChg: changePct, isPutDiv: true, divType: "spotDownVolDown", type: "Spot down / vol down", signal: "IV compressed into selloff", callIV: aCIV, putIV: aPIV, severity: sev, ivJump: aPIV, currentIV: aPIV, priorIV: aPIV*1.15, chainStrikesElevated: 0, chainTotalStrikes: nP.length, at: assetType(ticker), _live: true });
        }
      }
    }
  }
  return results.sort((a, b) => b.severity - a.severity);
}

function buildSummary(d) {
  const opex = nextOpex(); const lines = []; let score = 0; const factors = [];
  const eq = fmtEq(d.regime==="positive" ? d.dspct : -d.dspct);
  if (d.regime === "positive") {
    lines.push(d.ticker + " positive gamma — dealers suppressing with " + eq.label + " counter-trend/1%. Flip/HVL " + fmtP(d.gammaFlip) + ", spot " + Math.abs(d.flipDist).toFixed(1) + "% " + (d.flipDist>0?"above":"below") + ". Walls: call " + fmtP(d.callWall) + " (" + (d.callWallConf||0).toFixed(0) + "%), put " + fmtP(d.putWall) + " (" + (d.putWallConf||0).toFixed(0) + "%).");
    score += 10; factors.push({ sig: "Gamma regime", det: "Positive — " + eq.label + " counter-trend", imp: "suppressing", dir: "neutral" });
  } else {
    lines.push(d.ticker + " negative gamma — dealers amplifying with " + eq.label + " pro-trend/1%. Flip/HVL " + fmtP(d.gammaFlip) + ", spot " + Math.abs(d.flipDist).toFixed(1) + "% " + (d.flipDist>0?"above":"below") + ". Walls: call " + fmtP(d.callWall) + " (" + (d.callWallConf||0).toFixed(0) + "%), put " + fmtP(d.putWall) + " (" + (d.putWallConf||0).toFixed(0) + "%).");
    score -= 15; factors.push({ sig: "Gamma regime", det: "Negative — " + eq.label + " pro-trend", imp: "amplifying", dir: "bearish" });
  }
  if (Math.abs(d.flipDist) < 1) { score += d.flipDist<0?-15:-5; factors.push({ sig: "Flip proximity", det: Math.abs(d.flipDist).toFixed(1) + "% from flip — regime change imminent", imp: "critical", dir: "volatile" }); }
  const p2 = [];
  if (d.dpc > 1.5) { p2.push("P/C " + d.dpc.toFixed(2) + " (" + d.pcp + "th) bearish"); score -= 15; factors.push({ sig: "Delta P/C", det: d.dpc.toFixed(2) + " (" + d.pcp + "th pct) bearish", imp: "bearish", dir: "bearish" }); }
  else if (d.dpc < 0.6) { p2.push("P/C " + d.dpc.toFixed(2) + " (" + d.pcp + "th) bullish"); score += 15; factors.push({ sig: "Delta P/C", det: d.dpc.toFixed(2) + " (" + d.pcp + "th pct) bullish", imp: "bullish", dir: "bullish" }); }
  else { factors.push({ sig: "Delta P/C", det: d.dpc.toFixed(2) + " balanced", imp: "neutral", dir: "neutral" }); }
  if (Math.abs(d.skewZ) > 2) { const sk = d.skewZ>0?"bearish":"bullish"; p2.push("skew " + d.skewZ.toFixed(1) + "σ (" + sk + ")"); score += d.skewZ>0?-10:10; factors.push({ sig: "Skew outlier", det: d.skewZ.toFixed(1) + "σ " + sk, imp: "outlier", dir: sk }); }
  if (d.sq > 60) { score += d.regime==="negative"?-15:15; factors.push({ sig: "Squeeze", det: "Score " + Math.round(d.sq), imp: "high", dir: d.regime==="negative"?"bearish":"bullish" }); }
  if (p2.length) lines.push(p2.join(", ") + ".");

  if (d.skewGexSignal) { factors.push({ sig: "Skew × GEX", det: d.skewGexSignal.label, imp: d.skewGexSignal.type==="vulnerable"?"bearish":"neutral", dir: d.skewGexSignal.type==="vulnerable"?"bearish":"neutral" }); if (d.skewGexSignal.type==="vulnerable") score -= 10; if (d.skewGexSignal.type==="squeeze") score += 10; }
  if (d.skewSignals.length > 0) { factors.push({ sig: "Skew signal", det: d.skewSignals[0].label, imp: d.skewSignals[0].severity==="high"?"critical":"neutral", dir: d.skewSignals[0].type==="steepening"?"bearish":"neutral" }); if (d.skewSignals[0].type==="steepening") score -= 8; }

  if (Math.abs(d.zdg) > 5e8) { const zs = d.zdr==="negative"?-d.zds:d.zds; score += d.zdr==="negative"?-10:5; factors.push({ sig: "0DTE gamma", det: d.zdr + " — " + fmtEq(zs).label + " expiring", imp: d.zdr==="negative"?"amplifying":"suppressing", dir: d.zdr==="negative"?"volatile":"neutral" }); }
  const bigT = d.trades.filter(t => Math.abs(t.eqShares)>30000);
  if (bigT.length) { const net = bigT.reduce((s,t)=>s+(t.side==="bought"?Math.abs(t.eqShares):-Math.abs(t.eqShares)),0); score += net>0?8:-8; factors.push({ sig: "Sweeps", det: bigT.length + " prints, net " + fmtEq(net).label, imp: net>0?"bullish":"bearish", dir: net>0?"bullish":"bearish" }); }
  const pd = ((d.maxPain-d.spot)/d.spot)*100;
  if (Math.abs(pd) > 1) { score += pd>0?5:-5; factors.push({ sig: "Max pain", det: "Pin " + fmtP(d.maxPain) + " (" + (pd>0?"+":"") + pd.toFixed(1) + "%)", imp: "pin", dir: pd>0?"bullish":"bearish" }); }

  const nowET = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
  const isAfterClose = nowET.getHours() >= 16 || nowET.getDay() === 0 || nowET.getDay() === 6;
  const timeframe = isAfterClose ? "into tomorrow" : "this session";
  score = Math.max(-100, Math.min(100, score));
  let verdict, vc, vbg;
  if (score > 30) { verdict = "Bullish tailwind " + timeframe; vc = "#0F6E56"; vbg = "rgba(29,158,117,0.08)"; }
  else if (score > 10) { verdict = "Mild bullish bias " + timeframe; vc = "#1D9E75"; vbg = "rgba(29,158,117,0.05)"; }
  else if (score > -10) { verdict = "Neutral positioning " + timeframe; vc = "#888780"; vbg = "rgba(128,128,128,0.05)"; }
  else if (score > -30) { verdict = "Mild bearish pressure " + timeframe; vc = "#BA7517"; vbg = "rgba(186,117,23,0.06)"; }
  else { verdict = "Bearish headwind " + timeframe; vc = "#A32D2D"; vbg = "rgba(226,75,74,0.08)"; }
  return { score, verdict, vc, vbg, lines, factors };
}

  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => { fetch("/.netlify/functions/snapshot?ticker=" + ticker + "&history=true").then(r => r.json()).then(d => { setData(d.points || []); setLoading(false); }).catch(() => setLoading(false)); }, [ticker]);
  if (loading) return <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}><div style={{ background: "#f0f6fb", borderRadius: "12px", padding: "24px", minWidth: "320px" }} onClick={e => e.stopPropagation()}>Loading...</div></div>;
  if (!data || data.length === 0) return <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}><div style={{ background: "#f0f6fb", borderRadius: "12px", padding: "24px", minWidth: "320px" }} onClick={e => e.stopPropagation()}>No data yet.<button onClick={onClose} style={{ marginTop: "12px", background: "rgba(74,144,217,0.12)", border: "none", borderRadius: "6px", padding: "6px 16px", cursor: "pointer", display: "block", margin: "12px auto 0" }}>Close</button></div></div>;
  const values = data.map(d => d[metric] || 0);
  const maxV = Math.max(...values, 0.01), minV = Math.min(...values, 0), range = maxV - minV || 1;
  const W = 520, H = 160, pL = 45, pR = 10, pT = 10, pB = 28, pW = W-pL-pR, pH = H-pT-pB;
  const pts = data.map((d, i) => ({ x: pL + (i / Math.max(data.length-1,1)) * pW, y: pT + pH - ((d[metric]||0) - minV) / range * pH, d }));
  const pathD = pts.map((p, i) => (i===0?"M":"L") + p.x + "," + p.y).join(" ");
  return <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
    <div style={{ background: "#f0f6fb", borderRadius: "12px", padding: "20px", maxWidth: "620px", width: "92%" }} onClick={e => e.stopPropagation()}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "12px" }}><div><div style={{ fontSize: "14px", fontWeight: 600 }}>{ticker} — {label}</div><div style={{ fontSize: "11px", opacity: 0.6 }}>{data.length} days</div></div><button onClick={onClose} style={{ background: "none", border: "none", fontSize: "18px", cursor: "pointer", opacity: 0.5 }}>✕</button></div>
      <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "auto", fontFamily: "'SF Mono', monospace" }}>
        {[0,0.25,0.5,0.75,1].map(pct => { const y = pT + pH*(1-pct); return <g key={pct}><line x1={pL} x2={W-pR} y1={y} y2={y} stroke="rgba(128,128,128,0.15)" /><text x={pL-4} y={y+3} textAnchor="end" fontSize="8" fill="rgba(0,0,0,0.4)">{(minV+range*pct).toFixed(1)}{unit||""}</text></g>; })}
        <path d={pathD} fill="none" stroke="#4A90D9" strokeWidth="2" />
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill="#4A90D9" stroke="#f0f6fb" strokeWidth="1.5"><title>{p.d.date}: {(p.d[metric]||0).toFixed(2)}</title></circle>)}
        {pts.filter((_,i)=>i===0||i===pts.length-1||i===Math.floor(pts.length/2)).map(p=><text key={p.d.date} x={p.x} y={H-4} textAnchor="middle" fontSize="8" fill="rgba(0,0,0,0.4)">{p.d.date.slice(5)}</text>)}
      </svg>
    </div>
  </div>;
}

    { l: "Dealer flow/1%", v: <EqBadge shares={d.regime==="positive"?d.dspct:-d.dspct} size="sm"/>, info: "Equivalent shares dealers trade per 1% move. Positive gamma = counter-trend. Negative = pro-trend." },
    { l: "Flip / HVL", v: fmtP(d.gammaFlip), s: fmtPct(d.flipDist), info: "High Volatility Level — where dealer gamma changes sign. This IS the volatility regime boundary." },
    { l: "Squeeze", v: <Squeeze score={d.sq}/>, info: "Composite score (0-100) combining negative gamma, put walls, skew, and forward skew." },
    { l: "Δ P/C", v: d.dpc.toFixed(2), s: d.pcp + "th pct", info: "Delta-weighted put/call ratio. <0.7 = bullish. >1.3 = bearish." },
    { l: "NDF", v: <EqBadge shares={d.ndf||d.nds||0} size="sm"/>, info: "Net Delta Flow — aggregate directional exposure from all options trades. The share-equivalent of today's directional conviction." },

function TickerSearch({ onLookup, recentLookups }) {
  const [input, setInput] = useState(""); const [sugg, setSugg] = useState([]); const [focused, setFocused] = useState(false); const ref = useRef(null);
  const handle = val => { const v = val.toUpperCase().replace(/[^A-Z.]/g,""); setInput(v); setSugg(v ? KNOWN.filter(t => t.startsWith(v)).slice(0,8) : []); };
  const go = t => { const tk = (t||input).toUpperCase().trim(); if (tk) { onLookup(tk); setInput(""); setSugg([]); ref.current?.blur(); } };
  return <div style={{ position: "relative", marginBottom: "16px" }}>
    <div style={{ display: "flex", alignItems: "center", gap: "8px", border: focused?"1.5px solid rgba(74,144,217,0.6)":"1.5px solid rgba(128,128,128,0.2)", borderRadius: "10px", padding: "10px 16px", background: "rgba(74,144,217,0.03)" }}>
      <span style={{ fontSize: "18px", opacity: 0.82 }}>⌕</span>
      <input ref={ref} value={input} onChange={e => handle(e.target.value)} onFocus={() => setFocused(true)} onBlur={() => setTimeout(() => { setFocused(false); setSugg([]); }, 150)} onKeyDown={e => { if(e.key==="Enter")go(); if(e.key==="Escape"){setInput("");setSugg([]);ref.current?.blur();}}} placeholder="Type any ticker..." style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontSize: "16px", fontFamily: "'SF Mono',monospace", fontWeight: 500 }} />
      {input && <button onClick={() => go()} style={{ background: "rgba(74,144,217,0.12)", border: "none", borderRadius: "6px", padding: "5px 16px", fontSize: "13px", cursor: "pointer", fontWeight: 500, color: "#2B6CB0" }}>Analyze</button>}
    </div>
    {sugg.length > 0 && focused && <div style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 10, marginTop: "4px", border: "1px solid rgba(74,144,217,0.15)", borderRadius: "8px", overflow: "hidden", background: "#f0f6fb" }}>
      {sugg.map(s => <div key={s} onMouseDown={() => go(s)} style={{ padding: "8px 14px", fontSize: "14px", cursor: "pointer", fontFamily: "monospace", borderBottom: "1px solid rgba(74,144,217,0.07)" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(128,128,128,0.05)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><span style={{ fontWeight: 500 }}>{s}</span> <span style={{ opacity: 0.6, fontSize: "11px" }}>{assetType(s)}</span></div>)}
    </div>}
    {recentLookups.length > 0 && !focused && <div style={{ display: "flex", gap: "6px", marginTop: "8px", flexWrap: "wrap" }}>
      <span style={{ fontSize: "11px", opacity: 0.82, padding: "3px 0" }}>Recent:</span>
      {recentLookups.map(t => <button key={t} onClick={() => go(t)} style={{ background: "rgba(74,144,217,0.06)", border: "none", borderRadius: "4px", padding: "3px 10px", fontSize: "12px", cursor: "pointer", fontFamily: "monospace", fontWeight: 500 }}>{t}</button>)}
    </div>}
  </div>;
}

    if (sim.length > 0) ctx += " Similar: " + sim.slice(0,3).map(s => s.date + " (spot " + fmtP(s.spot) + ")").join(", ");

  return (<>

          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "6px", flexWrap: "wrap" }}>

              {d._afterHours && <span style={{ fontSize: "10px", padding: "2px 8px", borderRadius: "4px", background: "rgba(186,117,23,0.1)", color: "#BA7517", fontWeight: 500 }}>PRIOR SESSION</span>}
              {d.rr25d !== 0 && <span style={{ fontSize: "11px", padding: "3px 10px", borderRadius: "4px", fontWeight: 500, background: d.rr25d < -8 ? "rgba(29,158,117,0.12)" : d.rr25d > -1 ? "rgba(226,75,74,0.12)" : "rgba(74,144,217,0.08)", color: d.rr25d < -8 ? "#0F6E56" : d.rr25d > -1 ? "#A32D2D" : "#2B6CB0" }}>25Δ RR: {d.rr25d > 0 ? "+" : ""}{d.rr25d.toFixed(1)}{pct("rr25d") !== null ? " · " + pct("rr25d") + "th" : ""}</span>}

          {d.skewGexSignal && <span style={{ fontSize: "11px", padding: "3px 10px", borderRadius: "4px", background: "rgba(74,144,217,0.08)", color: d.skewGexSignal.color, fontWeight: 500 }} title={d.skewGexSignal.desc}>{d.skewGexSignal.label}</span>}

        <Metric label="0DTE % vol" value={(d.zdtePct||0).toFixed(0) + "%"} sub={(d.zdteVol||0).toLocaleString() + " cts"} info="% of options volume that was 0DTE. >50% = intraday-driven." readingInfo={rCtx("zdtePct", d.zdtePct||0)} onChart={() => setTsChart({ metric: "zdtePct", label: "0DTE %", unit: "%" })} />
        <Metric label="Dealer hedge" value={<EqBadge shares={(d.regime==="positive" ? d.dspct : -d.dspct)||0} size="sm"/>} sub="per 1% move" info="Est. shares dealers trade per 1% move." readingInfo={rCtx("dspct", d.dspct||0)} onChart={() => setTsChart({ metric: "dspct", label: "Dealer Hedge" })} />

    </div>
    {tsChart && <TimeSeriesModal ticker={d.ticker} metric={tsChart.metric} label={tsChart.label} unit={tsChart.unit} onClose={() => setTsChart(null)} />}
  </>);
}

// ─── WALL PROXIMITY TAB ─────────────────────────────────────────────
function WallProximity({ data, onSelect, onFetchWalls }) {
  const [autoFetched, setAutoFetched] = useState(false);
  useEffect(() => {
    if (!autoFetched) {
      const spyD = data.find(d => d.ticker === "SPY");
      const qqqD = data.find(d => d.ticker === "QQQ");
      if ((spyD && spyD.callWall === 0) || (qqqD && qqqD.callWall === 0)) {
        if (onFetchWalls) { onFetchWalls(["SPY","QQQ"]); setAutoFetched(true); }
      }
    }
  }, [data, autoFetched, onFetchWalls]);

  const callProx = data.filter(d => d.spot > 0 && d.callWall > 0).map(d => ({ ...d, dist: (d.callWall - d.spot) / d.spot * 100, wallType: "call" })).filter(d => d.dist >= -1 && d.dist <= 2.5);
  const putProx = data.filter(d => d.spot > 0 && d.putWall > 0).map(d => ({ ...d, dist: (d.spot - d.putWall) / d.spot * 100, wallType: "put" })).filter(d => d.dist >= -1 && d.dist <= 2.5);
  const pinSPY = data.find(d => d.ticker === "SPY");
  const pinQQQ = data.find(d => d.ticker === "QQQ");
  const addPinned = (arr, wallType) => {
    [pinSPY, pinQQQ].forEach(p => { if (p && p.spot > 0 && !arr.find(a => a.ticker === p.ticker)) {
      const dist = wallType === "call" ? (p.callWall - p.spot) / p.spot * 100 : (p.spot - p.putWall) / p.spot * 100;
      arr.push({ ...p, dist, wallType });
    }});
    return arr.sort((a, b) => a.dist - b.dist);
  };
  const callFinal = addPinned(callProx, "call");
  const putFinal = addPinned(putProx, "put");

  const WallCol = ({ items, title, wallKey, confKey, oiKey }) => <div style={{ flex: 1 }}>
    <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, marginBottom: "8px", fontWeight: 500 }}>{title}</div>
    {items.length === 0 ? <div style={{ opacity: 0.4, fontSize: "12px" }}>No tickers within 2.5%</div> :
    <div style={{ border: "1px solid rgba(74,144,217,0.1)", borderRadius: "8px", overflow: "hidden" }}>
      {items.map((d, i) => <div key={d.ticker} onClick={() => onSelect(d.ticker)} style={{ display: "flex", alignItems: "center", gap: "8px", padding: "7px 10px", fontSize: "12px", cursor: "pointer", borderBottom: i<items.length-1?"1px solid rgba(74,144,217,0.05)":"none" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(74,144,217,0.06)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{ fontWeight: 500, minWidth: "45px" }}>{d.ticker}</span>
        <span style={{ minWidth: "60px" }}>{fmtP(d.spot)}</span>
        <span style={{ minWidth: "55px" }}>→ {fmtP(d[wallKey])}</span>
        <span style={{ color: d.dist < 1 ? "#E24B4A" : d.dist < 2 ? "#BA7517" : "#1D9E75", fontWeight: 500, minWidth: "45px" }}>{d.dist.toFixed(1)}%</span>
        <span style={{ fontSize: "10px", opacity: 0.6 }}>{(d[confKey]||0).toFixed(0)}% · {(d[oiKey]||0).toLocaleString()}</span>
      </div>)}
    </div>}
  </div>;

  return <div style={{ display: "flex", gap: "16px" }}>
    <WallCol items={putFinal} title="Put Walls (Support)" wallKey="putWall" confKey="putWallConf" oiKey="putWallOI" />
    <WallCol items={callFinal} title="Call Walls (Resistance)" wallKey="callWall" confKey="callWallConf" oiKey="callWallOI" />
  </div>;
}

// ─── CROSS-ASSET TAB ───────────────────────────────────────────────
function CrossAsset({ data }) {
  const etfs = data.filter(d => d.at === "ETF" && d.spot > 0);
  const stocks = data.filter(d => d.at === "Stock" && d.spot > 0);
  const posGamma = etfs.filter(d => d.regime === "positive");
  const negGamma = etfs.filter(d => d.regime === "negative");
  const topSqueeze = [...data].filter(d => d.spot > 0 && d.sq > 20).sort((a,b) => b.sq - a.sq).slice(0, 8);
  const bullishPC = [...stocks].filter(d => d.spot > 0 && d.dpc < 0.7).sort((a,b) => a.dpc - b.dpc).slice(0, 5);
  const bearishPC = [...stocks].filter(d => d.spot > 0 && d.dpc > 1.3).sort((a,b) => b.dpc - a.dpc).slice(0, 5);

  return <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
    {/* ETF Gamma Regime */}
    <div style={{ border: "1px solid rgba(74,144,217,0.12)", borderRadius: "8px", padding: "14px 16px" }}>
      <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, marginBottom: "8px" }}>ETF Gamma Regime Breakdown</div>
      <div style={{ display: "flex", gap: "16px" }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "11px", color: "#3B6D11", fontWeight: 500, marginBottom: "4px" }}>Positive ({posGamma.length})</div>
          <div style={{ fontSize: "12px", lineHeight: 1.8 }}>{posGamma.map(d => d.ticker).join(", ") || "—"}</div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "11px", color: "#A32D2D", fontWeight: 500, marginBottom: "4px" }}>Negative ({negGamma.length})</div>
          <div style={{ fontSize: "12px", lineHeight: 1.8 }}>{negGamma.map(d => d.ticker).join(", ") || "—"}</div>
        </div>
      </div>
    </div>

    {/* Top Squeeze */}
    {topSqueeze.length > 0 && <div style={{ border: "1px solid rgba(74,144,217,0.12)", borderRadius: "8px", padding: "14px 16px" }}>
      <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, marginBottom: "8px" }}>Top Squeeze Scores</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "6px" }}>
        {topSqueeze.map(d => <div key={d.ticker} style={{ padding: "6px 8px", borderRadius: "6px", background: d.sq > 60 ? "rgba(226,75,74,0.06)" : "rgba(186,117,23,0.04)" }}>
          <div style={{ fontSize: "13px", fontWeight: 500 }}>{d.ticker}</div>
          <Squeeze score={d.sq} />
        </div>)}
      </div>
    </div>}

    {/* Most Bullish / Bearish P/C */}
    <div style={{ display: "flex", gap: "16px" }}>
      <div style={{ flex: 1, border: "1px solid rgba(74,144,217,0.12)", borderRadius: "8px", padding: "14px 16px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, marginBottom: "8px", color: "#0F6E56" }}>Most Bullish P/C</div>
        {bullishPC.length === 0 ? <div style={{ opacity: 0.4, fontSize: "12px" }}>None</div> : bullishPC.map(d => <div key={d.ticker} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: "12px" }}><span style={{ fontWeight: 500 }}>{d.ticker}</span><span style={{ color: "#0F6E56" }}>{d.dpc.toFixed(2)}</span></div>)}
      </div>
      <div style={{ flex: 1, border: "1px solid rgba(74,144,217,0.12)", borderRadius: "8px", padding: "14px 16px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, marginBottom: "8px", color: "#A32D2D" }}>Most Bearish P/C</div>
        {bearishPC.length === 0 ? <div style={{ opacity: 0.4, fontSize: "12px" }}>None</div> : bearishPC.map(d => <div key={d.ticker} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: "12px" }}><span style={{ fontWeight: 500 }}>{d.ticker}</span><span style={{ color: "#A32D2D" }}>{d.dpc.toFixed(2)}</span></div>)}
      </div>
    </div>
  </div>;
}

// ─── APP COMPONENT ─────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("scanner");
  const [data, setData] = useState([]);
  const [selected, setSelected] = useState(null);
  const [selectedData, setSelectedData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [loadingTicker, setLoadingTicker] = useState(false);
  const [recentLookups, setRecentLookups] = useState([]);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [volDivs, setVolDivs] = useState([]);
  const [volDivLoading, setVolDivLoading] = useState(false);
  const [snapshotDate, setSnapshotDate] = useState(null);
  const pollRef = useRef(null);

  const loadSnapshot = useCallback(async () => {
    try {
      const r = await fetch("/.netlify/functions/snapshot");
      if (!r.ok) throw new Error("snapshot " + r.status);
      const snap = await r.json();
      if (snap.tickers && Object.keys(snap.tickers).length > 0) {
        const arr = Object.values(snap.tickers).map(t => ({ ...emptyTicker(t.ticker), ...t }));
        setData(arr);
        setSnapshotDate(snap.date || null);
      }
    } catch (e) { console.warn("Snapshot:", e.message); }
    setLoading(false);
  }, []);

  const loadLive = useCallback(async () => {
    const ms = getMarketState();
    if (!ms.shouldPoll && data.length > 0) return;
    setLoading(true);
    try {
      const r = await fetch("/.netlify/functions/snapshot");
      if (r.ok) {
        const snap = await r.json();
        if (snap.tickers && Object.keys(snap.tickers).length > 0) {
          const arr = Object.values(snap.tickers).map(t => ({ ...emptyTicker(t.ticker), ...t }));
          setData(arr);
          setSnapshotDate(snap.date || null);
          setLastUpdate(new Date());
        }
      }
    } catch (e) { console.warn("Live:", e.message); }
    setLoading(false);
  }, [data.length]);

  useEffect(() => { loadSnapshot(); }, [loadSnapshot]);

  useEffect(() => {
    const poll = () => { const ms = getMarketState(); if (ms.shouldPoll) loadLive(); };
    pollRef.current = setInterval(poll, POLL_INTERVAL_MS);
    return () => clearInterval(pollRef.current);
  }, [loadLive]);

  const lookupTicker = useCallback(async (ticker) => {
    setLoadingTicker(true); setSelected(ticker); setSelectedData(null);
    try {
      const d = await fetchTickerLive(ticker);
      setSelectedData(d);
      setRecentLookups(prev => [ticker, ...prev.filter(t => t !== ticker)].slice(0, 8));
    } catch (e) { setSelectedData({ ...emptyTicker(ticker), _error: e.message }); }
    setLoadingTicker(false);
  }, []);

  const fetchWalls = useCallback(async (tickers) => {
    for (const ticker of tickers) {
      try {
        const d = await fetchTickerLive(ticker);
        setData(prev => { const idx = prev.findIndex(p => p.ticker === ticker); if (idx >= 0) { const n = [...prev]; n[idx] = { ...n[idx], ...d }; return n; } return prev; });
      } catch (e) { console.warn("Wall fetch:", e.message); }
    }
  }, []);

  const scanVolDivs = useCallback(async () => {
    setVolDivLoading(true);
    try { const divs = await fetchVolDivergencesLive(DEFAULT_WATCHLIST.slice(0, 15)); setVolDivs(divs); } catch (e) { console.warn("VolDiv:", e.message); }
    setVolDivLoading(false);
  }, []);

  const ms = getMarketState();
  const tabs = [
    { id: "scanner", label: "Scanner" },
    { id: "volume", label: "Opts Volume" },
    { id: "walls", label: "Walls" },
    { id: "voldiv", label: "Vol Divergence" },
    { id: "cross", label: "Cross-Asset" },
  ];

  return <div>
    {/* Header */}
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
      <div>
        <div style={{ fontSize: "20px", fontWeight: 500, letterSpacing: "-0.3px" }}>Γ Options Intelligence</div>
        <div style={{ fontSize: "11px", opacity: 0.5 }}>JonesTrading · jones-agent</div>
      </div>
      <div style={{ textAlign: "right" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "6px", justifyContent: "flex-end" }}>
          <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: ms.isMarketOpen ? "#1D9E75" : ms.isPreMarket ? "#BA7517" : "#888780" }} />
          <span style={{ fontSize: "12px", fontWeight: 500 }}>{ms.label}</span>
        </div>
        {ms.isMarketOpen && snapshotDate && <div style={{ fontSize: "10px", opacity: 0.5, marginTop: "2px" }}>Live · {new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", timeZone: "America/New_York" })} ET</div>}
        {!ms.isMarketOpen && snapshotDate && <div style={{ fontSize: "10px", opacity: 0.5, marginTop: "2px" }}>Snapshot: {snapshotDate}</div>}
        {ms.nextPollLabel && <div style={{ fontSize: "10px", opacity: 0.4 }}>{ms.nextPollLabel}</div>}
      </div>
    </div>

    {/* Ticker Search */}
    <TickerSearch onLookup={lookupTicker} recentLookups={recentLookups} />

    {/* Loading ticker */}
    {loadingTicker && <div style={{ padding: "20px", textAlign: "center", opacity: 0.5, marginBottom: "16px" }}>Analyzing {selected}...</div>}

    {/* Selected ticker detail */}
    {selectedData && <VerdictCard d={selectedData} onClose={() => { setSelected(null); setSelectedData(null); }} />}

    {/* Tabs */}
    <div style={{ display: "flex", gap: "2px", marginBottom: "16px", borderBottom: "1px solid rgba(74,144,217,0.1)", paddingBottom: "0" }}>
      {tabs.map(t => <button key={t.id} onClick={() => { setTab(t.id); if (t.id === "voldiv" && volDivs.length === 0 && !volDivLoading) scanVolDivs(); }} style={{ background: tab === t.id ? "rgba(74,144,217,0.1)" : "transparent", border: "none", borderBottom: tab === t.id ? "2px solid #4A90D9" : "2px solid transparent", padding: "8px 16px", fontSize: "12px", cursor: "pointer", fontWeight: tab === t.id ? 500 : 400, color: tab === t.id ? "#2B6CB0" : "inherit", opacity: tab === t.id ? 1 : 0.6, borderRadius: "6px 6px 0 0" }}>{t.label}</button>)}
    </div>

    {/* Tab content */}
    {loading && data.length === 0 ? <div style={{ padding: "40px", textAlign: "center", opacity: 0.5 }}>Loading snapshot data...</div> :
      tab === "scanner" ? <Scanner data={data} onSelect={lookupTicker} /> :
      tab === "volume" ? <OptionsVolume data={data} onSelect={lookupTicker} /> :
      tab === "walls" ? <WallProximity data={data} onSelect={lookupTicker} onFetchWalls={fetchWalls} /> :
      tab === "voldiv" ? <VolDivergence divs={volDivs} loading={volDivLoading} onScan={scanVolDivs} /> :
      tab === "cross" ? <CrossAsset data={data} /> : null
    }

    {/* Footer */}
    <div style={{ marginTop: "24px", padding: "12px", textAlign: "center", fontSize: "10px", opacity: 0.4 }}>
      Data: Polygon.io · {data.length} tickers · Auto-refresh {POLL_INTERVAL_MS/60000}min during market hours
      {lastUpdate && <span> · Last: {lastUpdate.toLocaleTimeString()}</span>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
