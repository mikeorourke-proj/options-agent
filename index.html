<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── LIVE API LAYER ────────────────────────────────────────────────
// Calls Netlify Functions which proxy to Polygon
// API keys are stored in Netlify environment variables — never in the browser
let USE_LIVE = true;

// ─── MARKET HOURS & AUTO-REFRESH ─────────────────────────────────
const POLL_INTERVAL_MS = 15 * 60 * 1000; // 15 minutes

function getMarketState() {
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const day = et.getDay(); // 0=Sun, 6=Sat
  const h = et.getHours();
  const m = et.getMinutes();
  const mins = h * 60 + m; // minutes since midnight ET
  const isWeekday = day >= 1 && day <= 5;
  const preMarket = isWeekday && mins >= 540 && mins < 570; // 9:00-9:30
  const marketOpen = isWeekday && mins >= 570 && mins < 960; // 9:30-16:00
  const postMarket = isWeekday && mins >= 960 && mins < 1080; // 16:00-18:00
  return {
    isMarketOpen: marketOpen,
    isPreMarket: preMarket,
    isPostMarket: postMarket,
    isWeekend: !isWeekday,
    shouldPoll: marketOpen, // only poll during regular hours
    label: marketOpen ? "LIVE" : preMarket ? "PRE-MKT" : postMarket ? "POST-MKT" : "CLOSED",
    nextPollLabel: marketOpen ? "" : preMarket ? "Updates at 9:30 AM ET" : postMarket ? "Holding EOD readings" : "Holding EOD readings",
  };
}

async function fetchPoly(endpoint, ticker) {
  try {
    const r = await fetch(`/.netlify/functions/polygon?endpoint=${endpoint}&ticker=${ticker}`);
    if (!r.ok) throw new Error(`Poly ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch (e) { console.warn("Polygon:", e.message); return null; }
}

// ─── SELF-COMPUTED GEX ENGINE ──────────────────────────────────────
// Computes GEX, gamma flip, call/put walls, max pain, regime, P/C ratio,
// sweeps, and spot price entirely from Polygon options chain data.
// Standard dealer assumption: dealers are short what was bought.

function computeFromChain(d, chainData) {
  if (!chainData || !chainData.results || !chainData.results.length) return d;
  if (!d._live) return d; // Don't compute positioning without a verified spot price
  const contracts = chainData.results;
  const now = new Date();
  const spot = d.spot;

  // ── Filter to valid contracts with greeks
  const valid = contracts.filter(c => c.details && c.greeks && c.details.expiration_date && c.details.strike_price);
  if (valid.length === 0) return d;

  // ── Spot price: ONLY use Polygon quote price set upstream. Never derive from ATM delta.
  // Bad data is worse than no data.

  // ── Near-term for GEX/walls/max pain: 1-60 DTE
  // Include this week's expiry (critical near OPEX) but exclude 0DTE (noise)
  // 0DTE GEX is computed separately in the 0DTE section
  const MIN_DTE = 1, MAX_DTE = 60;
  const MIN_OI = 100; // minimum open interest to count toward walls
  const todayETDate = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const todayMidnight = new Date(todayETDate.getFullYear(), todayETDate.getMonth(), todayETDate.getDate());

  const nearTerm = valid.filter(c => {
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const expDate = new Date(ey, em - 1, ed);
    const dte = Math.round((expDate - todayMidnight) / 864e5);
    return dte >= MIN_DTE && dte <= MAX_DTE;
  });

  // ── GEX computation (near-term only)
  let netGex = 0;
  const strikeGex = {};
  const strikeCallOI = {};
  const strikePutOI = {};

  nearTerm.forEach(c => {
    const isCall = c.details.contract_type === "call";
    const gamma = Math.abs(c.greeks.gamma || 0);
    const oi = c.open_interest || 0;
    const strike = c.details.strike_price;
    if (oi < 10) return; // skip trivial OI

    const contractGex = gamma * oi * 100 * d.spot * d.spot * 0.01;
    const signedGex = isCall ? contractGex : -contractGex;
    netGex += signedGex;

    if (!strikeGex[strike]) strikeGex[strike] = 0;
    strikeGex[strike] += signedGex;

    if (!strikeCallOI[strike]) strikeCallOI[strike] = 0;
    if (!strikePutOI[strike]) strikePutOI[strike] = 0;
    if (isCall) strikeCallOI[strike] += oi; else strikePutOI[strike] += oi;
  });

  const strikes = Object.keys(strikeGex).map(Number).sort((a, b) => a - b);

  if (strikes.length > 0) {
    // ── Set GEX and regime
    d.netGex = netGex;
    d.regime = netGex > 0 ? "positive" : "negative";
    d.dspct = Math.abs(netGex) / Math.max(d.spot, 1);

    // ── Gamma flip: interpolated strike where cumulative GEX crosses zero
    let cumGex = 0;
    let flipStrike = d.spot;
    let foundFlip = false;
    for (let i = 0; i < strikes.length; i++) {
      const prevCum = cumGex;
      cumGex += strikeGex[strikes[i]];
      if ((prevCum <= 0 && cumGex > 0) || (prevCum >= 0 && cumGex < 0)) {
        if (i > 0) {
          const ratio = Math.abs(prevCum) / (Math.abs(prevCum) + Math.abs(cumGex));
          flipStrike = strikes[i - 1] + (strikes[i] - strikes[i - 1]) * ratio;
        } else {
          flipStrike = strikes[i];
        }
        foundFlip = true;
        break;
      }
    }
    // Sanity check: flip must be within 20% of spot, otherwise discard
    if (!foundFlip || Math.abs(flipStrike - d.spot) / d.spot > 0.20) {
      flipStrike = d.spot;
    }
    d.gammaFlip = flipStrike;
    d.flipDist = ((d.spot - d.gammaFlip) / d.spot) * 100;

    // ── Call wall: strike with highest call OI at or above spot
    let maxCallOI = 0, callWallStrike = d.spot * 1.02;
    let totalNearCallOI = 0;
    let callOIAboveSpot = {};
    Object.entries(strikeCallOI).forEach(([s, oi]) => {
      const sn = Number(s);
      totalNearCallOI += oi;
      if (sn >= d.spot * 0.98) {
        callOIAboveSpot[sn] = oi;
        if (oi > maxCallOI) {
          maxCallOI = oi;
          callWallStrike = sn;
        }
      }
    });
    d.callWall = callWallStrike;
    // Confidence: wall OI as % of all call OI at/above spot (the relevant distribution)
    const totalCallOIAbove = Object.values(callOIAboveSpot).reduce((s, v) => s + v, 0);
    d.callWallConf = totalCallOIAbove > 0 ? (maxCallOI / totalCallOIAbove * 100) : 0;
    d.callWallOI = maxCallOI;

    // ── Put wall: strike with highest put OI at or below spot
    let maxPutOI = 0, putWallStrike = d.spot * 0.98;
    let totalNearPutOI = 0;
    let putOIBelowSpot = {};
    Object.entries(strikePutOI).forEach(([s, oi]) => {
      const sn = Number(s);
      totalNearPutOI += oi;
      if (sn <= d.spot * 1.02) {
        putOIBelowSpot[sn] = oi;
        if (oi > maxPutOI) {
          maxPutOI = oi;
          putWallStrike = sn;
        }
      }
    });
    d.putWall = putWallStrike;
    const totalPutOIBelow = Object.values(putOIBelowSpot).reduce((s, v) => s + v, 0);
    d.putWallConf = totalPutOIBelow > 0 ? (maxPutOI / totalPutOIBelow * 100) : 0;
    d.putWallOI = maxPutOI;

    // ── Max pain: strike where total option holder LOSSES are maximized
    // At pin price P: call holders with strike < P have intrinsic (P - strike), put holders with strike > P have intrinsic (strike - P)
    // Max pain = strike where SUM of holder payouts is MINIMIZED (holders lose the most)
    const nearStrikes = strikes.filter(s => Math.abs(s - d.spot) / d.spot < 0.10);
    if (nearStrikes.length === 0) nearStrikes.push(...strikes.filter(s => Math.abs(s - d.spot) / d.spot < 0.20));
    let minPayout = Infinity, maxPainStrike = d.spot;
    nearStrikes.forEach(pinPrice => {
      let totalPayout = 0;
      // Call holders: profit if strike < pinPrice → payout = (pinPrice - strike) × OI × 100
      Object.entries(strikeCallOI).forEach(([s, oi]) => {
        const strike = Number(s);
        if (pinPrice > strike) totalPayout += (pinPrice - strike) * oi * 100;
      });
      // Put holders: profit if strike > pinPrice → payout = (strike - pinPrice) × OI × 100
      Object.entries(strikePutOI).forEach(([s, oi]) => {
        const strike = Number(s);
        if (strike > pinPrice) totalPayout += (strike - pinPrice) * oi * 100;
      });
      if (totalPayout < minPayout) { minPayout = totalPayout; maxPainStrike = pinPrice; }
    });
    d.maxPain = maxPainStrike;
  }

  // ── Delta-weighted flow: Total, 0DTE (expired), Open (carries forward)
  let callDeltaFlow = 0, putDeltaFlow = 0;
  let zdteCallFlow = 0, zdtePutFlow = 0;
  let openCallFlow = 0, openPutFlow = 0;
  let totalVol = 0, zdteVol = 0, openVol = 0;
  let zdteCallVol = 0, zdtePutVol = 0, openCallVol = 0, openPutVol = 0;
  const sweeps = [];

  valid.forEach(c => {
    // DTE: compare dates in ET timezone to avoid UTC midnight issues
    const expStr = c.details.expiration_date;
    const [ey, em, ed] = expStr.split("-").map(Number);
    const expDate = new Date(ey, em - 1, ed);
    const dte = Math.round((expDate - todayMidnight) / 864e5);
    if (dte < 0 || dte > 90) return;
    const isCall = c.details.contract_type === "call";
    const delta = c.greeks.delta || 0;
    const vol = c.day ? (c.day.volume || 0) : 0;
    const oi = c.open_interest || 0;
    const deltaShares = Math.abs(delta) * vol * 100;
    const is0dte = dte === 0;

    totalVol += vol;

    // Total flow
    if (isCall) { callDeltaFlow += deltaShares; } else { putDeltaFlow += deltaShares; }

    // 0DTE flow
    if (is0dte) {
      zdteVol += vol;
      if (isCall) { zdteCallFlow += deltaShares; zdteCallVol += vol; }
      else { zdtePutFlow += deltaShares; zdtePutVol += vol; }
    } else {
      // Open (non-0DTE) flow — carries into tomorrow
      openVol += vol;
      if (isCall) { openCallFlow += deltaShares; openCallVol += vol; }
      else { openPutFlow += deltaShares; openPutVol += vol; }
    }

    // High-delta sweeps
    if (Math.abs(delta) > 0.7 && vol > 100) {
      sweeps.push({
        type: isCall ? "C" : "P",
        strike: c.details.strike_price,
        delta: delta,
        contracts: vol,
        side: "traded",
        eqShares: Math.abs(delta) * vol * 100 * (isCall ? 1 : -1),
        time: is0dte ? "0DTE" : `${dte}d`,
        oi: oi,
        iv: c.implied_volatility || 0,
      });
    }
  });

  // ── Total P/C and flow
  if (callDeltaFlow > 0 || putDeltaFlow > 0) {
    d.cdf = callDeltaFlow;
    d.pdf = putDeltaFlow;
    d.dpc = putDeltaFlow / Math.max(callDeltaFlow, 1);
    d.nds = callDeltaFlow - putDeltaFlow;
    // Approximate percentile: typical delta P/C distribution centers ~0.8 with stdev ~0.35
    // Map the current value to an approximate percentile rank
    const mu = 0.8, sigma = 0.35;
    const z = (d.dpc - mu) / sigma;
    // Normal CDF approximation (Abramowitz & Stegun)
    const t = 1 / (1 + 0.2316419 * Math.abs(z));
    const d1 = 0.3989422802 * Math.exp(-z * z / 2);
    const p = 1 - d1 * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
    d.pcp = Math.round(z >= 0 ? p * 100 : (1 - p) * 100);
    d.pcp = Math.max(1, Math.min(99, d.pcp));
  }

  // ── 0DTE breakdown
  d.zdteVol = zdteVol;
  d.zdtePct = totalVol > 0 ? (zdteVol / totalVol * 100) : 0;
  d.zdteCallFlow = zdteCallFlow;
  d.zdtePutFlow = zdtePutFlow;
  d.zdteDpc = zdtePutFlow / Math.max(zdteCallFlow, 1);
  d.zdteNetDelta = zdteCallFlow - zdtePutFlow;

  // ── 0DTE gamma regime: compute from 0DTE contracts in the chain
  let zdteGex = 0;
  let zdteNetDeltaShares = zdteCallFlow - zdtePutFlow;
  valid.forEach(c => {
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const expDate = new Date(ey, em - 1, ed);
    const dte = Math.round((expDate - todayMidnight) / 864e5);
    if (dte !== 0) return;
    const isCall = c.details.contract_type === "call";
    const gamma = Math.abs(c.greeks.gamma || 0);
    const oi = c.open_interest || 0;
    if (oi < 10) return;
    const contractGex = gamma * oi * 100 * d.spot * d.spot * 0.01;
    zdteGex += isCall ? contractGex : -contractGex;
  });
  d.zdg = zdteGex;
  d.zdr = zdteGex >= 0 ? "positive" : "negative";
  d.zds = Math.abs(zdteGex) / Math.max(d.spot, 1);

  // ── Open (carries forward) breakdown
  d.openVol = openVol;
  d.openCallFlow = openCallFlow;
  d.openPutFlow = openPutFlow;
  d.openDpc = openPutFlow / Math.max(openCallFlow, 1);
  d.openNetDelta = openCallFlow - openPutFlow;

  // ── Sweeps
  if (sweeps.length > 0) {
    d.trades = sweeps.sort((a, b) => Math.abs(b.eqShares) - Math.abs(a.eqShares)).slice(0, 10);
  }

  // ── Options-driven volume
  const totalDeltaShares = callDeltaFlow + putDeltaFlow;
  // Use actual equity volume if available (from snapshot), otherwise fall back to ADV table
  const advShares = d.equityVolume > 0 ? d.equityVolume : (ADV[d.ticker] || 10) * 1e6;
  d.optVolShares = totalDeltaShares;
  d.optVolPctADV = (totalDeltaShares / advShares) * 100;
  d.optVolRaw = totalVol;

  // ── Skew Z-score: 25-delta put IV vs 25-delta call IV
  const puts25d = valid.filter(c => c.details.contract_type === "put" && c.greeks.delta && Math.abs(c.greeks.delta) > 0.20 && Math.abs(c.greeks.delta) < 0.30 && c.implied_volatility > 0);
  const calls25d = valid.filter(c => c.details.contract_type === "call" && c.greeks.delta && c.greeks.delta > 0.20 && c.greeks.delta < 0.30 && c.implied_volatility > 0);
  if (puts25d.length > 0 && calls25d.length > 0) {
    const putIV = puts25d.reduce((s, c) => s + c.implied_volatility, 0) / puts25d.length;
    const callIV = calls25d.reduce((s, c) => s + c.implied_volatility, 0) / calls25d.length;
    const skewRaw = (putIV - callIV) * 100; // in vol points
    // Normalize to approximate z-score (typical skew is 2-5 pts, so divide by ~3)
    d.skewZ = skewRaw / 3;
  }

  // ── Term structure: front-month IV vs back-month IV
  const byExp = {};
  valid.forEach(c => {
    if (!c.implied_volatility || c.implied_volatility <= 0) return;
    const dte = Math.floor((new Date(c.details.expiration_date) - now) / 864e5);
    if (dte < 5 || dte > 90) return;
    const bucket = dte <= 30 ? "front" : "back";
    if (!byExp[bucket]) byExp[bucket] = [];
    byExp[bucket].push(c.implied_volatility);
  });
  if (byExp.front && byExp.front.length > 2 && byExp.back && byExp.back.length > 2) {
    const frontIV = byExp.front.reduce((s, v) => s + v, 0) / byExp.front.length;
    const backIV = byExp.back.reduce((s, v) => s + v, 0) / byExp.back.length;
    d.termSlope = frontIV / Math.max(backIV, 0.01);
  }

  // ── 25-Delta Risk Reversal: IV(25Δ call) - IV(25Δ put) on nearest-to-30-DTE expiration
  // Negative = puts richer than calls (typical for equities, protective hedging demand)
  // Extreme negative = near-term bottom signal; less negative / positive = near-term top signal
  const rr25dContracts = valid.filter(c => {
    if (!c.implied_volatility || c.implied_volatility <= 0 || !c.greeks.delta) return false;
    const [ey, em, ed] = c.details.expiration_date.split("-").map(Number);
    const expDate = new Date(ey, em - 1, ed);
    const dte = Math.round((expDate - todayMidnight) / 864e5);
    return dte >= 14 && dte <= 45;
  });
  const rr25puts = rr25dContracts.filter(c => c.details.contract_type === "put" && Math.abs(c.greeks.delta) >= 0.18 && Math.abs(c.greeks.delta) <= 0.32);
  const rr25calls = rr25dContracts.filter(c => c.details.contract_type === "call" && c.greeks.delta >= 0.18 && c.greeks.delta <= 0.32);
  if (rr25puts.length > 0 && rr25calls.length > 0) {
    const putIV = rr25puts.reduce((s, c) => s + c.implied_volatility, 0) / rr25puts.length;
    const callIV = rr25calls.reduce((s, c) => s + c.implied_volatility, 0) / rr25calls.length;
    d.rr25d = (callIV - putIV) * 100; // in vol points, negative = put skew dominant
    d.rr25dPutIV = putIV * 100;
    d.rr25dCallIV = callIV * 100;
    d.rr25dATMIV = d.iv || ((putIV + callIV) / 2 * 100);
  }

  // ── IV: average implied vol across ATM contracts (delta 0.35-0.65)
  const atmContracts = valid.filter(c => c.implied_volatility > 0 && c.greeks.delta && Math.abs(Math.abs(c.greeks.delta) - 0.5) < 0.15);
  if (atmContracts.length > 0) {
    d.iv = (atmContracts.reduce((s, c) => s + c.implied_volatility, 0) / atmContracts.length) * 100;
  }
  // RV: approximate from IV until we accumulate historical spot data for proper calculation
  // Typical VRP is 2-5 points positive, so RV ≈ IV * 0.90 is a reasonable interim estimate
  if (d.iv > 0) {
    d.rv = d.iv * 0.90;
  }
  d.vrp = d.iv - d.rv;

  // ── Squeeze score: composite of negative gamma proximity, put wall distance, skew
  const flipProx = Math.abs(d.flipDist);
  const putWallDist = d.spot > 0 ? (d.spot - d.putWall) / d.spot * 100 : 10;
  d.sq = Math.min(100, Math.max(0,
    (d.regime === "negative" ? 30 : 0) +
    (flipProx < 1 ? 25 : flipProx < 2 ? 15 : flipProx < 5 ? 5 : 0) +
    (putWallDist < 2 ? 20 : putWallDist < 5 ? 10 : 0) +
    (d.skewZ > 1.5 ? 15 : d.skewZ > 1 ? 8 : 0) +
    (d.dpc > 1.3 ? 10 : 0)
  ));

  // ── After-hours flag: if total volume across chain is 0, mark as prior session
  if (totalVol === 0) {
    d._afterHours = true;
  }

  d._polyChain = true;
  d._live = true;
  return d;
}

// Live vol divergence scanner using Polygon chain data
async function fetchVolDivergencesLive(watchlist) {
  const results = [];

  for (let i = 0; i < watchlist.length; i++) {
    const ticker = watchlist[i];

    // Get spot price and daily change from stock quote
    const polyQuote = await fetchPoly("quote", ticker);
    let spot = 0, changePct = 0, prevClose = 0;
    if (polyQuote && polyQuote.results && polyQuote.results.length > 0) {
      const q = polyQuote.results[0];
      spot = q.c || q.vw || 0;
      prevClose = q.prevClose || 0;
      changePct = q.changePerc || 0;
      if (!changePct && prevClose > 0) {
        changePct = ((spot - prevClose) / prevClose) * 100;
      }
    }
    if (spot <= 0) continue;

    const chain = await fetchPoly("chain", ticker);
    if (!chain || !chain.results || chain.results.length < 5) continue;

    const now = new Date();
    const todayET = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
    const todayDate = new Date(todayET.getFullYear(), todayET.getMonth(), todayET.getDate());
    const contracts = chain.results.filter(c => c.details && c.greeks && c.details.expiration_date);

    // ═══ SIGNAL 1: Classic OTM divergence (puts up / shares up, calls up / shares down)
    if (Math.abs(changePct) >= 0.15) {
      const otmContracts = contracts.filter(c => {
        const exp = c.details.expiration_date;
        if (!exp) return false;
        const [ey, em, ed] = exp.split("-").map(Number);
        const dte = Math.round((new Date(ey, em - 1, ed) - todayDate) / 864e5);
        if (dte < 14 || dte > 75) return false;
        const strike = c.details.strike_price;
        const otm = Math.abs(strike - spot) / spot;
        if (otm < 0.02 || otm > 0.20) return false;
        const isCall = c.details.contract_type === "call";
        if (isCall && strike <= spot) return false;
        if (!isCall && strike >= spot) return false;
        return true;
      });

      if (otmContracts.length >= 2) {
        const sharesUp = changePct > 0.15;
        const targetType = sharesUp ? "put" : "call";
        const targetContracts = otmContracts.filter(c => c.details.contract_type === targetType);

        if (targetContracts.length >= 1) {
          const ivValues = targetContracts.map(c => c.implied_volatility || 0).filter(v => v > 0);
          if (ivValues.length >= 1) {
            const avgIV = ivValues.reduce((s, v) => s + v, 0) / ivValues.length;
            const volValues = targetContracts.map(c => (c.day && c.day.volume) || 0);
            const oiValues = targetContracts.map(c => c.open_interest || 0);
            const totalVol = volValues.reduce((s, v) => s + v, 0);
            const totalOI = oiValues.reduce((s, v) => s + v, 0);
            const volOIRatio = totalOI > 0 ? totalVol / totalOI : 0;

            if ((totalVol >= 50 || volOIRatio >= 0.3) && avgIV >= 0.10) {
              const topContract = targetContracts.sort((a, b) => ((b.day && b.day.volume) || 0) - ((a.day && a.day.volume) || 0))[0];
              const topStrike = topContract.details.strike_price;
              const topDelta = topContract.greeks.delta || 0;
              const topDte = Math.floor((new Date(topContract.details.expiration_date) - now) / 864e5);
              const otmPct = Math.abs(topStrike - spot) / spot * 100;
              const ivSorted = [...ivValues].sort((a, b) => a - b);
              const p75 = ivSorted[Math.floor(ivSorted.length * 0.5)] || avgIV;
              const elevated = ivValues.filter(v => v >= p75 * 0.9).length;
              const isPutDiv = targetType === "put";
              const ivPct = avgIV * 100;
              const severity = Math.min(100, Math.round(
                (ivPct > 50 ? 25 : ivPct > 35 ? 15 : 5) +
                (volOIRatio > 3 ? 25 : volOIRatio > 2 ? 15 : 5) +
                (totalVol > 2000 ? 20 : totalVol > 500 ? 10 : 5) +
                (elevated / targetContracts.length > 0.7 ? 20 : 10) +
                (Math.abs(changePct) > 2 ? 10 : 5)
              ));
              results.push({
                ticker, spot, shareChg: changePct, isPutDiv,
                divType: "otm",
                type: isPutDiv ? "Puts up / shares up" : "Calls up / shares down",
                signal: isPutDiv ? "Informed downside positioning into strength" : "Informed upside positioning into weakness",
                strike: topStrike, dte: topDte, otmPct,
                ivJump: ivPct, priorIV: ivPct * 0.75, currentIV: ivPct,
                optPriceChg: volOIRatio * 20,
                volume: totalVol, avgOI: totalOI, volOIRatio,
                delta: topDelta, eqShares: Math.abs(topDelta) * totalVol * 100,
                chainStrikesElevated: elevated, chainTotalStrikes: targetContracts.length,
                severity, at: assetType(ticker), _live: true,
              });
            }
          }
        }
      }
    }

    // ═══ SIGNAL 2: Spot-up / Vol-up (FOMO call chasing — Bloomberg "spot-up/vol-up" correlation)
    // Normally spot up → IV down. When both rise, retail/momentum traders are chasing upside
    // through long calls, bidding up premiums. This historically marks speculative excess
    // and precedes sharp reversals. The Bloomberg chart tracks this as 1M realized correlation
    // between NDX spot and 1M 25Δ call IV.
    //
    // We detect it per-stock: shares up AND ATM/OTM call IV elevated AND call volume dominance.
    // Inverse: spot-down / vol-down = complacency into weakness (IV should spike but isn't).
    if (Math.abs(changePct) >= 0.3) {
      // Get near-term ATM contracts (14-60 DTE, delta 0.25-0.75) to measure aggregate IV
      const nearATM = contracts.filter(c => {
        if (!c.implied_volatility || c.implied_volatility <= 0) return false;
        const exp = c.details.expiration_date;
        if (!exp) return false;
        const [ey, em, ed] = exp.split("-").map(Number);
        const dte = Math.round((new Date(ey, em - 1, ed) - todayDate) / 864e5);
        if (dte < 7 || dte > 60) return false;
        const absDelta = Math.abs(c.greeks.delta || 0);
        return absDelta >= 0.15 && absDelta <= 0.85;
      });

      if (nearATM.length >= 4) {
        // Separate calls and puts
        const nearCalls = nearATM.filter(c => c.details.contract_type === "call");
        const nearPuts = nearATM.filter(c => c.details.contract_type === "put");

        const callIVs = nearCalls.map(c => c.implied_volatility).filter(v => v > 0);
        const putIVs = nearPuts.map(c => c.implied_volatility).filter(v => v > 0);
        const avgCallIV = callIVs.length > 0 ? callIVs.reduce((s, v) => s + v, 0) / callIVs.length * 100 : 0;
        const avgPutIV = putIVs.length > 0 ? putIVs.reduce((s, v) => s + v, 0) / putIVs.length * 100 : 0;

        // Call volume vs put volume in the near-term
        const callVol = nearCalls.reduce((s, c) => s + ((c.day && c.day.volume) || 0), 0);
        const putVol = nearPuts.reduce((s, c) => s + ((c.day && c.day.volume) || 0), 0);
        const totalNearVol = callVol + putVol;
        const callDominance = totalNearVol > 0 ? callVol / totalNearVol : 0.5;

        // 25-delta call IV specifically (the metric Bloomberg tracks)
        const calls25d = nearCalls.filter(c => c.greeks.delta >= 0.18 && c.greeks.delta <= 0.35);
        const avg25dCallIV = calls25d.length > 0
          ? calls25d.reduce((s, c) => s + c.implied_volatility, 0) / calls25d.length * 100
          : avgCallIV;

        const spotUp = changePct > 0.3;
        const spotDown = changePct < -0.3;

        // Spot-up / Vol-up: shares rising AND call IV elevated (> put IV or high absolutely)
        // Key signal: call IV > put IV is abnormal (puts normally trade richer)
        // OR: call IV is elevated absolutely (> 30% for most stocks)
        const callIVRicher = avgCallIV > avgPutIV && avgPutIV > 0;
        const callIVElevated = avg25dCallIV > 25; // 25%+ is notable
        const callChasing = callDominance > 0.60; // calls > 60% of volume

        if (spotUp && (callIVRicher || (callIVElevated && callChasing))) {
          const riskRevSpread = avgCallIV - avgPutIV;
          // Severity: how extreme is the spot-up/vol-up
          const severity = Math.min(100, Math.round(
            (callIVRicher ? 25 : 0) +
            (riskRevSpread > 3 ? 20 : riskRevSpread > 1 ? 10 : 0) +
            (avg25dCallIV > 50 ? 20 : avg25dCallIV > 35 ? 12 : avg25dCallIV > 25 ? 5 : 0) +
            (callDominance > 0.75 ? 20 : callDominance > 0.65 ? 12 : callDominance > 0.55 ? 5 : 0) +
            (changePct > 3 ? 15 : changePct > 1.5 ? 10 : 5)
          ));

          // Don't duplicate if already flagged by Signal 1
          const alreadyFlagged = results.find(r => r.ticker === ticker);
          if (!alreadyFlagged && severity >= 25) {
            results.push({
              ticker, spot, shareChg: changePct, isPutDiv: false,
              divType: "spotUpVolUp",
              type: "Spot up / vol up",
              signal: "Speculative call chasing — FOMO driving IV higher into rally",
              callIV: avg25dCallIV, putIV: avgPutIV, callIVRicher, riskRevSpread,
              callDominance: Math.round(callDominance * 100),
              callVol, putVol, totalVol: totalNearVol,
              ivJump: avg25dCallIV, currentIV: avg25dCallIV, priorIV: avg25dCallIV * 0.85,
              chainStrikesElevated: callIVRicher ? calls25d.length : 0,
              chainTotalStrikes: nearCalls.length,
              severity, at: assetType(ticker), _live: true,
            });
          }
        }

        // Spot-down / Vol-down: shares falling but IV compressing (complacency)
        // Normally shares down → put IV spikes. If it doesn't, the market is mispricing risk.
        if (spotDown && avgPutIV > 0 && avgPutIV < 25 && !callIVRicher) {
          const severity = Math.min(100, Math.round(
            (avgPutIV < 15 ? 25 : avgPutIV < 20 ? 15 : 5) +
            (Math.abs(changePct) > 3 ? 20 : Math.abs(changePct) > 1.5 ? 12 : 5) +
            (callDominance < 0.35 ? 10 : 0) +
            15 // base for this rare signal
          ));
          const alreadyFlagged = results.find(r => r.ticker === ticker);
          if (!alreadyFlagged && severity >= 30) {
            results.push({
              ticker, spot, shareChg: changePct, isPutDiv: true,
              divType: "spotDownVolDown",
              type: "Spot down / vol down",
              signal: "IV compressed into selloff — complacency or informed bottom",
              callIV: avgCallIV, putIV: avgPutIV,
              ivJump: avgPutIV, currentIV: avgPutIV, priorIV: avgPutIV * 1.15,
              chainStrikesElevated: 0, chainTotalStrikes: nearPuts.length,
              callDominance: Math.round(callDominance * 100),
              callVol, putVol, totalVol: totalNearVol,
              severity, at: assetType(ticker), _live: true,
            });
          }
        }
      }
    }
  }
  return results.sort((a, b) => b.severity - a.severity);
}

// Fetch live data for a single ticker — all from Polygon
async function fetchTickerLive(ticker, idx) {
  const base = emptyTicker(ticker);

  // Step 1: Get spot price from Polygon snapshot (real-time with stock feed, or 15-min delayed)
  const polyQuote = await fetchPoly("quote", ticker);
  let spotPrice = 0;
  let equityVol = 0;
  let prevClose = 0;
  let changePerc = 0;
  if (polyQuote && polyQuote.results && polyQuote.results.length > 0) {
    const q = polyQuote.results[0];
    spotPrice = q.c || q.vw || 0;
    equityVol = q.v || 0;
    prevClose = q.prevClose || 0;
    changePerc = q.changePerc || 0;
  }
  if (spotPrice <= 0) {
    base._error = "no quote";
    return base;
  }

  // Step 2: Fetch chain filtered around the spot price
  // SPY/QQQ/IWM have strikes at every $1 — use tighter range to avoid pagination issues
  const tightRange = ["SPY","QQQ","IWM","DIA","SPX","NDX"].includes(ticker);
  const rangeParam = tightRange ? `chain&spot=${spotPrice}&range=tight` : `chain&spot=${spotPrice}`;
  const chain = await fetchPoly(rangeParam, ticker);

  // Step 3: Use Polygon snapshot price directly — real-time with stock feed subscription
  base.spot = spotPrice;
  base.equityVolume = equityVol;
  base.prevClose = prevClose;
  base.changePerc = changePerc;
  base._live = true;
  base._priceSource = polyQuote.priceSource || "snapshot";

  let d = computeFromChain(base, chain);
  return d;
}

const fmtS = n => { const a = Math.abs(Math.round(n)); return a >= 1e6 ? `${Math.round(a/1e6)}M shs` : a >= 1e3 ? `${Math.round(a/1e3)}K shs` : `${a} shs`; };

const ADV = {SPY:80,QQQ:50,IWM:30,AAPL:55,MSFT:25,NVDA:300,TSLA:100,META:20,AMZN:40,GOOGL:25,AMD:50,NFLX:5,JPM:10,GS:3,MU:50,COIN:15,GME:10,MARA:30,SMCI:20,ARM:8,PLTR:60,SOFI:30,RIVN:15,XLF:25,XLK:8,XLE:15,AVGO:5,QCOM:8,CRM:5,BA:8,V:7,MA:3,UNH:3,LLY:3,ABBV:5};

// Compute relative 0DTE impact score
// Combines: shares-as-%-of-ADV and shares-as-%-of-float (via mcap/price)
function compute0dteImpact(d) {
  const eqShares = d.zds || 0;
  const advShares = d.equityVolume > 0 ? d.equityVolume : (ADV[d.ticker] || 10) * 1e6;
  const mcap = (MCAP[d.ticker] || 50) * 1e9;
  const approxFloat = mcap / Math.max(d.spot, 1);
  const pctOfADV = (eqShares / advShares) * 100;
  const pctOfFloat = (eqShares / Math.max(approxFloat, 1)) * 100;
  const score = (pctOfADV * 0.7) + (pctOfFloat * 0.3 * 100);
  return { score, pctOfADV, pctOfFloat, eqShares };
}

// ─── VOL DIVERGENCE SCANNER ────────────────────────────────────────
// Flags: OTM puts up while shares up, or OTM calls up while shares down
// These are rare — most scans return empty. When they fire, it's the most important signal.
// LIVE: Polygon GET /v3/snapshot/options/{underlyingAsset} → compare IV vs prior session
// genVolDivergences removed — using fetchVolDivergencesLive instead

function nextOpex() {
  const today = new Date().toISOString().slice(0, 10);
  for (const d of OPEX) { if (d >= today) { const o = new Date(d+"T16:00:00"), df = o - new Date(); return { date: d, days: Math.floor(df/864e5), hours: Math.floor((df%864e5)/36e5), isNear: Math.floor(df/864e5) <= 2 }; } }
  return { date: "2026-12-18", days: 99, hours: 0, isNear: false };
}

function buildSummary(d) {
  const opex = nextOpex();
  const lines = [];
  let score = 0;
  const factors = [];
  const eq = fmtEq(d.regime==="positive" ? d.dspct : -d.dspct);

  if (d.regime === "positive") {
    lines.push(`${d.ticker} is in positive gamma — dealers are suppressing moves with ${eq.label} of counter-trend hedging per 1% move. Gamma flip at ${fmtP(d.gammaFlip)}, spot ${Math.abs(d.flipDist).toFixed(1)}% ${d.flipDist>0?"above":"below"}. Call wall resistance at ${fmtP(d.callWall)} (${(d.callWallConf||0).toFixed(0)}% concentration), put wall support at ${fmtP(d.putWall)} (${(d.putWallConf||0).toFixed(0)}% concentration).`);
    score += 10;
    factors.push({ sig: "Gamma regime", det: `Positive — ${eq.label} counter-trend per 1%`, imp: "suppressing", dir: "neutral" });
  } else {
    lines.push(`${d.ticker} is in negative gamma — dealers are amplifying moves with ${eq.label} of pro-trend hedging per 1% move. Gamma flip at ${fmtP(d.gammaFlip)}, spot ${Math.abs(d.flipDist).toFixed(1)}% ${d.flipDist>0?"above":"below"}. Call wall resistance at ${fmtP(d.callWall)} (${(d.callWallConf||0).toFixed(0)}% concentration), put wall support at ${fmtP(d.putWall)} (${(d.putWallConf||0).toFixed(0)}% concentration).`);
    score -= 15;
    factors.push({ sig: "Gamma regime", det: `Negative — ${eq.label} pro-trend per 1%`, imp: "amplifying", dir: "bearish" });
  }

  if (Math.abs(d.flipDist) < 1) { score += d.flipDist<0?-15:-5; factors.push({ sig: "Flip proximity", det: `${Math.abs(d.flipDist).toFixed(1)}% from flip — regime change imminent`, imp: "critical", dir: "volatile" }); }

  const p2 = [];
  if (d.dpc > 1.5) { p2.push(`delta-weighted P/C at ${d.dpc.toFixed(2)} (${d.pcp}th pct) with net ${fmtEq(-Math.abs(d.nds)).label} bearish flow`); score -= 15; factors.push({ sig: "Delta-weighted P/C", det: `${d.dpc.toFixed(2)} (${d.pcp}th pct) — ${fmtEq(-Math.abs(d.nds)).label} bearish`, imp: "bearish", dir: "bearish" }); }
  else if (d.dpc < 0.6) { p2.push(`delta-weighted P/C at ${d.dpc.toFixed(2)} (${d.pcp}th pct) with net ${fmtEq(Math.abs(d.nds)).label} bullish flow`); score += 15; factors.push({ sig: "Delta-weighted P/C", det: `${d.dpc.toFixed(2)} (${d.pcp}th pct) — ${fmtEq(Math.abs(d.nds)).label} bullish`, imp: "bullish", dir: "bullish" }); }
  else { p2.push(`delta-weighted P/C at ${d.dpc.toFixed(2)} (balanced)`); factors.push({ sig: "Delta-weighted P/C", det: `${d.dpc.toFixed(2)} (${d.pcp}th pct) — balanced`, imp: "neutral", dir: "neutral" }); }
  if (Math.abs(d.skewZ) > 2) { const sk = d.skewZ>0?"bearish":"bullish"; p2.push(`skew at ${d.skewZ.toFixed(1)}σ (${sk} outlier)`); score += d.skewZ>0?-10:10; factors.push({ sig: "Skew outlier", det: `${d.skewZ.toFixed(1)}σ — ${sk==="bearish"?"heavy put skew":"call skew elevated"}`, imp: "outlier", dir: sk }); }
  if (d.sq > 60) { const sd = d.regime==="negative"?"downside":"upside"; p2.push(`squeeze score ${Math.round(d.sq)} (${sd} setup)`); score += d.regime==="negative"?-15:15; factors.push({ sig: "Squeeze", det: `Score ${Math.round(d.sq)} — ${sd} squeeze`, imp: "high", dir: d.regime==="negative"?"bearish":"bullish" }); }
  if (p2.length) lines.push(p2.join(", ") + ".");

  if (Math.abs(d.pcr) > 50000) { const a = d.pcr<0?"bearish":"bullish"; score += d.pcr>0?5:-5; factors.push({ sig: "P/C momentum", det: `${a} — ${fmtEq(d.pcr).label} daily shift`, imp: a, dir: a }); }
  if (Math.abs(d.zdg) > 5e8) { const zs = d.zdr==="negative"?-d.zds:d.zds; score += d.zdr==="negative"?-10:5; factors.push({ sig: "0DTE gamma", det: `${d.zdr} — ${fmtEq(zs).label} expiring`, imp: d.zdr==="negative"?"amplifying":"suppressing", dir: d.zdr==="negative"?"volatile":"neutral" }); }
  const bigT = d.trades.filter(t => Math.abs(t.eqShares)>30000);
  if (bigT.length) { const net = bigT.reduce((s,t) => s+(t.side==="bought"?Math.abs(t.eqShares):-Math.abs(t.eqShares)),0); score += net>0?8:-8; factors.push({ sig: "Sweeps", det: `${bigT.length} prints, net ${fmtEq(net).label}`, imp: net>0?"bullish":"bearish", dir: net>0?"bullish":"bearish" }); }
  const pd = ((d.maxPain-d.spot)/d.spot)*100;
  if (Math.abs(pd) > 1) { score += pd>0?5:-5; factors.push({ sig: "Max pain", det: `Pin ${fmtP(d.maxPain)} (${pd>0?"+":""}${pd.toFixed(1)}%) — pull ${pd>0?"up":"down"} into OPEX`, imp: "pin", dir: pd>0?"bullish":"bearish" }); }
  if (d.vrp > 10) factors.push({ sig: "VRP", det: `+${d.vrp.toFixed(0)}pts — options expensive`, imp: "elevated", dir: "neutral" });
  else if (d.vrp < -5) factors.push({ sig: "VRP", det: `${d.vrp.toFixed(0)}pts — options cheap`, imp: "compressed", dir: "volatile" });

  const p3 = [];
  if (Math.abs(d.zdg)>5e8) p3.push(`0DTE ${d.zdr} gamma (${fmtEq(d.zdr==="negative"?-d.zds:d.zds).label} expiring)`);
  if (opex.isNear) p3.push(`OPEX in ${opex.days}d ${opex.hours}h — gamma amplified`);
  if (bigT.length) { const net = bigT.reduce((s,t) => s+(t.side==="bought"?Math.abs(t.eqShares):-Math.abs(t.eqShares)),0); p3.push(`${bigT.length} sweep${bigT.length>1?"s":""} (net ${fmtEq(net).label})`); }
  if (p3.length) lines.push(p3.join("; ") + ".");

  // Time-aware verdict: "into tomorrow" only after market close (4pm ET)
  const nowET = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
  const hoursET = nowET.getHours() + nowET.getMinutes() / 60;
  const isAfterClose = hoursET >= 16 || nowET.getDay() === 0 || nowET.getDay() === 6;
  const timeframe = isAfterClose ? "into tomorrow" : "this session";

  score = Math.max(-100, Math.min(100, score));
  let verdict, vc, vbg;
  if (score > 30) { verdict = `Options positioned as bullish tailwind ${timeframe}`; vc = "#0F6E56"; vbg = "rgba(29,158,117,0.08)"; }
  else if (score > 10) { verdict = `Mild bullish positioning bias ${timeframe}`; vc = "#1D9E75"; vbg = "rgba(29,158,117,0.05)"; }
  else if (score > -10) { verdict = `Options positioning neutral ${timeframe}`; vc = "#888780"; vbg = "rgba(128,128,128,0.05)"; }
  else if (score > -30) { verdict = `Mild bearish positioning pressure ${timeframe}`; vc = "#BA7517"; vbg = "rgba(186,117,23,0.06)"; }
  else { verdict = `Options positioned as bearish headwind ${timeframe}`; vc = "#A32D2D"; vbg = "rgba(226,75,74,0.08)"; }
  return { score, verdict, vc, vbg, lines, factors };
}

  const values = data.map(d => d[metric] || 0);
  const maxVal = Math.max(...values, 0.01);
  const minVal = Math.min(...values, 0);
  const range = maxVal - minVal || 1;
  const chartW = 520, chartH = 160, padL = 45, padR = 10, padT = 10, padB = 28;
  const plotW = chartW - padL - padR, plotH = chartH - padT - padB;

  const pts = data.map((d, i) => {
    const x = padL + (i / Math.max(data.length - 1, 1)) * plotW;
    const y = padT + plotH - ((d[metric] || 0) - minVal) / range * plotH;

  const pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");

  const zoneColors = metric === "optVolPctADV" ? [

          <div style={{ fontSize: "11px", opacity: 0.6 }}>{data.length} trading days</div>
        </div>
        <button onClick={onClose} style={{ background: "none", border: "none", fontSize: "18px", cursor: "pointer", opacity: 0.5 }}>✕</button>
      </div>
      <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{ width: "100%", height: "auto", fontFamily: "'SF Mono', monospace" }}>
        {/* Grid lines */}
        {[0, 0.25, 0.5, 0.75, 1].map(pct => {
          const y = padT + plotH * (1 - pct);
          const val = minVal + range * pct;
          return <g key={pct}><line x1={padL} x2={chartW - padR} y1={y} y2={y} stroke="rgba(128,128,128,0.15)" /><text x={padL - 4} y={y + 3} textAnchor="end" fontSize="8" fill="rgba(0,0,0,0.4)">{val.toFixed(1)}{unit||""}</text></g>;

          {maxVal > 10 && <rect x={padL} y={padT + plotH - (Math.min(maxVal, 20) - 10) / range * plotH} width={plotW} height={(Math.min(maxVal, 20) - Math.max(minVal, 10)) / range * plotH} fill="rgba(186,117,23,0.06)" />}

        {pts.filter((_, i) => i === 0 || i === pts.length - 1 || i === Math.floor(pts.length / 2)).map(p => <text key={p.d.date} x={p.x} y={chartH - 4} textAnchor="middle" fontSize="8" fill="rgba(0,0,0,0.4)">{p.d.date.slice(5)}</text>)}

      </div>}
    </div>
  </div>;
