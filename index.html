const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── LIVE API LAYER ────────────────────────────────────────────────
// Calls Netlify Functions which proxy to Polygon
// API keys are stored in Netlify environment variables — never in the browser
let USE_LIVE = true;

async function fetchPoly(endpoint, ticker) {
  try {
    const r = await fetch(`/.netlify/functions/polygon?endpoint=${endpoint}&ticker=${ticker}`);
    if (!r.ok) throw new Error(`Poly ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch (e) { console.warn("Polygon:", e.message); return null; }
}

// ─── SELF-COMPUTED GEX ENGINE ──────────────────────────────────────
// Computes GEX, gamma flip, call/put walls, max pain, regime, P/C ratio,
// sweeps, and spot price entirely from Polygon options chain data.
// Standard dealer assumption: dealers are short what was bought.

function computeFromChain(d, chainData) {
  if (!chainData || !chainData.results || !chainData.results.length) return d;
  if (!d._live) return d; // Don't compute positioning without a verified spot price
  const contracts = chainData.results;
  const now = new Date();
  const spot = d.spot;

  // ── Filter to valid contracts with greeks
  const valid = contracts.filter(c => c.details && c.greeks && c.details.expiration_date && c.details.strike_price);
  if (valid.length === 0) return d;

  // ── Spot price: ONLY use Polygon quote price set upstream. Never derive from ATM delta.
  // Bad data is worse than no data.

  // ── Separate near-term (7-45 DTE) for GEX/walls/max pain vs broader for flow
  const MIN_DTE = 7, MAX_DTE = 45;
  const MIN_OI = 100; // minimum open interest to count toward walls
  const nearTerm = valid.filter(c => {
    const dte = Math.floor((new Date(c.details.expiration_date) - now) / 864e5);
    return dte >= MIN_DTE && dte <= MAX_DTE;
  });

  // ── GEX computation (near-term only)
  let netGex = 0;
  const strikeGex = {};
  const strikeCallOI = {};
  const strikePutOI = {};

  nearTerm.forEach(c => {
    const isCall = c.details.contract_type === "call";
    const gamma = Math.abs(c.greeks.gamma || 0);
    const oi = c.open_interest || 0;
    const strike = c.details.strike_price;
    if (oi < 10) return; // skip trivial OI

    const contractGex = gamma * oi * 100 * d.spot * d.spot * 0.01;
    const signedGex = isCall ? contractGex : -contractGex;
    netGex += signedGex;

    if (!strikeGex[strike]) strikeGex[strike] = 0;
    strikeGex[strike] += signedGex;

    if (!strikeCallOI[strike]) strikeCallOI[strike] = 0;
    if (!strikePutOI[strike]) strikePutOI[strike] = 0;
    if (isCall) strikeCallOI[strike] += oi; else strikePutOI[strike] += oi;
  });

  const strikes = Object.keys(strikeGex).map(Number).sort((a, b) => a - b);

  if (strikes.length > 0) {
    // ── Set GEX and regime
    d.netGex = netGex;
    d.regime = netGex > 0 ? "positive" : "negative";
    d.dspct = Math.abs(netGex) / Math.max(d.spot, 1);

    // ── Gamma flip: interpolated strike where cumulative GEX crosses zero
    let cumGex = 0;
    let flipStrike = d.spot;
    let foundFlip = false;
    for (let i = 0; i < strikes.length; i++) {
      const prevCum = cumGex;
      cumGex += strikeGex[strikes[i]];
      if ((prevCum <= 0 && cumGex > 0) || (prevCum >= 0 && cumGex < 0)) {
        if (i > 0) {
          const ratio = Math.abs(prevCum) / (Math.abs(prevCum) + Math.abs(cumGex));
          flipStrike = strikes[i - 1] + (strikes[i] - strikes[i - 1]) * ratio;
        } else {
          flipStrike = strikes[i];
        }
        foundFlip = true;
        break;
      }
    }
    // Sanity check: flip must be within 20% of spot, otherwise discard
    if (!foundFlip || Math.abs(flipStrike - d.spot) / d.spot > 0.20) {
      flipStrike = d.spot;
    }
    d.gammaFlip = flipStrike;
    d.flipDist = ((d.spot - d.gammaFlip) / d.spot) * 100;

    // ── Call wall: strike with highest call OI at or above spot
    let maxCallOI = 0, callWallStrike = d.spot * 1.02;
    let totalNearCallOI = 0;
    let callOIAboveSpot = {};
    Object.entries(strikeCallOI).forEach(([s, oi]) => {
      const sn = Number(s);
      totalNearCallOI += oi;
      if (sn >= d.spot * 0.98) {
        callOIAboveSpot[sn] = oi;
        if (oi > maxCallOI) {
          maxCallOI = oi;
          callWallStrike = sn;
        }
      }
    });
    d.callWall = callWallStrike;
    // Confidence: wall OI as % of all call OI at/above spot (the relevant distribution)
    const totalCallOIAbove = Object.values(callOIAboveSpot).reduce((s, v) => s + v, 0);
    d.callWallConf = totalCallOIAbove > 0 ? (maxCallOI / totalCallOIAbove * 100) : 0;
    d.callWallOI = maxCallOI;

    // ── Put wall: strike with highest put OI at or below spot
    let maxPutOI = 0, putWallStrike = d.spot * 0.98;
    let totalNearPutOI = 0;
    let putOIBelowSpot = {};
    Object.entries(strikePutOI).forEach(([s, oi]) => {
      const sn = Number(s);
      totalNearPutOI += oi;
      if (sn <= d.spot * 1.02) {
        putOIBelowSpot[sn] = oi;
        if (oi > maxPutOI) {
          maxPutOI = oi;
          putWallStrike = sn;
        }
      }
    });
    d.putWall = putWallStrike;
    const totalPutOIBelow = Object.values(putOIBelowSpot).reduce((s, v) => s + v, 0);
    d.putWallConf = totalPutOIBelow > 0 ? (maxPutOI / totalPutOIBelow * 100) : 0;
    d.putWallOI = maxPutOI;

    // ── Max pain: strike where total option holder LOSSES are maximized
    // At pin price P: call holders with strike < P have intrinsic (P - strike), put holders with strike > P have intrinsic (strike - P)
    // Max pain = strike where SUM of holder payouts is MINIMIZED (holders lose the most)
    const nearStrikes = strikes.filter(s => Math.abs(s - d.spot) / d.spot < 0.10);
    if (nearStrikes.length === 0) nearStrikes.push(...strikes.filter(s => Math.abs(s - d.spot) / d.spot < 0.20));
    let minPayout = Infinity, maxPainStrike = d.spot;
    nearStrikes.forEach(pinPrice => {
      let totalPayout = 0;
      // Call holders: profit if strike < pinPrice → payout = (pinPrice - strike) × OI × 100
      Object.entries(strikeCallOI).forEach(([s, oi]) => {
        const strike = Number(s);
        if (pinPrice > strike) totalPayout += (pinPrice - strike) * oi * 100;
      });
      // Put holders: profit if strike > pinPrice → payout = (strike - pinPrice) × OI × 100
      Object.entries(strikePutOI).forEach(([s, oi]) => {
        const strike = Number(s);
        if (strike > pinPrice) totalPayout += (strike - pinPrice) * oi * 100;
      });
      if (totalPayout < minPayout) { minPayout = totalPayout; maxPainStrike = pinPrice; }
    });
    d.maxPain = maxPainStrike;
  }

  // ── Delta-weighted P/C ratio and sweeps (use ALL expirations 0-90 DTE for flow)
  let callDeltaFlow = 0, putDeltaFlow = 0;
  let totalVol = 0;
  const sweeps = [];

  valid.forEach(c => {
    const dte = Math.floor((new Date(c.details.expiration_date) - now) / 864e5);
    if (dte < 0 || dte > 90) return;
    const isCall = c.details.contract_type === "call";
    const delta = c.greeks.delta || 0;
    const vol = c.day ? (c.day.volume || 0) : 0;
    const oi = c.open_interest || 0;

    totalVol += vol;

    if (isCall) {
      callDeltaFlow += Math.abs(delta) * vol * 100;
    } else {
      putDeltaFlow += Math.abs(delta) * vol * 100;
    }

    // High-delta sweeps
    if (Math.abs(delta) > 0.7 && vol > 100) {
      sweeps.push({
        type: isCall ? "C" : "P",
        strike: c.details.strike_price,
        delta: delta,
        contracts: vol,
        side: "traded",
        eqShares: Math.abs(delta) * vol * 100 * (isCall ? 1 : -1),
        time: "live",
        oi: oi,
        iv: c.implied_volatility || 0,
      });
    }
  });

  // ── P/C ratio (only meaningful if there's volume)
  if (callDeltaFlow > 0 || putDeltaFlow > 0) {
    d.cdf = callDeltaFlow;
    d.pdf = putDeltaFlow;
    d.dpc = putDeltaFlow / Math.max(callDeltaFlow, 1);
    d.nds = callDeltaFlow - putDeltaFlow;
  }

  // ── Sweeps
  if (sweeps.length > 0) {
    d.trades = sweeps.sort((a, b) => Math.abs(b.eqShares) - Math.abs(a.eqShares)).slice(0, 10);
  }

  // ── Options-driven volume: total delta-equivalent shares from all options activity
  // = sum of |delta| × volume × 100 across all contracts (both calls and puts)
  // This is the share-equivalent volume that dealer hedging adds to the equity tape
  const totalDeltaShares = callDeltaFlow + putDeltaFlow;
  const advShares = (ADV[d.ticker] || 10) * 1e6;
  d.optVolShares = totalDeltaShares;
  d.optVolPctADV = (totalDeltaShares / advShares) * 100;
  d.optVolRaw = totalVol; // raw options contracts traded

  // ── After-hours flag: if total volume across chain is 0, mark as prior session
  if (totalVol === 0) {
    d._afterHours = true;
  }

  d._polyChain = true;
  d._live = true;
  return d;
}

// Live vol divergence scanner using Polygon chain data
async function fetchVolDivergencesLive(watchlist) {
  const results = [];

  // Fetch chains for all tickers — chain includes underlying price context
  for (let i = 0; i < watchlist.length; i++) {
    const ticker = watchlist[i];
    const chain = await fetchPoly("chain", ticker);
    if (!chain || !chain.results || chain.results.length < 5) continue;

    const now = new Date();
    const contracts = chain.results;

    // Derive spot from ATM calls
    const atmCalls = contracts.filter(c =>
      c.details && c.greeks && c.details.contract_type === "call" &&
      c.greeks.delta && Math.abs(c.greeks.delta - 0.5) < 0.15
    );
    let spot = BP[ticker] || 100;
    if (atmCalls.length > 0) {
      atmCalls.sort((a, b) => Math.abs((a.greeks.delta || 0) - 0.5) - Math.abs((b.greeks.delta || 0) - 0.5));
      spot = atmCalls[0].details.strike_price;
    }

    // Estimate daily change from chain day data — look at change_percent on contracts
    const dayChanges = contracts.filter(c => c.day && c.day.change_percent !== undefined && c.day.change_percent !== 0)
      .map(c => c.day.change_percent);
    // Use median contract change as proxy (rough but functional)
    let changePct = 0;
    if (dayChanges.length > 5) {
      dayChanges.sort((a, b) => a - b);
      changePct = dayChanges[Math.floor(dayChanges.length / 2)] * 0.1; // scale down — contract % != stock %
    }
    if (Math.abs(changePct) < 0.3) continue;

    // Filter to 30-60 DTE, 5-15% OTM
    const otmContracts = contracts.filter(c => {
      if (!c.details || !c.greeks) return false;
      const exp = c.details.expiration_date;
      if (!exp) return false;
      const dte = Math.floor((new Date(exp) - now) / 864e5);
      if (dte < 25 || dte > 65) return false;
      const strike = c.details.strike_price;
      const otm = Math.abs(strike - spot) / spot;
      if (otm < 0.03 || otm > 0.18) return false;
      const isCall = c.details.contract_type === "call";
      if (isCall && strike <= spot) return false;
      if (!isCall && strike >= spot) return false;
      return true;
    });

    if (otmContracts.length < 3) continue;

    const sharesUp = changePct > 0.5;
    const sharesDown = changePct < -0.5;
    const targetType = sharesUp ? "put" : sharesDown ? "call" : null;
    if (!targetType) continue;

    const targetContracts = otmContracts.filter(c => c.details.contract_type === targetType);
    if (targetContracts.length < 2) continue;

    const ivValues = targetContracts.map(c => c.implied_volatility || 0).filter(v => v > 0);
    if (ivValues.length < 2) continue;
    const avgIV = ivValues.reduce((s, v) => s + v, 0) / ivValues.length;

    const volValues = targetContracts.map(c => (c.day && c.day.volume) || 0);
    const oiValues = targetContracts.map(c => c.open_interest || 0);
    const totalVol = volValues.reduce((s, v) => s + v, 0);
    const totalOI = oiValues.reduce((s, v) => s + v, 0);
    const volOIRatio = totalOI > 0 ? totalVol / totalOI : 0;

    if (totalVol < 200 || avgIV < 0.20) continue;
    if (volOIRatio < 1.0) continue;

    const topContract = targetContracts.sort((a, b) => ((b.day && b.day.volume) || 0) - ((a.day && a.day.volume) || 0))[0];
    const topStrike = topContract.details.strike_price;
    const topDelta = topContract.greeks.delta || 0;
    const topDte = Math.floor((new Date(topContract.details.expiration_date) - now) / 864e5);
    const otmPct = Math.abs(topStrike - spot) / spot * 100;

    const ivSorted = [...ivValues].sort((a, b) => a - b);
    const p75 = ivSorted[Math.floor(ivSorted.length * 0.5)] || avgIV;
    const elevated = ivValues.filter(v => v >= p75 * 0.9).length;

    const isPutDiv = targetType === "put";
    const ivPct = avgIV * 100;

    const severity = Math.min(100, Math.round(
      (ivPct > 50 ? 25 : ivPct > 35 ? 15 : 5) +
      (volOIRatio > 3 ? 25 : volOIRatio > 2 ? 15 : 5) +
      (totalVol > 2000 ? 20 : totalVol > 500 ? 10 : 5) +
      (elevated / targetContracts.length > 0.7 ? 20 : 10) +
      (Math.abs(changePct) > 2 ? 10 : 5)
    ));

    results.push({
      ticker, spot, shareChg: changePct, isPutDiv,
      type: isPutDiv ? "Puts up / shares up" : "Calls up / shares down",
      signal: isPutDiv ? "Informed downside positioning into strength" : "Informed upside positioning into weakness",
      strike: topStrike, dte: topDte, otmPct,
      ivJump: ivPct, priorIV: ivPct * 0.75, currentIV: ivPct,
      optPriceChg: volOIRatio * 20,
      volume: totalVol, avgOI: totalOI, volOIRatio,
      delta: topDelta, eqShares: Math.abs(topDelta) * totalVol * 100,
      chainStrikesElevated: elevated, chainTotalStrikes: targetContracts.length,
      severity, at: assetType(ticker), _live: true,
    });
  }
  return results.sort((a, b) => b.severity - a.severity);
}

// Fetch live data for a single ticker — all from Polygon
async function fetchTickerLive(ticker, idx) {
  const base = genTicker(ticker, idx);
  const [polyQuote, chain] = await Promise.all([
    fetchPoly("quote", ticker),
    fetchPoly("chain", ticker),
  ]);

  // Determine if market is open (rough check: Mon-Fri 9:30-16:00 ET)
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const day = et.getDay();
  const hours = et.getHours() + et.getMinutes() / 60;
  const marketOpen = day >= 1 && day <= 5 && hours >= 9.5 && hours < 16;

  if (marketOpen && chain && chain.results && chain.results.length > 5) {
    // INTRADAY: derive spot from put-call parity on 0-7 DTE ATM calls
    // stock price ≈ strike + call last trade price
    const nowMs = now.getTime();
    const nearCalls = chain.results.filter(c => {
      if (!c.details || c.details.contract_type !== "call") return false;
      if (!c.day || !c.day.close || c.day.close <= 0) return false;
      if (!c.day.volume || c.day.volume < 10) return false;
      const exp = c.details.expiration_date;
      if (!exp) return false;
      const dte = Math.floor((new Date(exp) - now) / 864e5);
      return dte >= 0 && dte <= 7;
    });

    if (nearCalls.length > 0) {
      // Find the most liquid near-term ATM call
      // ATM = where delta is closest to 0.5, or where call price is roughly half the strike width
      nearCalls.sort((a, b) => {
        // Prefer highest volume, then closest delta to 0.5
        const aDelta = a.greeks && a.greeks.delta ? Math.abs(a.greeks.delta - 0.5) : 1;
        const bDelta = b.greeks && b.greeks.delta ? Math.abs(b.greeks.delta - 0.5) : 1;
        const aVol = a.day.volume || 0;
        const bVol = b.day.volume || 0;
        // Primary: delta closest to 0.5. Secondary: highest volume
        if (Math.abs(aDelta - bDelta) < 0.05) return bVol - aVol;
        return aDelta - bDelta;
      });

      const best = nearCalls[0];
      const derivedSpot = best.details.strike_price + best.day.close;
      base.spot = derivedSpot;
      base._live = true;
      base._priceSource = "put-call parity";
    }
  }

  // AFTER HOURS or fallback: use prev-day closing price
  if (!base._live && polyQuote && polyQuote.results && polyQuote.results.length > 0) {
    const q = polyQuote.results[0];
    base.spot = q.c || q.vw || base.spot;
    base._live = true;
    base._priceSource = "closing price";
  }

  let d = computeFromChain(base, chain);
  return d;
}

const MCAP = {SPY:0,QQQ:0,IWM:0,AAPL:3200,MSFT:3400,NVDA:3500,TSLA:1100,META:1500,AMZN:2200,GOOGL:2100,AMD:250,NFLX:330,JPM:700,GS:180,MU:180,COIN:70,GME:12,MARA:8,SMCI:25,ARM:200,PLTR:300,SOFI:12,RIVN:15,XLF:0,XLK:0,XLE:0,AVGO:800,QCOM:180,CRM:280,BA:140,V:600,MA:430,UNH:520,LLY:750,ABBV:330};
const ADV = {SPY:80,QQQ:50,IWM:30,AAPL:55,MSFT:25,NVDA:300,TSLA:100,META:20,AMZN:40,GOOGL:25,AMD:50,NFLX:5,JPM:10,GS:3,MU:50,COIN:15,GME:10,MARA:30,SMCI:20,ARM:8,PLTR:60,SOFI:30,RIVN:15,XLF:25,XLK:8,XLE:15,AVGO:5,QCOM:8,CRM:5,BA:8,V:7,MA:3,UNH:3,LLY:3,ABBV:5};

// Compute relative 0DTE impact score
// Combines: shares-as-%-of-ADV and shares-as-%-of-float (via mcap/price)
function compute0dteImpact(d) {
  const eqShares = d.zds || 0;
  const advShares = (ADV[d.ticker] || 10) * 1e6; // convert M to shares
  const mcap = (MCAP[d.ticker] || 50) * 1e9; // convert $B to $
  const approxFloat = mcap / Math.max(d.spot, 1); // approximate shares outstanding
  const pctOfADV = (eqShares / advShares) * 100;
  const pctOfFloat = (eqShares / Math.max(approxFloat, 1)) * 100;
  // Weighted score: ADV impact matters more for intraday, float impact for multi-day
  const score = (pctOfADV * 0.7) + (pctOfFloat * 0.3 * 100);
  return { score, pctOfADV, pctOfFloat, eqShares };
}

function genTicker(ticker, idx) {
  const seed = ticker.split("").reduce((s,c) => s + c.charCodeAt(0), 0) * 997 + idx;
  const r = srand(seed + (Date.now() % 86400000));
  const bp = BP[ticker] || (30 + srand(seed)() * 400);
  const spot = bp * (0.97 + r() * 0.06);
  const netGex = (r() - 0.45) * 5e9;
  const regime = netGex > 0 ? "positive" : "negative";
  const gammaFlip = spot * (0.97 + r() * 0.06);
  const flipDist = ((spot - gammaFlip) / spot) * 100;
  const callWall = spot * (1.01 + r() * 0.04);
  const putWall = spot * (0.96 - r() * 0.04);
  const maxPain = spot * (0.98 + r() * 0.04);
  const dspct = Math.abs(netGex) / spot;
  const sq = Math.min(100, Math.max(0, (regime === "negative" ? 30 : 0) + (Math.abs(flipDist) < 1 ? 25 : Math.abs(flipDist) < 2 ? 15 : 0) + r() * 30 + (r() > 0.7 ? 20 : 0)));
  const skewZ = -2.5 + r() * 5;
  const termSlope = 0.7 + r() * 0.6;
  const cdf = r() * 800000, pdf = r() * 800000;
  const dpc = pdf / Math.max(cdf, 1), nds = cdf - pdf;
  const pcp = Math.round(r() * 100), pcr = (r() - 0.5) * 200000;
  const iv = 15 + r() * 50, rv = iv * (0.6 + r() * 0.8), vrp = iv - rv;
  const zdg = (r() - 0.4) * 2e9, zdr = zdg > 0 ? "positive" : "negative", zds = Math.abs(zdg) / spot;
  const trades = [];
  for (let i = 0; i < Math.floor(r() * 5); i++) {
    const isC = r() > 0.4, d = 0.7 + r() * 0.25, c = Math.round(100 + r() * 2000);
    trades.push({ type: isC?"C":"P", strike: Math.round(spot*(isC?1+r()*0.05:1-r()*0.05)), delta: isC?d:-d, contracts: c, side: r()>0.4?"bought":"sold", eqShares: d*c*100*(isC?1:-1), time: `${9+Math.floor(r()*7)}:${String(Math.floor(r()*60)).padStart(2,"0")}` });
  }
  return { ticker, spot, netGex, regime, gammaFlip, flipDist, callWall, putWall, maxPain, dspct, sq, skewZ, termSlope, cdf, pdf, dpc, nds, pcp, pcr, iv, rv, vrp, zdg, zdr, zds, trades, at: assetType(ticker) };
}

// ─── VOL DIVERGENCE SCANNER ────────────────────────────────────────
// Flags: OTM puts up while shares up, or OTM calls up while shares down
// These are rare — most scans return empty. When they fire, it's the most important signal.
// LIVE: Polygon GET /v3/snapshot/options/{underlyingAsset} → compare IV vs prior session
function genVolDivergences(watchlist) {
  const results = [];
  const daySeed = Math.floor(Date.now() / 86400000);
  watchlist.forEach((ticker, idx) => {
    const r = srand(ticker.split("").reduce((s,c) => s + c.charCodeAt(0), 0) * 1301 + daySeed + idx);
    // ~8% chance of divergence per ticker — rare but testable
    if (r() > 0.92) {
      const bp = BP[ticker] || (30 + srand(ticker.charCodeAt(0) * 997)() * 400);
      const spot = bp * (0.97 + r() * 0.06);
      const isPutDiv = r() > 0.45; // puts up / shares up vs calls up / shares down
      const shareChg = isPutDiv ? (0.5 + r() * 3.5) : -(0.5 + r() * 3.5); // share % move
      const ivJump = 15 + r() * 45; // IV increase %
      const priorIV = 20 + r() * 30;
      const currentIV = priorIV * (1 + ivJump / 100);
      const dte = 30 + Math.floor(r() * 30); // 30-60 DTE
      const otmPct = 5 + r() * 10; // 5-15% OTM
      const strike = isPutDiv ? Math.round(spot * (1 - otmPct / 100)) : Math.round(spot * (1 + otmPct / 100));
      const optPriceChg = 20 + r() * 80; // option price % increase
      const volume = Math.round(500 + r() * 8000);
      const avgOI = Math.round(200 + r() * 3000);
      const volOIRatio = volume / Math.max(avgOI, 1);
      const delta = isPutDiv ? -(0.1 + r() * 0.2) : (0.1 + r() * 0.2);
      const eqShares = Math.abs(delta) * volume * 100;
      // Chain-wide confirmation: how many strikes show elevated IV
      const chainStrikesElevated = 3 + Math.floor(r() * 8);
      const chainTotalStrikes = chainStrikesElevated + Math.floor(r() * 5);
      // Severity score 0-100
      const severity = Math.min(100, Math.round(
        (ivJump > 30 ? 25 : ivJump > 20 ? 15 : 5) +
        (volOIRatio > 3 ? 25 : volOIRatio > 2 ? 15 : 5) +
        (optPriceChg > 50 ? 20 : optPriceChg > 30 ? 10 : 5) +
        (chainStrikesElevated / chainTotalStrikes > 0.7 ? 20 : 10) +
        (Math.abs(shareChg) > 2 ? 10 : 5)
      ));

      results.push({
        ticker, spot, shareChg, isPutDiv,
        type: isPutDiv ? "Puts up / shares up" : "Calls up / shares down",
        signal: isPutDiv ? "Informed downside positioning into strength" : "Informed upside positioning into weakness",
        strike, dte, otmPct,
        ivJump, priorIV, currentIV,
        optPriceChg, volume, avgOI, volOIRatio,
        delta, eqShares,
        chainStrikesElevated, chainTotalStrikes,
        severity,
        at: assetType(ticker),
      });
    }
  });
  return results.sort((a, b) => b.severity - a.severity);
}

function nextOpex() {
  const today = new Date().toISOString().slice(0, 10);
  for (const d of OPEX) { if (d >= today) { const o = new Date(d+"T16:00:00"), df = o - new Date(); return { date: d, days: Math.floor(df/864e5), hours: Math.floor((df%864e5)/36e5), isNear: Math.floor(df/864e5) <= 2 }; } }
  return { date: "2026-12-18", days: 99, hours: 0, isNear: false };
}

function buildSummary(d) {
  const opex = nextOpex();
  const lines = [];
  let score = 0;
  const factors = [];
  const eq = fmtEq(d.regime==="positive" ? d.dspct : -d.dspct);

  if (d.regime === "positive") {
    lines.push(`${d.ticker} is in positive gamma — dealers are suppressing moves with ${eq.label} of counter-trend hedging per 1% move. Gamma flip at ${fmtP(d.gammaFlip)}, spot ${Math.abs(d.flipDist).toFixed(1)}% ${d.flipDist>0?"above":"below"}. Call wall resistance at ${fmtP(d.callWall)} (${(d.callWallConf||0).toFixed(0)}% concentration), put wall support at ${fmtP(d.putWall)} (${(d.putWallConf||0).toFixed(0)}% concentration).`);
    score += 10;
    factors.push({ sig: "Gamma regime", det: `Positive — ${eq.label} counter-trend per 1%`, imp: "suppressing", dir: "neutral" });
  } else {
    lines.push(`${d.ticker} is in negative gamma — dealers are amplifying moves with ${eq.label} of pro-trend hedging per 1% move. Gamma flip at ${fmtP(d.gammaFlip)}, spot ${Math.abs(d.flipDist).toFixed(1)}% ${d.flipDist>0?"above":"below"}. Call wall resistance at ${fmtP(d.callWall)} (${(d.callWallConf||0).toFixed(0)}% concentration), put wall support at ${fmtP(d.putWall)} (${(d.putWallConf||0).toFixed(0)}% concentration).`);
    score -= 15;
    factors.push({ sig: "Gamma regime", det: `Negative — ${eq.label} pro-trend per 1%`, imp: "amplifying", dir: "bearish" });
  }

  if (Math.abs(d.flipDist) < 1) { score += d.flipDist<0?-15:-5; factors.push({ sig: "Flip proximity", det: `${Math.abs(d.flipDist).toFixed(1)}% from flip — regime change imminent`, imp: "critical", dir: "volatile" }); }

  const p2 = [];
  if (d.dpc > 1.5) { p2.push(`delta-weighted P/C at ${d.dpc.toFixed(2)} (${d.pcp}th pct) with net ${fmtEq(-Math.abs(d.nds)).label} bearish flow`); score -= 15; factors.push({ sig: "Delta-weighted P/C", det: `${d.dpc.toFixed(2)} (${d.pcp}th pct) — ${fmtEq(-Math.abs(d.nds)).label} bearish`, imp: "bearish", dir: "bearish" }); }
  else if (d.dpc < 0.6) { p2.push(`delta-weighted P/C at ${d.dpc.toFixed(2)} (${d.pcp}th pct) with net ${fmtEq(Math.abs(d.nds)).label} bullish flow`); score += 15; factors.push({ sig: "Delta-weighted P/C", det: `${d.dpc.toFixed(2)} (${d.pcp}th pct) — ${fmtEq(Math.abs(d.nds)).label} bullish`, imp: "bullish", dir: "bullish" }); }
  else { p2.push(`delta-weighted P/C at ${d.dpc.toFixed(2)} (balanced)`); factors.push({ sig: "Delta-weighted P/C", det: `${d.dpc.toFixed(2)} (${d.pcp}th pct) — balanced`, imp: "neutral", dir: "neutral" }); }
  if (Math.abs(d.skewZ) > 2) { const sk = d.skewZ>0?"bearish":"bullish"; p2.push(`skew at ${d.skewZ.toFixed(1)}σ (${sk} outlier)`); score += d.skewZ>0?-10:10; factors.push({ sig: "Skew outlier", det: `${d.skewZ.toFixed(1)}σ — ${sk==="bearish"?"heavy put skew":"call skew elevated"}`, imp: "outlier", dir: sk }); }
  if (d.sq > 60) { const sd = d.regime==="negative"?"downside":"upside"; p2.push(`squeeze score ${Math.round(d.sq)} (${sd} setup)`); score += d.regime==="negative"?-15:15; factors.push({ sig: "Squeeze", det: `Score ${Math.round(d.sq)} — ${sd} squeeze`, imp: "high", dir: d.regime==="negative"?"bearish":"bullish" }); }
  if (p2.length) lines.push(p2.join(", ") + ".");

  if (Math.abs(d.pcr) > 50000) { const a = d.pcr<0?"bearish":"bullish"; score += d.pcr>0?5:-5; factors.push({ sig: "P/C momentum", det: `${a} — ${fmtEq(d.pcr).label} daily shift`, imp: a, dir: a }); }
  if (Math.abs(d.zdg) > 5e8) { const zs = d.zdr==="negative"?-d.zds:d.zds; score += d.zdr==="negative"?-10:5; factors.push({ sig: "0DTE gamma", det: `${d.zdr} — ${fmtEq(zs).label} expiring`, imp: d.zdr==="negative"?"amplifying":"suppressing", dir: d.zdr==="negative"?"volatile":"neutral" }); }
  const bigT = d.trades.filter(t => Math.abs(t.eqShares)>30000);
  if (bigT.length) { const net = bigT.reduce((s,t) => s+(t.side==="bought"?Math.abs(t.eqShares):-Math.abs(t.eqShares)),0); score += net>0?8:-8; factors.push({ sig: "Sweeps", det: `${bigT.length} prints, net ${fmtEq(net).label}`, imp: net>0?"bullish":"bearish", dir: net>0?"bullish":"bearish" }); }
  const pd = ((d.maxPain-d.spot)/d.spot)*100;
  if (Math.abs(pd) > 1) { score += pd>0?5:-5; factors.push({ sig: "Max pain", det: `Pin ${fmtP(d.maxPain)} (${pd>0?"+":""}${pd.toFixed(1)}%) — pull ${pd>0?"up":"down"} into OPEX`, imp: "pin", dir: pd>0?"bullish":"bearish" }); }
  if (d.vrp > 10) factors.push({ sig: "VRP", det: `+${d.vrp.toFixed(0)}pts — options expensive`, imp: "elevated", dir: "neutral" });
  else if (d.vrp < -5) factors.push({ sig: "VRP", det: `${d.vrp.toFixed(0)}pts — options cheap`, imp: "compressed", dir: "volatile" });

  const p3 = [];
  if (Math.abs(d.zdg)>5e8) p3.push(`0DTE ${d.zdr} gamma (${fmtEq(d.zdr==="negative"?-d.zds:d.zds).label} expiring)`);
  if (opex.isNear) p3.push(`OPEX in ${opex.days}d ${opex.hours}h — gamma amplified`);
  if (bigT.length) { const net = bigT.reduce((s,t) => s+(t.side==="bought"?Math.abs(t.eqShares):-Math.abs(t.eqShares)),0); p3.push(`${bigT.length} sweep${bigT.length>1?"s":""} (net ${fmtEq(net).label})`); }
  if (p3.length) lines.push(p3.join("; ") + ".");

  score = Math.max(-100, Math.min(100, score));
  let verdict, vc, vbg;
  if (score > 30) { verdict = "Options are a bullish tailwind for shares"; vc = "#0F6E56"; vbg = "rgba(29,158,117,0.08)"; }
  else if (score > 10) { verdict = "Mild bullish options bias on shares"; vc = "#1D9E75"; vbg = "rgba(29,158,117,0.05)"; }
  else if (score > -10) { verdict = "Options positioning is neutral on shares"; vc = "#888780"; vbg = "rgba(128,128,128,0.05)"; }
  else if (score > -30) { verdict = "Mild bearish options pressure on shares"; vc = "#BA7517"; vbg = "rgba(186,117,23,0.06)"; }
  else { verdict = "Options are a bearish headwind for shares"; vc = "#A32D2D"; vbg = "rgba(226,75,74,0.08)"; }
  return { score, verdict, vc, vbg, lines, factors };
}

        {[{l:"Dealer flow/1%",v:<EqBadge shares={d.regime==="positive"?d.dspct:-d.dspct} size="sm"/>},{l:"Gamma flip",v:fmtP(d.gammaFlip),s:fmtPct(d.flipDist)},{l:"Squeeze",v:<Squeeze score={d.sq}/>},{l:"Δ P/C",v:d.dpc.toFixed(2),s:`${d.pcp}th pct`},{l:"0DTE",v:<><Regime r={d.zdr}/>{" "}<EqBadge shares={d.zdr==="negative"?-d.zds:d.zds} size="sm"/></>}].map((m,i) => (
          <div key={i} style={{ background: "rgba(255,255,255,0.7)", padding: "10px" }}><div style={{ fontSize: "9px", textTransform: "uppercase", opacity: 0.82, letterSpacing: "0.3px", marginBottom: "3px" }}>{m.l}</div><div style={{ fontSize: "13px", fontWeight: 500 }}>{m.v}</div>{m.s && <div style={{ fontSize: "10px", opacity: 0.82555 }}>{m.s}</div>}</div>
        ))}
      </div>
      <div style={{ padding: "10px 20px 14px", display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "6px" }}>
        <Metric label="Net GEX" value={fmtD(d.netGex)}
          info="Net Gamma Exposure — the total gamma dealers hold across all strikes. When positive, dealers hedge against the trend (suppressing moves). When negative, dealers hedge with the trend (amplifying moves)."
          snapshot={`Call gamma: ${fmtD(Math.abs(d.netGex) * (d.netGex > 0 ? 0.7 : 0.3))} · Put gamma: ${fmtD(-Math.abs(d.netGex) * (d.netGex > 0 ? 0.3 : 0.7))} · Net: ${fmtD(d.netGex)} · Regime: ${d.regime} · Dealers ${d.regime === "positive" ? "sell into rallies, buy dips" : "sell into drops, chase rallies"}`} />
        <Metric label="Call wall" value={fmtP(d.callWall)} sub={d.callWallConf ? `${d.callWallConf.toFixed(0)}% of call OI · ${(d.callWallOI||0).toLocaleString()} contracts` : undefined} accent={d.callWallConf > 15 ? "#0F6E56" : d.callWallConf > 8 ? undefined : "#BA7517"}
          info="The strike with the highest call open interest — acts as a resistance level. Dealers who sold these calls must sell shares as price approaches, creating overhead supply. Confidence = what % of total near-term call OI sits at this strike. Above 15% = strong wall, below 8% = diffuse, less reliable."
          snapshot={`Highest call OI strike: ${fmtP(d.callWall)} · ${((d.callWall - d.spot) / d.spot * 100).toFixed(1)}% above spot · ${(d.callWallOI||0).toLocaleString()} contracts (${(d.callWallConf||0).toFixed(1)}% of near-term call OI) · Confidence: ${d.callWallConf > 15 ? "HIGH — concentrated, strong resistance" : d.callWallConf > 8 ? "MODERATE — visible but not dominant" : "LOW — diffuse OI, wall may not hold"}`} />
        <Metric label="Put wall" value={fmtP(d.putWall)} sub={d.putWallConf ? `${d.putWallConf.toFixed(0)}% of put OI · ${(d.putWallOI||0).toLocaleString()} contracts` : undefined} accent={d.putWallConf > 15 ? "#0F6E56" : d.putWallConf > 8 ? undefined : "#BA7517"}
          info="The strike with the highest put open interest — acts as a support level. Dealers who sold these puts must buy shares as price approaches, creating a floor. Confidence = what % of total near-term put OI sits at this strike. Above 15% = strong wall, below 8% = diffuse, less reliable."
          snapshot={`Highest put OI strike: ${fmtP(d.putWall)} · ${((d.spot - d.putWall) / d.spot * 100).toFixed(1)}% below spot · ${(d.putWallOI||0).toLocaleString()} contracts (${(d.putWallConf||0).toFixed(1)}% of near-term put OI) · Confidence: ${d.putWallConf > 15 ? "HIGH — concentrated, strong support" : d.putWallConf > 8 ? "MODERATE — visible but not dominant" : "LOW — diffuse OI, wall may not hold"}`} />
        <Metric label="Max pain" value={fmtP(d.maxPain)} sub={`${((d.maxPain-d.spot)/d.spot*100).toFixed(1)}% from spot`}
          info="The strike price where total option holder losses are maximized — price tends to gravitate here into expiration as dealers hedge and time decay accelerates."
          snapshot={`Pin target: ${fmtP(d.maxPain)} · Spot ${d.maxPain > d.spot ? "below" : "above"} by ${Math.abs((d.maxPain-d.spot)/d.spot*100).toFixed(1)}% · Magnetic pull ${d.maxPain > d.spot ? "upward" : "downward"} · Effect strengthens ${nextOpex().days <= 3 ? "NOW — OPEX imminent" : `into OPEX (${nextOpex().days}d away)`}`} />
        <Metric label="Skew z" value={d.skewZ.toFixed(2)} accent={Math.abs(d.skewZ)>2?"#E24B4A":undefined}
          info="25-delta risk reversal z-score — measures how expensive puts are vs calls relative to recent history. High positive = unusual put demand (fear). High negative = unusual call demand (greed)."
          snapshot={`25Δ skew: ${d.skewZ.toFixed(2)}σ vs 30/60/90d rolling · ${Math.abs(d.skewZ) > 2 ? "OUTLIER — " : ""}${d.skewZ > 0 ? "Put protection bid elevated, downside hedging heavy" : d.skewZ < -1 ? "Call demand elevated, upside positioning aggressive" : "Balanced put/call pricing"}`} />
        <Metric label="Term structure" value={d.termSlope.toFixed(2)} sub={d.termSlope<0.85?"backwardation":d.termSlope>1.15?"steep contango":"normal"}
          info="Ratio of front-month to back-month implied volatility. Below 0.85 (backwardation) signals near-term fear or an event. Above 1.15 (steep contango) signals calm now but uncertainty ahead."
          snapshot={`Front IV / back IV: ${d.termSlope.toFixed(2)} · ${d.termSlope < 0.85 ? "Backwardation — near-term IV spiking, traders pricing imminent risk" : d.termSlope > 1.15 ? "Steep contango — near-term calm, back months pricing future risk" : "Normal contango — no unusual term structure signal"}`} />
        <Metric label="VRP" value={`${d.vrp.toFixed(1)}pts`} sub={`IV ${d.iv.toFixed(0)} / RV ${d.rv.toFixed(0)}`} accent={d.vrp>10?"#1D9E75":d.vrp<-5?"#E24B4A":undefined}
          info="Volatility Risk Premium — implied vol minus realized vol. When positive, options are expensive vs actual movement (sellers favored). When negative, options are cheap (buyers favored, vol expansion likely)."
          snapshot={`IV: ${d.iv.toFixed(1)}% · Realized vol: ${d.rv.toFixed(1)}% · Premium: ${d.vrp > 0 ? "+" : ""}${d.vrp.toFixed(1)}pts · ${d.vrp > 10 ? "Options overpriced — vol sellers have edge, crush likely" : d.vrp < -5 ? "Options underpriced — vol expansion risk, buyers have edge" : "Fair value — no clear edge either side"}`} />
        <Metric label="P/C momentum" value={<EqBadge shares={d.pcr} size="sm"/>} sub="daily shift"
          info="Daily rate of change in the delta-weighted put/call ratio — shows whether bearish or bullish conviction is accelerating. Expressed as the equity equivalent of that shift."
          snapshot={`Today's Δ-wtd P/C: ${d.dpc.toFixed(2)} · Daily change: ${fmtEq(d.pcr).label} · ${d.pcp}th percentile · ${Math.abs(d.pcr) > 100000 ? "Significant momentum shift — " : ""}${d.pcr < 0 ? "Bearish conviction accelerating" : d.pcr > 0 ? "Bullish conviction building" : "Flat"}`} />
      </div>
      <div style={{ padding: "0 20px 14px", display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "6px" }}>
        <Metric label="Options % of ADV" value={`${(d.optVolPctADV||0).toFixed(1)}%`} sub={`${fmtEq(d.optVolShares||0).label} delta-equiv`} accent={(d.optVolPctADV||0) > 20 ? "#A32D2D" : (d.optVolPctADV||0) > 10 ? "#BA7517" : "#0F6E56"}
          info="Percentage of average daily equity volume attributable to options dealer hedging. Computed as total delta-equivalent shares (|delta| × volume × 100 across all contracts) divided by average daily share volume. Above 20% = options are a dominant force on the tape. 10-20% = significant influence. Below 10% = equity flow is driving, not options."
          snapshot={`Delta-equiv shares from options: ${fmtEq(d.optVolShares||0).label} · ADV: ${(ADV[d.ticker]||10)}M shares · Ratio: ${(d.optVolPctADV||0).toFixed(1)}% · Raw options contracts: ${(d.optVolRaw||0).toLocaleString()} · ${(d.optVolPctADV||0) > 20 ? "OPTIONS DOMINANT — dealer hedging is a major component of equity volume" : (d.optVolPctADV||0) > 10 ? "Significant — options flow is a meaningful part of the tape" : "Equity-driven — fundamental flow dominates, options secondary"}`} />
        <Metric label="Options contracts" value={(d.optVolRaw||0).toLocaleString()} sub="traded today"
          info="Total options contracts traded today across all strikes and expirations. Raw contract count before delta-weighting."
          snapshot={`Total contracts: ${(d.optVolRaw||0).toLocaleString()} · Call flow: ${fmtEq(d.cdf||0).label} · Put flow: ${fmtEq(d.pdf||0).label}`} />
        <Metric label="Dealer hedge est." value={<EqBadge shares={(d.regime==="positive" ? d.dspct : -d.dspct)||0} size="sm"/>} sub="per 1% move"
          info="Estimated shares dealers must trade to rehedge per 1% move in the underlying. In positive gamma they trade against the move (stabilizing). In negative gamma they trade with the move (destabilizing)."
          snapshot={`Regime: ${d.regime} · Per 1% move: ${fmtEq(d.regime==="positive" ? d.dspct : -d.dspct).label} · ${d.regime==="positive" ? "Counter-trend — dealers sell rallies, buy dips" : "Pro-trend — dealers chase moves, amplifying direction"}`} />
      </div>
      <div style={{ padding: "0 20px 14px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.6, letterSpacing: "0.4px", marginBottom: "8px" }}>Signal breakdown — how options influence {d.ticker} shares</div>
        {v.factors.map((f,i) => (
          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "10px", padding: "7px 10px", marginBottom: "3px", borderRadius: "6px", background: ib[f.imp]||"rgba(128,128,128,0.03)" }}>
            <span style={{ width: "6px", height: "6px", borderRadius: "50%", marginTop: "6px", flexShrink: 0, background: dc[f.dir]||"#888" }} />
            <div><span style={{ fontSize: "12px", fontWeight: 500 }}>{f.sig}</span><span style={{ fontSize: "12px", opacity: 0.75, marginLeft: "6px" }}>{f.det}</span></div>
          </div>
        ))}
      </div>
      {d.trades.length > 0 && <div style={{ padding: "0 20px 16px" }}>
        <div style={{ fontSize: "10px", textTransform: "uppercase", opacity: 0.828, letterSpacing: "0.3px", marginBottom: "6px" }}>High-delta sweeps today</div>
        <div style={{ border: "1px solid rgba(74,144,217,0.1)", borderRadius: "8px", overflow: "hidden" }}>
          {d.trades.sort((a,b)=>Math.abs(b.eqShares)-Math.abs(a.eqShares)).map((tr,i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "6px 12px", fontSize: "13px", borderBottom: i<d.trades.length-1?"1px solid rgba(128,128,128,0.05)":"none" }}>
              <span style={{ opacity: 0.85, fontSize: "11px", minWidth: "36px" }}>{tr.time}</span>
              <span style={{ fontFamily: "monospace", fontSize: "12px", minWidth: "18px" }}>{tr.type}</span>
              <span style={{ minWidth: "56px" }}>{fmtP(tr.strike)}</span>
              <span style={{ opacity: 0.828, fontSize: "12px", minWidth: "38px" }}>Δ{Math.abs(tr.delta).toFixed(2)}</span>
              <span style={{ minWidth: "46px" }}>×{tr.contracts.toLocaleString()}</span>
              <span style={{ fontSize: "11px", opacity: 0.828, minWidth: "34px" }}>{tr.side}</span>
              <span style={{ marginLeft: "auto" }}><EqBadge shares={tr.side==="bought"?Math.abs(tr.eqShares):-Math.abs(tr.eqShares)} size="sm"/></span>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

function Leaderboard({ data, onSelect }) {
  const scored = useMemo(() => {
    return [...data].map(d => {
      const imp = compute0dteImpact(d);
      return { ...d, _imp: imp };
    }).sort((a, b) => b._imp.score - a._imp.score).slice(0, 25);
  }, [data]);

  return <div style={{ border: "1px solid rgba(74,144,217,0.15)", borderRadius: "10px", overflow: "hidden" }}>
    <div style={{ display: "grid", gridTemplateColumns: "30px 60px 78px 110px 75px 75px 90px", padding: "8px 12px", fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.3px", opacity: 0.6, fontWeight: 500, background: "rgba(74,144,217,0.04)", borderBottom: "1px solid rgba(74,144,217,0.12)" }}>
      <span>#</span><span>Ticker</span><span>Regime</span><span style={{textAlign:"right"}}>Eq equiv</span><span style={{textAlign:"right"}}>% ADV</span><span style={{textAlign:"right"}}>% Float</span><span style={{textAlign:"right"}}>Impact</span>
    </div>
    {scored.map((d,i) => {
      const imp = d._imp;
      const impColor = imp.pctOfADV > 5 ? "#A32D2D" : imp.pctOfADV > 2 ? "#BA7517" : "#0F6E56";
      return <div key={d.ticker} onClick={()=>onSelect(d.ticker)} style={{ display: "grid", gridTemplateColumns: "30px 60px 78px 110px 75px 75px 90px", padding: "7px 12px", alignItems: "center", borderBottom: i<scored.length-1?"1px solid rgba(74,144,217,0.08)":"none", fontSize: "13px", cursor: "pointer" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(74,144,217,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{opacity:0.5,fontSize:"11px",fontWeight:500}}>{i+1}</span>
        <span style={{fontWeight:500}}>{d.ticker}</span>
        <Regime r={d.zdr}/>
        <span style={{textAlign:"right"}}><EqBadge shares={d.zdr==="negative"?-d.zds:d.zds} size="sm"/></span>
        <span style={{textAlign:"right",fontFamily:"monospace",fontSize:"12px",color:impColor,fontWeight:500}}>{imp.pctOfADV.toFixed(1)}%</span>
        <span style={{textAlign:"right",fontFamily:"monospace",fontSize:"12px",opacity:0.6}}>{imp.pctOfFloat < 0.01 ? "<0.01%" : imp.pctOfFloat.toFixed(2) + "%"}</span>
        <span style={{textAlign:"right",fontSize:"11px",opacity:0.65}}>{d.zdr==="negative"?"amplifying ↓↑":"suppressing ↔"}</span>
      </div>;
    })}
  </div>;
}

function Sweeps({ data, onSelect }) {
  const all = useMemo(()=>{const t=[];data.forEach(d=>d.trades.forEach(tr=>t.push({...tr,ticker:d.ticker})));return t.sort((a,b)=>Math.abs(b.eqShares)-Math.abs(a.eqShares)).slice(0,20);},[data]);
  if(!all.length) return <div style={{padding:"20px",opacity:0.4,textAlign:"center"}}>No high-delta sweeps detected</div>;
  return <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",overflow:"hidden"}}>
    <div style={{display:"grid",gridTemplateColumns:"56px 32px 66px 50px 66px 42px 100px",padding:"8px 12px",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.3px",opacity:0.45,fontWeight:500,background:"rgba(128,128,128,0.04)",borderBottom:"1px solid rgba(128,128,128,0.1)"}}><span>Ticker</span><span>T</span><span>Strike</span><span>Δ</span><span>Qty</span><span>Side</span><span style={{textAlign:"right"}}>Eq equiv</span></div>
    {all.map((tr,i)=><div key={i} onClick={()=>onSelect(tr.ticker)} style={{display:"grid",gridTemplateColumns:"56px 32px 66px 50px 66px 42px 100px",padding:"7px 12px",alignItems:"center",fontSize:"13px",borderBottom:i<all.length-1?"1px solid rgba(128,128,128,0.07)":"none",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(128,128,128,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <span style={{fontWeight:500}}>{tr.ticker}</span><span style={{fontFamily:"monospace",fontSize:"12px"}}>{tr.type}</span><span>{fmtP(tr.strike)}</span><span style={{fontFamily:"monospace",fontSize:"12px"}}>{Math.abs(tr.delta).toFixed(2)}</span><span>{tr.contracts.toLocaleString()}</span><span style={{fontSize:"11px",opacity:0.6}}>{tr.side}</span><span style={{textAlign:"right"}}><EqBadge shares={tr.side==="bought"?Math.abs(tr.eqShares):-Math.abs(tr.eqShares)} size="sm"/></span>
    </div>)}
  </div>;
}

function Divergence({ data }) {
  const idx=data.filter(d=>["SPY","QQQ","IWM"].includes(d.ticker)),stk=data.filter(d=>d.at==="Stock");
  const nN=stk.filter(d=>d.regime==="negative").length,nP=stk.filter(d=>d.regime==="positive").length;
  const iR=idx.length>0&&idx.filter(d=>d.regime==="positive").length>idx.length/2?"positive":"negative";
  const div=(iR==="positive"&&nN>nP)||(iR==="negative"&&nN<nP);
  const iS=idx.reduce((s,d)=>s+(d.regime==="positive"?d.dspct:-d.dspct),0);
  const sS=stk.reduce((s,d)=>s+(d.regime==="positive"?d.dspct:-d.dspct),0);
  return <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",padding:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}><span style={{fontSize:"13px",fontWeight:500}}>Index vs component divergence</span><span style={{fontSize:"11px",padding:"2px 10px",borderRadius:"999px",fontWeight:500,background:div?"rgba(226,75,74,0.12)":"rgba(29,158,117,0.12)",color:div?"#A32D2D":"#0F6E56"}}>{div?"diverging":"aligned"}</span></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
      <div style={{background:"rgba(128,128,128,0.05)",borderRadius:"8px",padding:"10px"}}><div style={{fontSize:"10px",opacity:0.45,textTransform:"uppercase",marginBottom:"4px"}}>ETF/Index</div><Regime r={iR}/><div style={{marginTop:"6px"}}><EqBadge shares={iS} size="md"/></div><div style={{fontSize:"11px",opacity:0.4,marginTop:"2px"}}>per 1% move</div></div>
      <div style={{background:"rgba(128,128,128,0.05)",borderRadius:"8px",padding:"10px"}}><div style={{fontSize:"10px",opacity:0.45,textTransform:"uppercase",marginBottom:"4px"}}>Single stocks</div><div style={{fontSize:"12px",marginBottom:"4px"}}><span style={{color:"#3B6D11"}}>{nP} pos</span> / <span style={{color:"#A32D2D"}}>{nN} neg</span></div><div style={{marginTop:"6px"}}><EqBadge shares={sS} size="md"/></div><div style={{fontSize:"11px",opacity:0.4,marginTop:"2px"}}>net per 1% move</div></div>
    </div>
    {div&&<div style={{fontSize:"12px",opacity:0.6,lineHeight:1.5,padding:"8px 10px",background:"rgba(226,75,74,0.04)",borderRadius:"6px",marginTop:"10px"}}>Tension: ETFs in {iR} gamma while majority of components in {iR==="positive"?"negative":"positive"} — tends to resolve with sharp moves.</div>}
  </div>;
}

// ─── VOL DIVERGENCE PANEL ──────────────────────────────────────────
function VolDivergence({ divergences, onSelect }) {
  if (!divergences.length) return (
    <div style={{ border: "1px solid rgba(74,144,217,0.15)", borderRadius: "10px", padding: "30px 20px", textAlign: "center" }}>
      <div style={{ fontSize: "24px", opacity: 0.85, marginBottom: "8px" }}>⊘</div>
      <div style={{ fontSize: "14px", opacity: 0.82, marginBottom: "6px" }}>No vol divergences detected</div>
      <div style={{ fontSize: "12px", opacity: 0.85, lineHeight: 1.5, maxWidth: "400px", margin: "0 auto", fontFamily: "-apple-system,sans-serif" }}>
        This scanner flags rare scenarios where OTM put IV spikes while shares are up (informed downside positioning into strength) or OTM call IV spikes while shares are down (informed upside positioning into weakness). When it fires, pay attention.
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ fontSize: "12px", opacity: 0.828, marginBottom: "12px", lineHeight: 1.5, fontFamily: "-apple-system,sans-serif" }}>
        {divergences.length} divergence{divergences.length > 1 ? "s" : ""} detected — option pricing contradicts share direction, suggesting informed positioning ahead of a move.
      </div>
      {divergences.map((dv, idx) => {
        const isPut = dv.isPutDiv;
        const accentColor = isPut ? "#A32D2D" : "#0F6E56";
        const accentBg = isPut ? "rgba(226,75,74,0.06)" : "rgba(29,158,117,0.06)";
        const sevColor = dv.severity > 70 ? "#A32D2D" : dv.severity > 40 ? "#BA7517" : "#888780";

        return (
          <div key={dv.ticker + idx} onClick={() => onSelect(dv.ticker)}
            style={{ border: "1px solid rgba(74,144,217,0.15)", borderRadius: "10px", overflow: "hidden", marginBottom: "12px", cursor: "pointer" }}>
            {/* Header */}
            <div style={{ padding: "14px 16px", background: accentBg, borderBottom: "1px solid rgba(74,144,217,0.1)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "6px", flexWrap: "wrap" }}>
                <span style={{ fontSize: "22px", fontWeight: 500, fontFamily: "'SF Mono',monospace" }}>{dv.ticker}</span>
                <span style={{ fontSize: "15px", opacity: 0.825 }}>{fmtP(dv.spot)}</span>
                <span style={{ fontSize: "12px", fontWeight: 500, color: dv.shareChg > 0 ? "#0F6E56" : "#A32D2D" }}>
                  {dv.shareChg > 0 ? "▲" : "▼"} {Math.abs(dv.shareChg).toFixed(1)}%
                </span>
                <span style={{ fontSize: "10px", padding: "2px 8px", borderRadius: "4px", background: "rgba(74,144,217,0.08)" }}>{dv.at}</span>
                <span style={{ marginLeft: "auto", fontSize: "11px", padding: "2px 10px", borderRadius: "999px", fontWeight: 500, background: isPut ? "rgba(226,75,74,0.12)" : "rgba(29,158,117,0.12)", color: accentColor }}>
                  {dv.type}
                </span>
              </div>
              <div style={{ fontSize: "14px", fontWeight: 500, color: accentColor, marginBottom: "6px" }}>
                {dv.signal}
              </div>
              <div style={{ fontSize: "13px", lineHeight: 1.65, opacity: 0.82, fontFamily: "-apple-system,sans-serif" }}>
                {isPut
                  ? `${dv.ticker} shares are up ${Math.abs(dv.shareChg).toFixed(1)}% but ${dv.dte}DTE ${fmtP(dv.strike)} puts (${dv.otmPct.toFixed(0)}% OTM) are up ${dv.optPriceChg.toFixed(0)}% on a ${dv.ivJump.toFixed(0)}% IV spike. Volume is ${dv.volume.toLocaleString()} vs ${dv.avgOI.toLocaleString()} avg OI (${dv.volOIRatio.toFixed(1)}x). ${dv.chainStrikesElevated}/${dv.chainTotalStrikes} strikes show elevated IV — chain-wide, not a single print.`
                  : `${dv.ticker} shares are down ${Math.abs(dv.shareChg).toFixed(1)}% but ${dv.dte}DTE ${fmtP(dv.strike)} calls (${dv.otmPct.toFixed(0)}% OTM) are up ${dv.optPriceChg.toFixed(0)}% on a ${dv.ivJump.toFixed(0)}% IV spike. Volume is ${dv.volume.toLocaleString()} vs ${dv.avgOI.toLocaleString()} avg OI (${dv.volOIRatio.toFixed(1)}x). ${dv.chainStrikesElevated}/${dv.chainTotalStrikes} strikes show elevated IV — chain-wide, not a single print.`
                }
              </div>
            </div>

            {/* Metrics strip */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: "1px", background: "rgba(74,144,217,0.06)" }}>
              {[
                { l: "IV jump", v: `+${dv.ivJump.toFixed(0)}%`, s: `${dv.priorIV.toFixed(0)}→${dv.currentIV.toFixed(0)}` },
                { l: "Option Δ", v: `+${dv.optPriceChg.toFixed(0)}%` },
                { l: "Vol / OI", v: `${dv.volOIRatio.toFixed(1)}x`, s: `${dv.volume.toLocaleString()} vol` },
                { l: "Chain spread", v: `${dv.chainStrikesElevated}/${dv.chainTotalStrikes}`, s: "strikes elevated" },
                { l: "Eq equiv", v: <EqBadge shares={isPut ? -dv.eqShares : dv.eqShares} size="sm" /> },
                { l: "Severity", v: <span style={{ color: sevColor, fontWeight: 500 }}>{dv.severity}/100</span> },
              ].map((m, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.7)", padding: "8px 10px" }}>
                  <div style={{ fontSize: "9px", textTransform: "uppercase", opacity: 0.82, letterSpacing: "0.3px", marginBottom: "2px" }}>{m.l}</div>
                  <div style={{ fontSize: "13px", fontWeight: 500 }}>{m.v}</div>
                  {m.s && <div style={{ fontSize: "10px", opacity: 0.82555 }}>{m.s}</div>}
                </div>
              ))}
            </div>

            {/* What it means */}
            <div style={{ padding: "10px 16px", fontSize: "12px", lineHeight: 1.55, fontFamily: "-apple-system,sans-serif" }}>
              <div style={{ opacity: 0.828, fontSize: "9px", textTransform: "uppercase", letterSpacing: "0.4px", marginBottom: "4px" }}>Why this matters</div>
              <div style={{ opacity: 0.825 }}>
                {isPut
                  ? `Someone with size is buying OTM puts into a rising stock — paying elevated premiums to position for downside. This pattern precedes earnings misses, guidance cuts, fraud disclosures, and regulatory actions. The chain-wide IV expansion (${dv.chainStrikesElevated} strikes) confirms this isn't a one-off hedge — it's systematic positioning.`
                  : `Someone with size is buying OTM calls into a falling stock — paying elevated premiums to position for upside. This pattern precedes M&A announcements, activist involvement, FDA approvals, and earnings surprises. The chain-wide IV expansion (${dv.chainStrikesElevated} strikes) confirms this isn't a stray print — it's deliberate accumulation.`
                }
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Scanner({ data, onSelect }) {
  const sorted = useMemo(()=>[...data].sort((a,b)=>b.sq-a.sq),[data]);
  return <div style={{border:"1px solid rgba(128,128,128,0.15)",borderRadius:"10px",overflow:"hidden"}}>
    <div style={{display:"grid",gridTemplateColumns:"56px 62px 64px 68px minmax(56px,1fr) 64px 52px 58px",padding:"8px 10px",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.3px",opacity:0.45,fontWeight:500,background:"rgba(128,128,128,0.04)",borderBottom:"1px solid rgba(128,128,128,0.1)"}}><span>Ticker</span><span>Regime</span><span>Flip</span><span>Squeeze</span><span style={{textAlign:"right"}}>Dealer/1%</span><span style={{textAlign:"right"}}>Δ P/C</span><span style={{textAlign:"right"}}>Skew</span><span style={{textAlign:"right"}}>Level</span></div>
    {sorted.map((d,i)=><div key={d.ticker} onClick={()=>onSelect(d.ticker)} style={{display:"grid",gridTemplateColumns:"56px 62px 64px 68px minmax(56px,1fr) 64px 52px 58px",padding:"7px 10px",alignItems:"center",cursor:"pointer",fontSize:"13px",borderBottom:i<sorted.length-1?"1px solid rgba(128,128,128,0.07)":"none"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(128,128,128,0.04)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <span style={{fontWeight:500}}>{d.ticker}</span><Regime r={d.regime}/><span style={{fontFamily:"monospace",fontSize:"12px",color:Math.abs(d.flipDist)<1?"#E24B4A":Math.abs(d.flipDist)<2?"#BA7517":"inherit"}}>{fmtPct(d.flipDist)}</span><Squeeze score={d.sq}/><span style={{textAlign:"right"}}><EqBadge shares={d.regime==="positive"?d.dspct:-d.dspct} size="sm"/></span><span style={{textAlign:"right",fontFamily:"monospace",fontSize:"12px",color:d.dpc>1.5?"#E24B4A":d.dpc<0.7?"#1D9E75":"inherit"}}>{d.dpc.toFixed(2)}</span><span style={{textAlign:"right",fontFamily:"monospace",fontSize:"12px",color:Math.abs(d.skewZ)>2?"#E24B4A":Math.abs(d.skewZ)>1.5?"#BA7517":"inherit"}}>{d.skewZ.toFixed(1)}σ</span><span style={{textAlign:"right",fontSize:"10px",padding:"1px 6px",borderRadius:"4px",background:"rgba(128,128,128,0.08)"}}>{d.at}</span>
    </div>)}
  </div>;
}

function App() {
  const [tab, setTab] = useState("lookup");
  const [data, setData] = useState([]);
  const [lookupD, setLookupD] = useState(null);
  const [recent, setRecent] = useState([]);
  const [lastRef, setLastRef] = useState(null);
  const [volDiv, setVolDiv] = useState([]);
  const refresh = useCallback(async ()=>{
    setLastRef(new Date());
    try {
      const liveResults = await Promise.all(
        DEFAULT_WATCHLIST.map((t, i) => fetchTickerLive(t, i))
      );
      setData(liveResults);
      // Run live vol divergence scanner via Polygon
      const divResults = await fetchVolDivergencesLive(DEFAULT_WATCHLIST);
      setVolDiv(divResults);
    } catch(e) { console.warn("Refresh failed:", e); }
  },[]);
  useEffect(()=>{refresh();},[refresh]);
  const lookup = useCallback(async (ticker)=>{
    setTab("lookup");
    setRecent(p=>[ticker,...p.filter(t=>t!==ticker)].slice(0,8));
    const live = await fetchTickerLive(ticker, 999);
    setLookupD(live);
  },[]);
  const opex = nextOpex();
  const narrative = useMemo(()=>{if(!data.length)return"";const spy=data.find(d=>d.ticker==="SPY");if(!spy)return"";const eq=fmtEq(spy.regime==="positive"?spy.dspct:-spy.dspct);const neg=data.filter(d=>d.regime==="negative").length;let n=`SPY ${spy.regime} gamma — ${eq.label} ${spy.regime==="positive"?"counter":"pro"}-trend per 1%. Flip ${fmtP(spy.gammaFlip)}, ${Math.abs(spy.flipDist).toFixed(1)}% ${spy.flipDist>0?"above":"below"}.`;const tS=[...data].sort((a,b)=>b.sq-a.sq)[0];if(tS.sq>50)n+=` ${tS.ticker} squeeze ${Math.round(tS.sq)}.`;n+=` ${neg}/${data.length} negative gamma.`;if(opex.isNear)n+=` OPEX ${opex.days}d — amplifying.`;return n;},[data,opex]);
  const alerts = useMemo(()=>data.filter(d=>d.sq>50||Math.abs(d.skewZ)>2||d.pcp>90||d.pcp<10).sort((a,b)=>b.sq-a.sq).slice(0,4).map(d=>{const r=[];if(d.sq>50)r.push(`sq${Math.round(d.sq)}`);if(Math.abs(d.skewZ)>2)r.push(`${d.skewZ.toFixed(1)}σ`);if(d.pcp>90||d.pcp<10)r.push(`P/C ${d.pcp}th`);return{...d,reasons:r};}),[data]);
  const tabs=[{id:"lookup",label:"⌕ Ticker lookup"},{id:"scanner",label:"Scanner"},{id:"voldiv",label:volDiv.length ? `⚡ Vol div (${volDiv.length})` : "Vol div"},{id:"0dte",label:"0DTE"},{id:"sweeps",label:"Sweeps"},{id:"divergence",label:"Cross-asset"}];

  const isLive = data.some(d=>d._live);

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
      <div><div style={{fontSize:"10px",textTransform:"uppercase",letterSpacing:"1px",opacity:0.35,marginBottom:"2px",color:"#4A90D9"}}>JonesTrading · Options positioning intelligence</div><div style={{fontSize:"20px",fontWeight:500,fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif",color:"#1a2a3a"}}>Agent v1</div></div>
      <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"4px",background: isLive ? "rgba(29,158,117,0.12)" : "rgba(163,45,45,0.1)",color: isLive ? "#0F6E56" : "#A32D2D"}}>{isLive ? "● LIVE" : "◌ STALE"}</span><button onClick={refresh} style={{background:"none",border:"1px solid rgba(74,144,217,0.25)",borderRadius:"6px",padding:"4px 12px",fontSize:"12px",cursor:"pointer",color:"#2B6CB0"}}>Refresh</button>{lastRef&&<div style={{fontSize:"10px",opacity:0.3,marginTop:"2px"}}>{lastRef.toLocaleTimeString()}</div>}</div>
    </div>
    <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
      <div style={{padding:"6px 12px",borderRadius:"6px",fontSize:"12px",background:opex.isNear?"rgba(226,75,74,0.1)":"rgba(128,128,128,0.06)",color:opex.isNear?"#A32D2D":"inherit",display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap"}}><span style={{fontWeight:500}}>OPEX</span>{opex.date} · <span style={{fontWeight:500}}>{opex.days}d {opex.hours}h</span>{opex.isNear&&<span style={{fontWeight:500}}>⚠</span>}</div>
      {alerts.map(a=><span key={a.ticker} onClick={()=>lookup(a.ticker)} style={{padding:"4px 10px",borderRadius:"4px",cursor:"pointer",background:"rgba(226,75,74,0.08)",color:"#A32D2D",fontSize:"11px",whiteSpace:"nowrap"}}>{a.ticker} {a.reasons.join(" ")}</span>)}
    </div>
    <div style={{padding:"10px 14px",borderRadius:"8px",fontSize:"12px",lineHeight:1.5,border:"1px solid rgba(128,128,128,0.08)",background:"rgba(128,128,128,0.02)",fontFamily:"-apple-system,sans-serif",marginBottom:"14px"}}><span style={{fontSize:"9px",textTransform:"uppercase",opacity:0.3,letterSpacing:"0.5px"}}>Market brief · </span>{narrative}</div>
    <div style={{display:"flex",gap:"2px",marginBottom:"14px",borderBottom:"1px solid rgba(128,128,128,0.1)"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:tab===t.id?"2px solid #4A90D9":"2px solid transparent",padding:"7px 14px",fontSize:"13px",cursor:"pointer",opacity:tab===t.id?1:0.4,fontWeight:tab===t.id?500:400}}>{t.label}</button>)}
    </div>
    {tab==="lookup"&&<><TickerSearch onLookup={lookup} recentLookups={recent}/>{lookupD?<VerdictCard d={lookupD} onClose={()=>setLookupD(null)}/>:<div style={{padding:"40px 20px",textAlign:"center",opacity:0.3,fontSize:"14px",lineHeight:1.6}}>Type any stock, ETF, or index ticker above to see<br/>how options positioning is influencing shares today</div>}</>}
    {tab==="scanner"&&<Scanner data={data} onSelect={lookup}/>}
    {tab==="voldiv"&&<VolDivergence divergences={volDiv} onSelect={lookup}/>}
    {tab==="0dte"&&<Leaderboard data={data} onSelect={lookup}/>}
    {tab==="sweeps"&&<Sweeps data={data} onSelect={lookup}/>}
    {tab==="divergence"&&<Divergence data={data}/>}
    <div style={{marginTop:"14px",fontSize:"10px",opacity:0.45,lineHeight:1.5}}>v1 · {data.length} watchlist · {data.filter(d=>d._live).length} live · Self-computed GEX · Polygon Options Starter $29/mo</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
